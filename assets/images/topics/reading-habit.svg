<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="#F3F4F6"/>

  <!-- Title -->
  <text x="200" y="26" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#065F46" text-anchor="middle">Building a Reading Habit</text>

  <!-- Reading Streak Chain -->
  <text x="200" y="48" font-family="Arial, sans-serif" font-size="9" fill="#6B7280" text-anchor="middle">Reading Streak Chain</text>

  <!-- Chain links (7 days) -->
  <!-- Day 1 - linked ring with book -->
  <circle cx="40" cy="75" r="16" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <path d="M35 71 L35 80 L40 78 L45 80 L45 71 L40 69 Z" fill="none" stroke="#10B981" stroke-width="1.2"/>
  <line x1="40" y1="69" x2="40" y2="78" stroke="#10B981" stroke-width="1"/>
  <text x="40" y="100" font-family="Arial, sans-serif" font-size="7" fill="#6B7280" text-anchor="middle">Day 1</text>

  <!-- Link connector -->
  <path d="M56 75 L68 75" stroke="#10B981" stroke-width="2"/>

  <!-- Day 2 -->
  <circle cx="84" cy="75" r="16" fill="#A7F3D0" stroke="#10B981" stroke-width="2"/>
  <path d="M79 71 L79 80 L84 78 L89 80 L89 71 L84 69 Z" fill="none" stroke="#10B981" stroke-width="1.2"/>
  <line x1="84" y1="69" x2="84" y2="78" stroke="#10B981" stroke-width="1"/>
  <text x="84" y="100" font-family="Arial, sans-serif" font-size="7" fill="#6B7280" text-anchor="middle">Day 2</text>

  <!-- Link connector -->
  <path d="M100 75 L112 75" stroke="#10B981" stroke-width="2"/>

  <!-- Day 3 -->
  <circle cx="128" cy="75" r="16" fill="#6EE7B7" stroke="#10B981" stroke-width="2"/>
  <path d="M123 71 L123 80 L128 78 L133 80 L133 71 L128 69 Z" fill="none" stroke="#10B981" stroke-width="1.2"/>
  <line x1="128" y1="69" x2="128" y2="78" stroke="#10B981" stroke-width="1"/>
  <text x="128" y="100" font-family="Arial, sans-serif" font-size="7" fill="#6B7280" text-anchor="middle">Day 3</text>

  <!-- Link connector -->
  <path d="M144 75 L156 75" stroke="#10B981" stroke-width="2"/>

  <!-- Day 4 -->
  <circle cx="172" cy="75" r="16" fill="#34D399" stroke="#10B981" stroke-width="2"/>
  <path d="M167 71 L167 80 L172 78 L177 80 L177 71 L172 69 Z" fill="none" stroke="#059669" stroke-width="1.2"/>
  <line x1="172" y1="69" x2="172" y2="78" stroke="#059669" stroke-width="1"/>
  <text x="172" y="100" font-family="Arial, sans-serif" font-size="7" fill="#6B7280" text-anchor="middle">Day 4</text>

  <!-- Link connector -->
  <path d="M188 75 L200 75" stroke="#10B981" stroke-width="2"/>

  <!-- Day 5 -->
  <circle cx="216" cy="75" r="16" fill="#10B981" stroke="#059669" stroke-width="2"/>
  <path d="M211 71 L211 80 L216 78 L221 80 L221 71 L216 69 Z" fill="none" stroke="white" stroke-width="1.2"/>
  <line x1="216" y1="69" x2="216" y2="78" stroke="white" stroke-width="1"/>
  <text x="216" y="100" font-family="Arial, sans-serif" font-size="7" fill="#6B7280" text-anchor="middle">Day 5</text>

  <!-- BROKEN link -->
  <path d="M232 75 L240 75" stroke="#EF4444" stroke-width="2" stroke-dasharray="3 2"/>
  <text x="243" y="68" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#EF4444" text-anchor="middle">X</text>

  <!-- Day 6 (missed - broken ring) -->
  <circle cx="260" cy="75" r="16" fill="#FEE2E2" stroke="#EF4444" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="260" y="79" font-family="Arial, sans-serif" font-size="10" fill="#EF4444" text-anchor="middle">-</text>
  <text x="260" y="100" font-family="Arial, sans-serif" font-size="7" fill="#EF4444" text-anchor="middle">Missed!</text>

  <!-- Resume link -->
  <path d="M276 75 L288 75" stroke="#10B981" stroke-width="2" stroke-dasharray="3 2"/>

  <!-- Day 7 (restart) -->
  <circle cx="304" cy="75" r="16" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <path d="M299 71 L299 80 L304 78 L309 80 L309 71 L304 69 Z" fill="none" stroke="#10B981" stroke-width="1.2"/>
  <line x1="304" y1="69" x2="304" y2="78" stroke="#10B981" stroke-width="1"/>
  <text x="304" y="100" font-family="Arial, sans-serif" font-size="7" fill="#10B981" text-anchor="middle">Restart</text>

  <!-- Arrow to keep going -->
  <path d="M320 75 L340 75" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrowGH)"/>
  <text x="360" y="78" font-family="Arial, sans-serif" font-size="8" fill="#10B981" text-anchor="middle">...</text>

  <!-- 2-Minute Rule Badge -->
  <rect x="20" y="120" width="160" height="75" rx="10" fill="white" stroke="#10B981" stroke-width="1.5"/>
  <circle cx="55" cy="145" r="18" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="55" y="143" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#10B981" text-anchor="middle">2</text>
  <text x="55" y="153" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#10B981" text-anchor="middle">min</text>

  <text x="115" y="138" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#065F46" text-anchor="middle">2-Minute Rule</text>
  <text x="115" y="152" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" text-anchor="middle">Start with just 2 min</text>
  <text x="115" y="164" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" text-anchor="middle">Then let it grow</text>

  <!-- Growth arrow: 2min -> 5min -> 20min -->
  <text x="45" y="187" font-family="Arial, sans-serif" font-size="7" fill="#6B7280">2m</text>
  <path d="M60 185 L75 185" stroke="#A7F3D0" stroke-width="1.5" marker-end="url(#arrowGH)"/>
  <text x="80" y="187" font-family="Arial, sans-serif" font-size="7" fill="#6B7280">5m</text>
  <path d="M95 185 L110 185" stroke="#6EE7B7" stroke-width="1.5" marker-end="url(#arrowGH)"/>
  <text x="115" y="187" font-family="Arial, sans-serif" font-size="7" fill="#6B7280">10m</text>
  <path d="M132 185 L147 185" stroke="#34D399" stroke-width="1.5" marker-end="url(#arrowGH)"/>
  <text x="152" y="187" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#10B981">20m+</text>

  <!-- Cozy Reading Spot -->
  <rect x="200" y="120" width="185" height="145" rx="10" fill="white" stroke="#10B981" stroke-width="1.5"/>
  <text x="292" y="138" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#065F46" text-anchor="middle">Cozy Reading Spot</text>

  <!-- Lamp -->
  <line x1="240" y1="220" x2="240" y2="175" stroke="#F59E0B" stroke-width="2"/>
  <path d="M228 175 L240 160 L252 175 Z" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>
  <!-- Light glow -->
  <ellipse cx="240" cy="180" rx="18" ry="8" fill="#FDE68A" opacity="0.3"/>
  <!-- Lamp base -->
  <rect x="234" y="220" width="12" height="4" rx="2" fill="#F59E0B"/>

  <!-- Chair (armchair side view) -->
  <rect x="268" y="195" width="40" height="30" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <!-- Chair back -->
  <rect x="268" y="178" width="8" height="47" rx="4" fill="#A7F3D0" stroke="#10B981" stroke-width="1"/>
  <!-- Chair arm right -->
  <rect x="300" y="190" width="8" height="20" rx="4" fill="#A7F3D0" stroke="#10B981" stroke-width="1"/>
  <!-- Chair legs -->
  <line x1="273" y1="225" x2="273" y2="235" stroke="#10B981" stroke-width="2" stroke-linecap="round"/>
  <line x1="303" y1="225" x2="303" y2="235" stroke="#10B981" stroke-width="2" stroke-linecap="round"/>

  <!-- Book on chair -->
  <rect x="280" y="192" width="16" height="12" rx="2" fill="#10B981" transform="rotate(-5 288 198)"/>
  <line x1="288" y1="191" x2="288" y2="203" stroke="white" stroke-width="0.8" transform="rotate(-5 288 198)"/>

  <!-- Small side table with cup -->
  <rect x="320" y="215" width="30" height="3" rx="1" fill="#D1D5DB"/>
  <line x1="325" y1="218" x2="325" y2="235" stroke="#D1D5DB" stroke-width="2"/>
  <line x1="345" y1="218" x2="345" y2="235" stroke="#D1D5DB" stroke-width="2"/>
  <!-- Coffee cup -->
  <rect x="329" y="206" width="12" height="10" rx="2" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <path d="M341 209 Q346 209 346 213 Q346 216 341 216" fill="none" stroke="#D1D5DB" stroke-width="1"/>
  <!-- Steam -->
  <path d="M333 203 Q335 198 333 194" fill="none" stroke="#D1D5DB" stroke-width="0.8"/>
  <path d="M337 203 Q339 198 337 194" fill="none" stroke="#D1D5DB" stroke-width="0.8"/>

  <!-- Floor line -->
  <line x1="225" y1="238" x2="370" y2="238" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Bottom label -->
  <text x="200" y="286" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#065F46" text-anchor="middle">Consistency Beats Intensity</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowGH" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0 0 L6 2.5 L0 5 Z" fill="#10B981"/>
    </marker>
  </defs>
</svg>
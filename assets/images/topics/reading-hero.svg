<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="rh-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F3F4F6"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="400" rx="16" fill="url(#rh-bg)"/>

  <!-- Bookshelf -->
  <rect x="560" y="80" width="200" height="280" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <!-- Shelf lines -->
  <line x1="560" y1="150" x2="760" y2="150" stroke="#10B981" stroke-width="2"/>
  <line x1="560" y1="220" x2="760" y2="220" stroke="#10B981" stroke-width="2"/>
  <line x1="560" y1="290" x2="760" y2="290" stroke="#10B981" stroke-width="2"/>
  <!-- Books on shelf row 1 -->
  <rect x="575" y="100" width="18" height="45" rx="2" fill="#10B981"/>
  <rect x="598" y="108" width="15" height="37" rx="2" fill="#059669"/>
  <rect x="618" y="104" width="20" height="41" rx="2" fill="#34D399"/>
  <rect x="643" y="110" width="14" height="35" rx="2" fill="#6EE7B7"/>
  <rect x="662" y="102" width="18" height="43" rx="2" fill="#047857"/>
  <rect x="685" y="106" width="16" height="39" rx="2" fill="#10B981"/>
  <rect x="706" y="100" width="20" height="45" rx="2" fill="#A7F3D0"/>
  <rect x="731" y="108" width="14" height="37" rx="2" fill="#059669"/>
  <!-- Books on shelf row 2 -->
  <rect x="575" y="168" width="20" height="47" rx="2" fill="#34D399"/>
  <rect x="600" y="175" width="16" height="40" rx="2" fill="#10B981"/>
  <rect x="621" y="170" width="18" height="45" rx="2" fill="#047857"/>
  <rect x="644" y="176" width="22" height="39" rx="2" fill="#6EE7B7"/>
  <rect x="671" y="172" width="15" height="43" rx="2" fill="#059669"/>
  <rect x="691" y="168" width="19" height="47" rx="2" fill="#10B981"/>
  <rect x="715" y="174" width="17" height="41" rx="2" fill="#A7F3D0"/>
  <!-- Books on shelf row 3 -->
  <rect x="575" y="238" width="16" height="47" rx="2" fill="#059669"/>
  <rect x="596" y="244" width="20" height="41" rx="2" fill="#34D399"/>
  <rect x="621" y="240" width="14" height="45" rx="2" fill="#10B981"/>
  <rect x="640" y="246" width="18" height="39" rx="2" fill="#047857"/>
  <rect x="663" y="238" width="22" height="47" rx="2" fill="#6EE7B7"/>
  <rect x="690" y="242" width="15" height="43" rx="2" fill="#10B981"/>

  <!-- Person body -->
  <circle cx="280" cy="140" r="40" fill="#10B981"/>
  <!-- Face -->
  <circle cx="280" cy="140" r="36" fill="#FCD34D"/>
  <!-- Eyes -->
  <circle cx="268" cy="134" r="3" fill="#1F2937"/>
  <circle cx="292" cy="134" r="3" fill="#1F2937"/>
  <!-- Smile -->
  <path d="M270 148 Q280 158 290 148" fill="none" stroke="#1F2937" stroke-width="2" stroke-linecap="round"/>
  <!-- Hair -->
  <path d="M244 130 Q248 100 280 100 Q312 100 316 130" fill="#1F2937"/>
  <!-- Body -->
  <rect x="255" y="180" width="50" height="70" rx="10" fill="#10B981"/>
  <!-- Arms holding book -->
  <path d="M255 200 Q230 210 220 240 L240 250" fill="none" stroke="#10B981" stroke-width="12" stroke-linecap="round"/>
  <path d="M305 200 Q330 210 340 240 L320 250" fill="none" stroke="#10B981" stroke-width="12" stroke-linecap="round"/>
  <!-- Hands -->
  <circle cx="240" cy="250" r="8" fill="#FCD34D"/>
  <circle cx="320" cy="250" r="8" fill="#FCD34D"/>
  <!-- Open book in hands -->
  <path d="M220 240 Q280 230 280 260 L220 260 Z" fill="white" stroke="#10B981" stroke-width="1.5"/>
  <path d="M340 240 Q280 230 280 260 L340 260 Z" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5"/>
  <!-- Book text lines -->
  <line x1="235" y1="248" x2="270" y2="246" stroke="#D1D5DB" stroke-width="1.5"/>
  <line x1="238" y1="254" x2="272" y2="252" stroke="#D1D5DB" stroke-width="1.5"/>
  <line x1="290" y1="246" x2="325" y2="248" stroke="#D1D5DB" stroke-width="1.5"/>
  <line x1="288" y1="252" x2="322" y2="254" stroke="#D1D5DB" stroke-width="1.5"/>
  <!-- Legs -->
  <rect x="262" y="250" width="14" height="50" rx="5" fill="#6B7280"/>
  <rect x="284" y="250" width="14" height="50" rx="5" fill="#6B7280"/>
  <!-- Shoes -->
  <ellipse cx="269" cy="302" rx="12" ry="6" fill="#374151"/>
  <ellipse cx="291" cy="302" rx="12" ry="6" fill="#374151"/>

  <!-- Flying pages transforming into ideas -->
  <!-- Page 1 -->
  <rect x="350" y="160" width="30" height="38" rx="3" fill="white" stroke="#10B981" stroke-width="1.5" transform="rotate(-15 365 179)"/>
  <line x1="357" y1="170" x2="373" y2="168" stroke="#D1D5DB" stroke-width="1"/>
  <line x1="358" y1="176" x2="374" y2="174" stroke="#D1D5DB" stroke-width="1"/>
  <!-- Page 2 -->
  <rect x="380" y="120" width="28" height="36" rx="3" fill="white" stroke="#10B981" stroke-width="1.5" transform="rotate(-25 394 138)"/>

  <!-- Lightbulb -->
  <circle cx="430" cy="90" r="22" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <path d="M422 100 L438 100 M424 106 L436 106" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
  <line x1="430" y1="68" x2="430" y2="60" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
  <line x1="412" y1="76" x2="406" y2="70" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
  <line x1="448" y1="76" x2="454" y2="70" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>

  <!-- Gear -->
  <circle cx="480" cy="160" r="18" fill="#D1FAE5" stroke="#10B981" stroke-width="2.5"/>
  <circle cx="480" cy="160" r="8" fill="#F3F4F6" stroke="#10B981" stroke-width="2"/>
  <!-- Gear teeth -->
  <rect x="476" y="139" width="8" height="8" rx="1" fill="#10B981"/>
  <rect x="476" y="175" width="8" height="8" rx="1" fill="#10B981"/>
  <rect x="459" y="156" width="8" height="8" rx="1" fill="#10B981"/>
  <rect x="495" y="156" width="8" height="8" rx="1" fill="#10B981"/>

  <!-- Small chart -->
  <rect x="410" y="200" width="60" height="50" rx="4" fill="white" stroke="#10B981" stroke-width="1.5"/>
  <rect x="420" y="230" width="8" height="15" rx="1" fill="#6EE7B7"/>
  <rect x="432" y="222" width="8" height="23" rx="1" fill="#34D399"/>
  <rect x="444" y="215" width="8" height="30" rx="1" fill="#10B981"/>
  <rect x="456" y="208" width="8" height="37" rx="1" fill="#059669"/>

  <!-- Speed gauge -->
  <g transform="translate(100, 280)">
    <path d="M0 0 A60 60 0 0 1 120 0" fill="none" stroke="#E5E7EB" stroke-width="8" stroke-linecap="round"/>
    <path d="M0 0 A60 60 0 0 1 90 -46" fill="none" stroke="#10B981" stroke-width="8" stroke-linecap="round"/>
    <!-- Needle -->
    <line x1="60" y1="0" x2="90" y2="-46" stroke="#059669" stroke-width="3" stroke-linecap="round"/>
    <circle cx="60" cy="0" r="6" fill="#059669"/>
    <!-- Labels -->
    <text x="5" y="20" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Slow</text>
    <text x="95" y="20" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Fast</text>
  </g>

  <!-- Sparkle dots -->
  <circle cx="500" cy="100" r="3" fill="#10B981" opacity="0.6"/>
  <circle cx="520" cy="130" r="2" fill="#34D399" opacity="0.5"/>
  <circle cx="450" cy="140" r="2.5" fill="#059669" opacity="0.4"/>
  <circle cx="395" cy="100" r="2" fill="#10B981" opacity="0.5"/>
  <circle cx="370" cy="90" r="1.5" fill="#34D399" opacity="0.6"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#F3F4F6"/>

  <!-- Balance beam pivot -->
  <polygon points="200,175 190,195 210,195" fill="#0891B2"/>
  <rect x="185" y="195" width="30" height="8" rx="4" fill="#065F73"/>

  <!-- Balance beam -->
  <line x1="60" y1="155" x2="340" y2="155" stroke="#0891B2" stroke-width="4" stroke-linecap="round"/>

  <!-- Left pan (Study/Work) -->
  <g transform="translate(100,155)">
    <!-- Strings -->
    <line x1="-30" y1="0" x2="-25" y2="40" stroke="#94A3B8" stroke-width="1.5"/>
    <line x1="30" y1="0" x2="25" y2="40" stroke="#94A3B8" stroke-width="1.5"/>
    <!-- Pan -->
    <ellipse cx="0" cy="42" rx="40" ry="8" fill="#0891B2" opacity="0.2"/>
    <path d="M-35,40 Q0,50 35,40" stroke="#0891B2" stroke-width="2" fill="#0891B2" opacity="0.1"/>

    <!-- Book -->
    <g transform="translate(-18,22)">
      <rect x="0" y="0" width="16" height="12" rx="1" fill="#0891B2"/>
      <line x1="8" y1="0" x2="8" y2="12" stroke="white" stroke-width="0.5"/>
      <rect x="2" y="3" width="4" height="1" rx="0.5" fill="white" opacity="0.5"/>
      <rect x="2" y="6" width="4" height="1" rx="0.5" fill="white" opacity="0.5"/>
    </g>

    <!-- Laptop -->
    <g transform="translate(2,18)">
      <rect x="0" y="0" width="20" height="13" rx="2" fill="#065F73"/>
      <rect x="2" y="2" width="16" height="9" rx="1" fill="#67CDD8" opacity="0.4"/>
      <rect x="-2" y="13" width="24" height="3" rx="1.5" fill="#065F73"/>
    </g>

    <!-- Papers -->
    <g transform="translate(-8,10)">
      <rect x="0" y="0" width="12" height="15" rx="1" fill="white" stroke="#CBD5E1" stroke-width="0.5"/>
      <rect x="2" y="3" width="8" height="1" rx="0.5" fill="#CBD5E1"/>
      <rect x="2" y="6" width="6" height="1" rx="0.5" fill="#CBD5E1"/>
      <rect x="2" y="9" width="7" height="1" rx="0.5" fill="#CBD5E1"/>
    </g>

    <!-- Label -->
    <text x="0" y="65" text-anchor="middle" fill="#065F73" font-size="11" font-family="system-ui" font-weight="600">Study</text>
  </g>

  <!-- Right pan (Life/Rest) -->
  <g transform="translate(300,155)">
    <!-- Strings -->
    <line x1="-30" y1="0" x2="-25" y2="40" stroke="#94A3B8" stroke-width="1.5"/>
    <line x1="30" y1="0" x2="25" y2="40" stroke="#94A3B8" stroke-width="1.5"/>
    <!-- Pan -->
    <ellipse cx="0" cy="42" rx="40" ry="8" fill="#0891B2" opacity="0.2"/>
    <path d="M-35,40 Q0,50 35,40" stroke="#0891B2" stroke-width="2" fill="#0891B2" opacity="0.1"/>

    <!-- Running figure -->
    <g transform="translate(-20,20)">
      <circle cx="5" cy="0" r="4" fill="#0891B2"/>
      <line x1="5" y1="4" x2="5" y2="14" stroke="#0891B2" stroke-width="2" stroke-linecap="round"/>
      <line x1="5" y1="14" x2="0" y2="20" stroke="#0891B2" stroke-width="2" stroke-linecap="round"/>
      <line x1="5" y1="14" x2="10" y2="20" stroke="#0891B2" stroke-width="2" stroke-linecap="round"/>
      <line x1="5" y1="8" x2="0" y2="5" stroke="#0891B2" stroke-width="2" stroke-linecap="round"/>
      <line x1="5" y1="8" x2="11" y2="11" stroke="#0891B2" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- Moon (sleep) -->
    <g transform="translate(5,15)">
      <path d="M0,0 A8,8 0 1,0 6,-6 A6,6 0 0,1 0,0Z" fill="#F59E0B" opacity="0.7"/>
      <circle cx="8" cy="-8" r="1" fill="#F59E0B" opacity="0.4"/>
      <circle cx="12" cy="-4" r="0.8" fill="#F59E0B" opacity="0.3"/>
    </g>

    <!-- People (social) -->
    <g transform="translate(18,22)">
      <circle cx="0" cy="0" r="3.5" fill="#67CDD8"/>
      <circle cx="8" cy="0" r="3.5" fill="#0891B2"/>
      <path d="M-5,5 Q0,3 5,5 L4,10 L-4,10Z" fill="#67CDD8" opacity="0.7"/>
      <path d="M3,5 Q8,3 13,5 L12,10 L4,10Z" fill="#0891B2" opacity="0.7"/>
    </g>

    <!-- Label -->
    <text x="0" y="65" text-anchor="middle" fill="#065F73" font-size="11" font-family="system-ui" font-weight="600">Life</text>
  </g>

  <!-- Happy person in center -->
  <g transform="translate(200,120)">
    <!-- Head -->
    <circle cx="0" cy="-15" r="18" fill="#0891B2"/>
    <!-- Happy face -->
    <circle cx="-6" cy="-18" r="2.5" fill="white"/>
    <circle cx="6" cy="-18" r="2.5" fill="white"/>
    <path d="M-8,-10 Q0,-3 8,-10" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Body -->
    <rect x="-12" y="3" width="24" height="10" rx="6" fill="#0891B2"/>
    <!-- Arms holding beam -->
    <line x1="-12" y1="8" x2="-40" y2="30" stroke="#0891B2" stroke-width="4" stroke-linecap="round"/>
    <line x1="12" y1="8" x2="40" y2="30" stroke="#0891B2" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Decorative sparkles for balance -->
  <g fill="#F59E0B" opacity="0.5">
    <path d="M200,80 L202,85 L207,85 L203,88 L204,93 L200,90 L196,93 L197,88 L193,85 L198,85Z" transform="scale(0.7)"/>
  </g>

  <!-- Bottom text -->
  <text x="200" y="260" text-anchor="middle" fill="#0891B2" font-size="12" font-family="system-ui" font-weight="600">Work-Life Balance</text>
  <text x="200" y="278" text-anchor="middle" fill="#94A3B8" font-size="10" font-family="system-ui">Balanced life = Sustainable learning</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="#F3F4F6"/>

  <!-- Central topic circle -->
  <ellipse cx="200" cy="150" rx="42" ry="26" fill="#2563EB" opacity="0.15" stroke="#2563EB" stroke-width="2"/>
  <text x="200" y="147" text-anchor="middle" fill="#2563EB" font-size="11" font-weight="bold" font-family="Arial, sans-serif">SUBJECT</text>
  <text x="200" y="160" text-anchor="middle" fill="#2563EB" font-size="7" font-family="Arial, sans-serif">Central Topic</text>

  <!-- Branch 1: Top-Right (Red/Coral) - curved organic -->
  <path d="M235 135 C260 110, 290 95, 320 80" stroke="#EF4444" stroke-width="3" fill="none" stroke-linecap="round"/>
  <ellipse cx="320" cy="80" rx="32" ry="14" fill="#EF4444" opacity="0.12" stroke="#EF4444" stroke-width="1.5"/>
  <text x="320" y="83" text-anchor="middle" fill="#EF4444" font-size="9" font-weight="bold" font-family="Arial, sans-serif">Concept A</text>
  <!-- Sub-branches -->
  <path d="M345 72 C355 60, 365 55, 375 48" stroke="#EF4444" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <text x="376" y="45" fill="#EF4444" font-size="7" font-family="Arial, sans-serif">detail 1</text>
  <path d="M350 80 C360 78, 370 80, 382 82" stroke="#EF4444" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <text x="384" y="80" fill="#EF4444" font-size="7" font-family="Arial, sans-serif">detail 2</text>
  <path d="M340 92 C350 100, 358 105, 368 108" stroke="#EF4444" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <text x="370" y="112" fill="#EF4444" font-size="7" font-family="Arial, sans-serif">detail 3</text>
  <!-- Star icon -->
  <g transform="translate(360, 48)">
    <polygon points="0,-5 1.5,-1.5 5,-1.5 2.5,1 3.5,5 0,2.5 -3.5,5 -2.5,1 -5,-1.5 -1.5,-1.5" fill="#EF4444" opacity="0.6"/>
  </g>

  <!-- Branch 2: Bottom-Right (Green) - curved organic -->
  <path d="M235 165 C260 190, 285 210, 315 225" stroke="#10B981" stroke-width="3" fill="none" stroke-linecap="round"/>
  <ellipse cx="315" cy="225" rx="32" ry="14" fill="#10B981" opacity="0.12" stroke="#10B981" stroke-width="1.5"/>
  <text x="315" y="228" text-anchor="middle" fill="#10B981" font-size="9" font-weight="bold" font-family="Arial, sans-serif">Concept B</text>
  <!-- Sub-branches -->
  <path d="M340 215 C355 208, 365 205, 378 202" stroke="#10B981" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <text x="380" y="200" fill="#10B981" font-size="7" font-family="Arial, sans-serif">detail 4</text>
  <path d="M345 228 C360 232, 370 235, 380 238" stroke="#10B981" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <text x="382" y="240" fill="#10B981" font-size="7" font-family="Arial, sans-serif">detail 5</text>
  <!-- Lightbulb icon -->
  <g transform="translate(362, 215)">
    <circle cx="0" cy="-2" r="4" fill="none" stroke="#10B981" stroke-width="1.2" opacity="0.7"/>
    <line x1="-1.5" y1="2" x2="1.5" y2="2" stroke="#10B981" stroke-width="1" opacity="0.7"/>
    <line x1="0" y1="-6" x2="0" y2="-9" stroke="#10B981" stroke-width="0.8" opacity="0.5"/>
    <line x1="4" y1="-4" x2="6" y2="-6" stroke="#10B981" stroke-width="0.8" opacity="0.5"/>
    <line x1="-4" y1="-4" x2="-6" y2="-6" stroke="#10B981" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Branch 3: Top-Left (Purple) - curved organic -->
  <path d="M165 135 C140 110, 110 90, 80 75" stroke="#8B5CF6" stroke-width="3" fill="none" stroke-linecap="round"/>
  <ellipse cx="80" cy="75" rx="32" ry="14" fill="#8B5CF6" opacity="0.12" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="80" y="78" text-anchor="middle" fill="#8B5CF6" font-size="9" font-weight="bold" font-family="Arial, sans-serif">Concept C</text>
  <!-- Sub-branches -->
  <path d="M55 65 C42 58, 32 52, 22 46" stroke="#8B5CF6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <text x="18" y="42" fill="#8B5CF6" font-size="7" font-family="Arial, sans-serif" text-anchor="end">detail 6</text>
  <path d="M50 75 C38 72, 28 70, 18 68" stroke="#8B5CF6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <text x="14" y="66" fill="#8B5CF6" font-size="7" font-family="Arial, sans-serif" text-anchor="end">detail 7</text>
  <path d="M58 87 C48 95, 38 100, 28 104" stroke="#8B5CF6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <text x="24" y="108" fill="#8B5CF6" font-size="7" font-family="Arial, sans-serif" text-anchor="end">detail 8</text>
  <!-- Arrow icon -->
  <g transform="translate(38, 95)" opacity="0.6">
    <line x1="0" y1="0" x2="8" y2="-4" stroke="#8B5CF6" stroke-width="1.2"/>
    <polygon points="8,-4 4,-2 6,-6" fill="#8B5CF6"/>
  </g>

  <!-- Branch 4: Bottom-Left (Amber) - curved organic -->
  <path d="M165 165 C140 190, 115 210, 85 230" stroke="#D97706" stroke-width="3" fill="none" stroke-linecap="round"/>
  <ellipse cx="85" cy="230" rx="32" ry="14" fill="#D97706" opacity="0.12" stroke="#D97706" stroke-width="1.5"/>
  <text x="85" y="233" text-anchor="middle" fill="#D97706" font-size="9" font-weight="bold" font-family="Arial, sans-serif">Concept D</text>
  <!-- Sub-branches -->
  <path d="M58 222 C45 215, 35 210, 22 206" stroke="#D97706" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <text x="18" y="204" fill="#D97706" font-size="7" font-family="Arial, sans-serif" text-anchor="end">detail 9</text>
  <path d="M55 235 C42 240, 32 245, 20 248" stroke="#D97706" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <text x="16" y="252" fill="#D97706" font-size="7" font-family="Arial, sans-serif" text-anchor="end">detail 10</text>
  <!-- Lightbulb icon -->
  <g transform="translate(40, 248)">
    <circle cx="0" cy="-2" r="4" fill="none" stroke="#D97706" stroke-width="1.2" opacity="0.7"/>
    <line x1="-1.5" y1="2" x2="1.5" y2="2" stroke="#D97706" stroke-width="1" opacity="0.7"/>
  </g>

  <!-- Cross-connection dotted line -->
  <path d="M100 90 C130 140, 270 170, 295 215" stroke="#6B7280" stroke-width="1" fill="none" stroke-dasharray="3,3" opacity="0.4"/>
  <circle cx="195" cy="115" r="2" fill="#6B7280" opacity="0.4"/>

  <!-- Title -->
  <text x="200" y="22" text-anchor="middle" fill="#2563EB" font-size="10" font-weight="bold" font-family="Arial, sans-serif">MIND MAP (Tony Buzan Style)</text>

  <!-- Bottom legend -->
  <g transform="translate(120, 280)">
    <circle cx="0" cy="0" r="3" fill="#EF4444" opacity="0.5"/>
    <circle cx="40" cy="0" r="3" fill="#10B981" opacity="0.5"/>
    <circle cx="80" cy="0" r="3" fill="#8B5CF6" opacity="0.5"/>
    <circle cx="120" cy="0" r="3" fill="#D97706" opacity="0.5"/>
    <text x="160" y="3" text-anchor="middle" fill="#6B7280" font-size="7" font-family="Arial, sans-serif">= color-coded branches</text>
  </g>

  <!-- Decorative corner marks -->
  <path d="M8 8 L8 4 L12 4" stroke="#2563EB" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M392 8 L392 4 L388 4" stroke="#2563EB" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M8 292 L8 296 L12 296" stroke="#2563EB" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M392 292 L392 296 L388 296" stroke="#2563EB" stroke-width="1" fill="none" opacity="0.3"/>
</svg>
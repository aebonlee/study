<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#F3F4F6"/>

  <!-- Title -->
  <text x="200" y="24" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#8B5CF6">The Feynman Technique</text>

  <!-- Circular arrows (clockwise connecting the 4 steps) -->
  <!-- Top arc: Step 1 → Step 2 -->
  <path d="M240 70 C290 55, 320 80, 320 120" stroke="#C4B5FD" stroke-width="3" fill="none" marker-end="url(#arrowF)"/>
  <!-- Right arc: Step 2 → Step 3 -->
  <path d="M320 180 C320 220, 290 248, 240 248" stroke="#C4B5FD" stroke-width="3" fill="none" marker-end="url(#arrowF)"/>
  <!-- Bottom arc: Step 3 → Step 4 -->
  <path d="M160 248 C110 248, 80 220, 80 180" stroke="#C4B5FD" stroke-width="3" fill="none" marker-end="url(#arrowF)"/>
  <!-- Left arc: Step 4 → Step 1 -->
  <path d="M80 120 C80 80, 110 55, 160 70" stroke="#C4B5FD" stroke-width="3" fill="none" marker-end="url(#arrowF)"/>

  <!-- Step 1: Choose Topic (top center) - Book icon -->
  <g transform="translate(170, 42)">
    <rect x="0" y="0" width="60" height="55" rx="12" fill="#8B5CF6"/>
    <text x="30" y="16" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="white">STEP 1</text>
    <!-- Book icon -->
    <rect x="14" y="22" width="14" height="18" rx="2" fill="white"/>
    <rect x="32" y="22" width="14" height="18" rx="2" fill="#EDE9FE"/>
    <line x1="28" y1="22" x2="28" y2="40" stroke="white" stroke-width="2"/>
    <line x1="16" y1="27" x2="26" y2="27" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="16" y1="31" x2="26" y2="31" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="16" y1="35" x2="24" y2="35" stroke="#8B5CF6" stroke-width="1"/>
  </g>
  <text x="200" y="108" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#7C3AED">Choose Topic</text>

  <!-- Step 2: Explain Simply (right center) - Speech bubble -->
  <g transform="translate(300, 130)">
    <rect x="0" y="0" width="60" height="55" rx="12" fill="#A78BFA"/>
    <text x="30" y="16" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="white">STEP 2</text>
    <!-- Speech bubble icon -->
    <rect x="12" y="22" width="28" height="16" rx="6" fill="white"/>
    <path d="M22 38 L18 44 L26 38" fill="white"/>
    <line x1="17" y1="28" x2="35" y2="28" stroke="#A78BFA" stroke-width="1.5"/>
    <line x1="17" y1="33" x2="30" y2="33" stroke="#A78BFA" stroke-width="1.5"/>
  </g>
  <text x="330" y="198" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#7C3AED">Explain Simply</text>

  <!-- Step 3: Find Gaps (bottom center) - Magnifying glass -->
  <g transform="translate(170, 210)">
    <rect x="0" y="0" width="60" height="55" rx="12" fill="#7C3AED"/>
    <text x="30" y="16" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="white">STEP 3</text>
    <!-- Magnifying glass icon -->
    <circle cx="26" cy="32" r="9" fill="none" stroke="white" stroke-width="2.5"/>
    <line x1="33" y1="38" x2="40" y2="45" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <text x="26" y="35" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">?</text>
  </g>
  <text x="200" y="278" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#7C3AED">Find Gaps</text>

  <!-- Step 4: Simplify (left center) - Sparkle -->
  <g transform="translate(40, 130)">
    <rect x="0" y="0" width="60" height="55" rx="12" fill="#6D28D9"/>
    <text x="30" y="16" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="white">STEP 4</text>
    <!-- Sparkle/star icon -->
    <path d="M30 24 L32 30 L38 32 L32 34 L30 40 L28 34 L22 32 L28 30Z" fill="white"/>
    <path d="M20 25 L21 27 L23 28 L21 29 L20 31 L19 29 L17 28 L19 27Z" fill="#DDD6FE"/>
    <path d="M38 38 L39 40 L41 41 L39 42 L38 44 L37 42 L35 41 L37 40Z" fill="#DDD6FE"/>
  </g>
  <text x="70" y="198" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#7C3AED">Simplify</text>

  <!-- Center circle -->
  <circle cx="200" cy="160" r="25" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="200" y="156" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="#8B5CF6">True</text>
  <text x="200" y="168" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="#8B5CF6">Understanding</text>

  <defs>
    <marker id="arrowF" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6Z" fill="#C4B5FD"/>
    </marker>
  </defs>
</svg>
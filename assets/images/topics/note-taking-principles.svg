<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="#F3F4F6"/>

  <!-- Divider line in middle -->
  <line x1="200" y1="30" x2="200" y2="270" stroke="#D1D5DB" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- LEFT SIDE: Passive Hearing -->
  <text x="100" y="28" text-anchor="middle" fill="#9CA3AF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">PASSIVE HEARING</text>

  <!-- Person silhouette (passive) -->
  <circle cx="100" cy="80" r="20" fill="#D1D5DB"/>
  <rect x="85" y="104" width="30" height="40" rx="8" fill="#D1D5DB"/>

  <!-- Ear icon (passive) -->
  <g transform="translate(55, 62)">
    <path d="M0 12 C0 4, 10 0, 16 4 C22 8, 22 18, 16 22 C13 24, 12 20, 14 18 C18 14, 18 10, 14 7 C10 4, 4 7, 4 12 C4 16, 6 18, 6 18" stroke="#9CA3AF" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Incoming waves (dull gray) -->
  <path d="M20 80 Q30 74, 40 80 Q50 86, 60 80" stroke="#D1D5DB" stroke-width="2" fill="none"/>
  <path d="M10 90 Q22 83, 34 90 Q46 97, 58 90" stroke="#D1D5DB" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M15 70 Q27 63, 39 70 Q51 77, 63 70" stroke="#D1D5DB" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Passive results: scattered/lost info -->
  <g opacity="0.4">
    <rect x="50" y="160" width="100" height="14" rx="4" fill="#D1D5DB"/>
    <text x="100" y="170" text-anchor="middle" fill="#9CA3AF" font-size="7" font-family="Arial, sans-serif">information lost...</text>
  </g>
  <g opacity="0.3">
    <rect x="60" y="182" width="80" height="14" rx="4" fill="#D1D5DB"/>
    <text x="100" y="192" text-anchor="middle" fill="#9CA3AF" font-size="7" font-family="Arial, sans-serif">forgotten...</text>
  </g>
  <g opacity="0.2">
    <rect x="55" y="204" width="90" height="14" rx="4" fill="#D1D5DB"/>
    <text x="100" y="214" text-anchor="middle" fill="#9CA3AF" font-size="7" font-family="Arial, sans-serif">no recall...</text>
  </g>

  <!-- X mark -->
  <g transform="translate(100, 240)" opacity="0.5">
    <circle cx="0" cy="0" r="14" fill="#EF4444" opacity="0.15"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- RIGHT SIDE: Active Note-Taking -->
  <text x="300" y="28" text-anchor="middle" fill="#2563EB" font-size="11" font-weight="bold" font-family="Arial, sans-serif">ACTIVE LISTENING</text>

  <!-- Person silhouette (active, with pen posture) -->
  <circle cx="280" cy="80" r="20" fill="#2563EB" opacity="0.7"/>
  <rect x="265" y="104" width="30" height="40" rx="8" fill="#2563EB" opacity="0.7"/>

  <!-- Pen in hand -->
  <g transform="translate(298, 115) rotate(30)">
    <rect x="0" y="0" width="4" height="28" rx="1" fill="#1D4ED8"/>
    <polygon points="0,28 4,28 2,34" fill="#1D4ED8"/>
  </g>

  <!-- Incoming waves (colored/active) -->
  <path d="M220 75 Q230 69, 240 75 Q250 81, 260 75" stroke="#2563EB" stroke-width="2" fill="none"/>
  <path d="M215 85 Q227 78, 239 85 Q251 92, 263 85" stroke="#2563EB" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M218 65 Q230 58, 242 65 Q254 72, 266 65" stroke="#2563EB" stroke-width="1.5" fill="none" opacity="0.7"/>

  <!-- Filter/Funnel -->
  <g transform="translate(300, 148)">
    <path d="M-25 0 L25 0 L10 20 L-10 20 Z" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
    <text x="0" y="12" text-anchor="middle" fill="#2563EB" font-size="6" font-weight="bold" font-family="Arial, sans-serif">FILTER</text>
  </g>

  <!-- Arrow from person to funnel -->
  <line x1="280" y1="145" x2="290" y2="148" stroke="#2563EB" stroke-width="1" opacity="0.5"/>

  <!-- Key ideas extracted (notepad) -->
  <rect x="265" y="175" width="70" height="70" rx="4" fill="white" stroke="#2563EB" stroke-width="1.2"/>
  <!-- Lines on notepad -->
  <rect x="272" y="184" width="55" height="2" rx="1" fill="#2563EB" opacity="0.4"/>
  <rect x="272" y="192" width="48" height="2" rx="1" fill="#2563EB" opacity="0.3"/>
  <rect x="272" y="200" width="52" height="2" rx="1" fill="#2563EB" opacity="0.4"/>
  <rect x="272" y="208" width="40" height="2" rx="1" fill="#2563EB" opacity="0.3"/>
  <rect x="272" y="216" width="50" height="2" rx="1" fill="#2563EB" opacity="0.4"/>
  <rect x="272" y="224" width="45" height="2" rx="1" fill="#2563EB" opacity="0.3"/>
  <rect x="272" y="232" width="55" height="2" rx="1" fill="#2563EB" opacity="0.4"/>

  <!-- Star highlights on notepad -->
  <text x="268" y="187" fill="#2563EB" font-size="6" font-family="Arial, sans-serif">*</text>
  <text x="268" y="203" fill="#2563EB" font-size="6" font-family="Arial, sans-serif">*</text>
  <text x="268" y="219" fill="#2563EB" font-size="6" font-family="Arial, sans-serif">*</text>

  <!-- Check mark -->
  <g transform="translate(300, 262)">
    <circle cx="0" cy="0" r="14" fill="#2563EB" opacity="0.15"/>
    <polyline points="-7,0 -2,5 7,-5" stroke="#2563EB" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- VS text -->
  <g transform="translate(200, 150)">
    <circle cx="0" cy="0" r="14" fill="white" stroke="#D1D5DB" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" fill="#6B7280" font-size="9" font-weight="bold" font-family="Arial, sans-serif">VS</text>
  </g>

  <!-- Bottom label -->
  <text x="100" y="276" text-anchor="middle" fill="#9CA3AF" font-size="8" font-family="Arial, sans-serif">Low retention</text>
  <text x="300" y="276" text-anchor="middle" fill="#2563EB" font-size="8" font-family="Arial, sans-serif">High retention</text>

  <!-- Decorative corner marks -->
  <path d="M8 8 L8 4 L12 4" stroke="#2563EB" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M392 8 L392 4 L388 4" stroke="#2563EB" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M8 292 L8 296 L12 296" stroke="#2563EB" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M392 292 L392 296 L388 296" stroke="#2563EB" stroke-width="1" fill="none" opacity="0.3"/>
</svg>
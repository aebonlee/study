<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#F3F4F6"/>

  <!-- Divider line -->
  <line x1="200" y1="30" x2="200" y2="270" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- Left side: Fixed Mindset -->
  <rect x="15" y="15" width="175" height="270" rx="10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>

  <text x="102" y="42" text-anchor="middle" fill="#64748B" font-size="13" font-family="system-ui" font-weight="700">Fixed Mindset</text>

  <!-- Brain in a box -->
  <g transform="translate(102,95)">
    <!-- Box -->
    <rect x="-30" y="-25" width="60" height="50" rx="4" fill="#94A3B8" opacity="0.2" stroke="#94A3B8" stroke-width="1.5"/>
    <!-- Brain -->
    <g fill="#94A3B8" opacity="0.6">
      <ellipse cx="-6" cy="-5" rx="12" ry="10"/>
      <ellipse cx="6" cy="-5" rx="12" ry="10"/>
      <ellipse cx="-8" cy="3" rx="8" ry="7"/>
      <ellipse cx="8" cy="3" rx="8" ry="7"/>
    </g>
    <!-- X marks / constraints -->
    <line x1="-28" y1="-23" x2="-20" y2="-15" stroke="#EF4444" stroke-width="2" opacity="0.5"/>
    <line x1="-20" y1="-23" x2="-28" y2="-15" stroke="#EF4444" stroke-width="2" opacity="0.5"/>
    <line x1="20" y1="-23" x2="28" y2="-15" stroke="#EF4444" stroke-width="2" opacity="0.5"/>
    <line x1="28" y1="-23" x2="20" y2="-15" stroke="#EF4444" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Walls -->
  <g transform="translate(102,155)">
    <rect x="-35" y="-10" width="70" height="24" rx="2" fill="#94A3B8" opacity="0.15"/>
    <!-- Brick pattern -->
    <line x1="-35" y1="-2" x2="35" y2="-2" stroke="#94A3B8" stroke-width="0.5" opacity="0.3"/>
    <line x1="-35" y1="6" x2="35" y2="6" stroke="#94A3B8" stroke-width="0.5" opacity="0.3"/>
    <line x1="-10" y1="-10" x2="-10" y2="-2" stroke="#94A3B8" stroke-width="0.5" opacity="0.3"/>
    <line x1="15" y1="-10" x2="15" y2="-2" stroke="#94A3B8" stroke-width="0.5" opacity="0.3"/>
    <line x1="0" y1="-2" x2="0" y2="6" stroke="#94A3B8" stroke-width="0.5" opacity="0.3"/>
    <line x1="25" y1="-2" x2="25" y2="6" stroke="#94A3B8" stroke-width="0.5" opacity="0.3"/>
    <line x1="-20" y1="6" x2="-20" y2="14" stroke="#94A3B8" stroke-width="0.5" opacity="0.3"/>
    <line x1="10" y1="6" x2="10" y2="14" stroke="#94A3B8" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Locked padlock -->
  <g transform="translate(102,205)">
    <rect x="-12" y="0" width="24" height="18" rx="3" fill="#94A3B8"/>
    <path d="M-7,0 L-7,-8 A7,7 0 0,1 7,-8 L7,0" fill="none" stroke="#64748B" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="9" r="3" fill="#64748B"/>
    <rect x="-1" y="9" width="2" height="5" rx="1" fill="#64748B"/>
  </g>

  <!-- Sad face label -->
  <g transform="translate(102,248)">
    <circle cx="-6" cy="0" r="1.5" fill="#94A3B8"/>
    <circle cx="6" cy="0" r="1.5" fill="#94A3B8"/>
    <path d="M-6,5 Q0,2 6,5" stroke="#94A3B8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Right side: Growth Mindset -->
  <rect x="210" y="15" width="175" height="270" rx="10" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1" opacity="0.8"/>

  <text x="298" y="42" text-anchor="middle" fill="#F59E0B" font-size="13" font-family="system-ui" font-weight="700">Growth Mindset</text>

  <!-- Brain with expanding arrows -->
  <g transform="translate(298,95)">
    <!-- Glow effect -->
    <circle cx="0" cy="-2" r="28" fill="#F59E0B" opacity="0.08"/>
    <!-- Brain -->
    <g fill="#F59E0B" opacity="0.7">
      <ellipse cx="-6" cy="-5" rx="12" ry="10"/>
      <ellipse cx="6" cy="-5" rx="12" ry="10"/>
      <ellipse cx="-8" cy="3" rx="8" ry="7"/>
      <ellipse cx="8" cy="3" rx="8" ry="7"/>
    </g>
    <!-- Expanding arrows -->
    <g stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.6">
      <line x1="-22" y1="-18" x2="-30" y2="-24"/>
      <line x1="-30" y1="-24" x2="-25" y2="-23"/>
      <line x1="-30" y1="-24" x2="-29" y2="-19"/>

      <line x1="22" y1="-18" x2="30" y2="-24"/>
      <line x1="30" y1="-24" x2="25" y2="-23"/>
      <line x1="30" y1="-24" x2="29" y2="-19"/>

      <line x1="-20" y1="12" x2="-28" y2="18"/>
      <line x1="-28" y1="18" x2="-23" y2="17"/>
      <line x1="-28" y1="18" x2="-27" y2="13"/>

      <line x1="20" y1="12" x2="28" y2="18"/>
      <line x1="28" y1="18" x2="23" y2="17"/>
      <line x1="28" y1="18" x2="27" y2="13"/>
    </g>
    <!-- Sparkles around brain -->
    <circle cx="-32" cy="-5" r="2" fill="#FBBF24" opacity="0.5"/>
    <circle cx="32" cy="-5" r="2" fill="#FBBF24" opacity="0.5"/>
    <circle cx="0" cy="-28" r="2" fill="#FBBF24" opacity="0.5"/>
  </g>

  <!-- Open doors -->
  <g transform="translate(298,155)">
    <!-- Door frame -->
    <rect x="-25" y="-12" width="50" height="28" rx="2" fill="#F59E0B" opacity="0.1"/>
    <!-- Left door open -->
    <g transform="skewY(5)">
      <rect x="-25" y="-12" width="20" height="28" rx="1" fill="#F59E0B" opacity="0.25"/>
    </g>
    <!-- Right door open -->
    <g transform="skewY(-5)">
      <rect x="5" y="-12" width="20" height="28" rx="1" fill="#F59E0B" opacity="0.25"/>
    </g>
    <!-- Light rays coming through -->
    <line x1="0" y1="-8" x2="0" y2="12" stroke="#F59E0B" stroke-width="1" opacity="0.3"/>
    <line x1="-8" y1="-4" x2="-15" y2="12" stroke="#F59E0B" stroke-width="1" opacity="0.2"/>
    <line x1="8" y1="-4" x2="15" y2="12" stroke="#F59E0B" stroke-width="1" opacity="0.2"/>
    <!-- Arrow through door -->
    <line x1="0" y1="8" x2="0" y2="-6" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <polyline points="-4,-2 0,-8 4,-2" stroke="#F59E0B" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  </g>

  <!-- Unlocked padlock -->
  <g transform="translate(298,205)">
    <rect x="-12" y="0" width="24" height="18" rx="3" fill="#F59E0B"/>
    <path d="M-7,0 L-7,-8 A7,7 0 0,1 7,-8 L7,-3" fill="none" stroke="#D97706" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="9" r="3" fill="#D97706"/>
    <!-- Checkmark instead of keyhole -->
    <polyline points="-3,9 -1,12 4,6" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Happy face label -->
  <g transform="translate(298,248)">
    <circle cx="-6" cy="0" r="1.5" fill="#F59E0B"/>
    <circle cx="6" cy="0" r="1.5" fill="#F59E0B"/>
    <path d="M-6,3 Q0,7 6,3" stroke="#F59E0B" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- VS in center -->
  <g transform="translate(200,150)">
    <circle cx="0" cy="0" r="14" fill="white" stroke="#CBD5E1" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" fill="#94A3B8" font-size="11" font-family="system-ui" font-weight="700">VS</text>
  </g>
</svg>

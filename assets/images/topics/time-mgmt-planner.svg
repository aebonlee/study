<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#F3F4F6"/>

  <!-- Title -->
  <text x="200" y="26" text-anchor="middle" fill="#334155" font-size="14" font-family="system-ui" font-weight="700">Paper vs Digital Planner</text>

  <!-- VS badge -->
  <circle cx="200" cy="148" r="20" fill="#0891B2"/>
  <text x="200" y="153" text-anchor="middle" fill="white" font-size="14" font-family="system-ui" font-weight="800">VS</text>

  <!-- LEFT: Paper Planner -->
  <!-- Notebook body -->
  <rect x="30" y="50" width="130" height="175" rx="6" fill="white" stroke="#CBD5E1" stroke-width="1.5"/>
  <!-- Spiral binding -->
  <circle cx="35" cy="70" r="4" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
  <circle cx="35" cy="90" r="4" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
  <circle cx="35" cy="110" r="4" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
  <circle cx="35" cy="130" r="4" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
  <circle cx="35" cy="150" r="4" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
  <circle cx="35" cy="170" r="4" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
  <circle cx="35" cy="190" r="4" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
  <circle cx="35" cy="210" r="4" fill="none" stroke="#94A3B8" stroke-width="1.5"/>

  <!-- Handwritten schedule lines -->
  <text x="55" y="72" fill="#065F73" font-size="9" font-family="system-ui" font-weight="600">Mon</text>
  <line x1="55" y1="80" x2="145" y2="80" stroke="#CBD5E1" stroke-width="0.5"/>
  <path d="M75,77 Q80,72 85,78 Q90,82 95,76" stroke="#334155" stroke-width="1" fill="none" stroke-linecap="round"/>
  <text x="55" y="100" fill="#065F73" font-size="9" font-family="system-ui" font-weight="600">Tue</text>
  <line x1="55" y1="108" x2="145" y2="108" stroke="#CBD5E1" stroke-width="0.5"/>
  <path d="M75,105 Q82,100 90,106 Q98,110 105,103" stroke="#334155" stroke-width="1" fill="none" stroke-linecap="round"/>
  <text x="55" y="128" fill="#065F73" font-size="9" font-family="system-ui" font-weight="600">Wed</text>
  <line x1="55" y1="136" x2="145" y2="136" stroke="#CBD5E1" stroke-width="0.5"/>
  <path d="M75,133 Q83,128 92,134" stroke="#334155" stroke-width="1" fill="none" stroke-linecap="round"/>
  <text x="55" y="156" fill="#065F73" font-size="9" font-family="system-ui" font-weight="600">Thu</text>
  <line x1="55" y1="164" x2="145" y2="164" stroke="#CBD5E1" stroke-width="0.5"/>
  <path d="M75,161 Q85,155 95,162 Q100,165 110,159" stroke="#334155" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Colored sticky tabs on right edge -->
  <rect x="148" y="55" width="12" height="20" rx="2" fill="#F59E0B" opacity="0.8"/>
  <rect x="148" y="95" width="12" height="20" rx="2" fill="#10B981" opacity="0.8"/>
  <rect x="148" y="135" width="12" height="20" rx="2" fill="#EF4444" opacity="0.8"/>
  <rect x="148" y="175" width="12" height="20" rx="2" fill="#8B5CF6" opacity="0.8"/>

  <!-- Pen -->
  <g transform="translate(110,195) rotate(-30)">
    <rect x="0" y="0" width="55" height="6" rx="1" fill="#0891B2"/>
    <polygon points="0,0 -8,3 0,6" fill="#334155"/>
    <rect x="45" y="0" width="10" height="6" rx="1" fill="#065F73"/>
  </g>

  <!-- Pros under paper -->
  <text x="95" y="243" text-anchor="middle" fill="#065F73" font-size="8" font-family="system-ui" font-weight="600">+ Memory retention</text>
  <text x="95" y="255" text-anchor="middle" fill="#065F73" font-size="8" font-family="system-ui" font-weight="600">+ No distractions</text>
  <text x="95" y="267" text-anchor="middle" fill="#065F73" font-size="8" font-family="system-ui" font-weight="600">+ Flexible format</text>

  <!-- RIGHT: Digital Planner -->
  <!-- Smartphone body -->
  <rect x="240" y="50" width="130" height="175" rx="14" fill="#1E293B"/>
  <rect x="246" y="62" width="118" height="150" rx="4" fill="white"/>
  <!-- Notch -->
  <rect x="280" y="52" width="50" height="6" rx="3" fill="#334155"/>

  <!-- Calendar header -->
  <rect x="246" y="62" width="118" height="22" rx="4" fill="#0891B2"/>
  <text x="305" y="77" text-anchor="middle" fill="white" font-size="9" font-family="system-ui" font-weight="600">April 2026</text>

  <!-- Time blocks -->
  <rect x="252" y="90" width="106" height="16" rx="3" fill="#0891B2" opacity="0.8"/>
  <text x="258" y="101" fill="white" font-size="7" font-family="system-ui">9:00  Study - Math</text>

  <rect x="252" y="110" width="106" height="16" rx="3" fill="#10B981" opacity="0.7"/>
  <text x="258" y="121" fill="white" font-size="7" font-family="system-ui">11:00  Exercise</text>

  <rect x="252" y="130" width="106" height="12" rx="3" fill="#94A3B8" opacity="0.5"/>
  <text x="258" y="139" fill="white" font-size="7" font-family="system-ui">12:00  Lunch</text>

  <rect x="252" y="146" width="106" height="16" rx="3" fill="#8B5CF6" opacity="0.7"/>
  <text x="258" y="157" fill="white" font-size="7" font-family="system-ui">1:00  Study - CS</text>

  <rect x="252" y="166" width="106" height="16" rx="3" fill="#F59E0B" opacity="0.7"/>
  <text x="258" y="177" fill="white" font-size="7" font-family="system-ui">3:00  Review</text>

  <rect x="252" y="186" width="106" height="16" rx="3" fill="#0891B2" opacity="0.4"/>
  <text x="258" y="197" fill="#334155" font-size="7" font-family="system-ui">5:00  Free Time</text>

  <!-- Pros under digital -->
  <text x="305" y="243" text-anchor="middle" fill="#065F73" font-size="8" font-family="system-ui" font-weight="600">+ Reminders & alerts</text>
  <text x="305" y="255" text-anchor="middle" fill="#065F73" font-size="8" font-family="system-ui" font-weight="600">+ Easy recurring events</text>
  <text x="305" y="267" text-anchor="middle" fill="#065F73" font-size="8" font-family="system-ui" font-weight="600">+ Search & sync</text>

  <!-- Label -->
  <text x="95" y="285" text-anchor="middle" fill="#94A3B8" font-size="9" font-family="system-ui" font-weight="600">Paper Planner</text>
  <text x="305" y="285" text-anchor="middle" fill="#94A3B8" font-size="9" font-family="system-ui" font-weight="600">Digital Planner</text>
</svg>
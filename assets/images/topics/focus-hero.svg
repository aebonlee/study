<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <radialGradient id="focus-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D97706" stop-opacity="0.08"/>
      <stop offset="70%" stop-color="#D97706" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="100%" stop-color="#FEF3C7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="16" fill="url(#bg)"/>
  <rect width="800" height="400" rx="16" fill="url(#focus-glow)"/>

  <!-- Concentric focus rings -->
  <circle cx="400" cy="190" r="170" fill="none" stroke="#D97706" stroke-width="1" opacity="0.08" stroke-dasharray="8,4"/>
  <circle cx="400" cy="190" r="145" fill="none" stroke="#D97706" stroke-width="1" opacity="0.12" stroke-dasharray="6,4"/>
  <circle cx="400" cy="190" r="120" fill="#D97706" opacity="0.03"/>
  <circle cx="400" cy="190" r="120" fill="none" stroke="#D97706" stroke-width="1.5" opacity="0.15"/>
  <circle cx="400" cy="190" r="90" fill="#D97706" opacity="0.05"/>
  <circle cx="400" cy="190" r="90" fill="none" stroke="#D97706" stroke-width="2" opacity="0.2"/>
  <circle cx="400" cy="190" r="55" fill="#D97706" opacity="0.07"/>
  <circle cx="400" cy="190" r="55" fill="none" stroke="#D97706" stroke-width="2.5" opacity="0.3"/>

  <!-- Person meditating in center -->
  <g transform="translate(400,190)">
    <!-- Head -->
    <circle cx="0" cy="-30" r="13" fill="#D97706" opacity="0.75"/>
    <!-- Body -->
    <path d="M0,-17 L0,5" stroke="#D97706" stroke-width="3.5" stroke-linecap="round" opacity="0.75"/>
    <!-- Arms -->
    <path d="M0,-8 Q-14,-3 -26,8" stroke="#D97706" stroke-width="2.8" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M0,-8 Q14,-3 26,8" stroke="#D97706" stroke-width="2.8" fill="none" stroke-linecap="round" opacity="0.7"/>
    <!-- Legs crossed -->
    <path d="M0,5 Q-10,14 -24,17" stroke="#D97706" stroke-width="2.8" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M0,5 Q10,14 24,17" stroke="#D97706" stroke-width="2.8" fill="none" stroke-linecap="round" opacity="0.7"/>
    <!-- Hands -->
    <circle cx="-26" cy="10" r="4" fill="#D97706" opacity="0.5"/>
    <circle cx="26" cy="10" r="4" fill="#D97706" opacity="0.5"/>
  </g>

  <!-- Animated pulse waves -->
  <circle cx="400" cy="190" r="45" fill="none" stroke="#D97706" stroke-width="0.8" opacity="0.15">
    <animate attributeName="r" from="45" to="65" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.15" to="0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="190" r="45" fill="none" stroke="#D97706" stroke-width="0.8" opacity="0.15">
    <animate attributeName="r" from="45" to="65" dur="3s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.15" to="0" dur="3s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="190" r="45" fill="none" stroke="#D97706" stroke-width="0.8" opacity="0.15">
    <animate attributeName="r" from="45" to="65" dur="3s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.15" to="0" dur="3s" begin="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Distraction: Phone (top-left) -->
  <g transform="translate(185,75) rotate(12)">
    <rect x="-16" y="-25" width="32" height="50" rx="5" fill="#EF4444" opacity="0.12" stroke="#EF4444" stroke-width="1" stroke-opacity="0.25"/>
    <rect x="-12" y="-19" width="24" height="34" rx="2" fill="white" opacity="0.25"/>
    <circle cx="8" cy="-16" r="5" fill="#EF4444" opacity="0.5"/>
    <text x="8" y="-13" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="6" font-weight="700">3</text>
  </g>
  <!-- Shield blocking phone -->
  <g transform="translate(232,108)">
    <circle cx="0" cy="0" r="11" fill="#D97706" opacity="0.12"/>
    <path d="M0,-7 L6,0 L0,7 L-6,0 Z" fill="#D97706" opacity="0.35"/>
  </g>
  <!-- Deflection lines -->
  <g stroke="#EF4444" stroke-width="1.2" stroke-linecap="round" opacity="0.3">
    <line x1="165" y1="55" x2="150" y2="42"/>
    <line x1="160" y1="68" x2="142" y2="62"/>
  </g>

  <!-- Distraction: Social media (top-right) -->
  <g transform="translate(600,68)">
    <path d="M-13,-13 Q-13,-22 0,-22 Q13,-22 13,-13 Q13,-4 0,-4 L-4,4 L-2,-4 Q-13,-4 -13,-13Z" fill="#8B5CF6" opacity="0.2" stroke="#8B5CF6" stroke-width="1" stroke-opacity="0.25"/>
    <path d="M-3,-15 Q-3,-19 0,-16 Q3,-19 3,-15 Q3,-11 0,-9 Q-3,-11 -3,-15Z" fill="#8B5CF6" opacity="0.35"/>
  </g>
  <g transform="translate(558,98)">
    <circle cx="0" cy="0" r="11" fill="#D97706" opacity="0.12"/>
    <path d="M0,-7 L6,0 L0,7 L-6,0 Z" fill="#D97706" opacity="0.35"/>
  </g>
  <g stroke="#8B5CF6" stroke-width="1.2" stroke-linecap="round" opacity="0.25">
    <line x1="618" y1="52" x2="632" y2="40"/>
    <line x1="622" y1="65" x2="640" y2="60"/>
  </g>

  <!-- Distraction: Email (right) -->
  <g transform="translate(625,200)">
    <rect x="-16" y="-10" width="32" height="20" rx="3" fill="#3B82F6" opacity="0.12" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.25"/>
    <path d="M-14,-8 L0,2 L14,-8" stroke="#3B82F6" stroke-width="1.2" fill="none" opacity="0.35"/>
    <circle cx="12" cy="-8" r="4" fill="#EF4444" opacity="0.45"/>
    <text x="12" y="-5" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="5" font-weight="700">!</text>
  </g>
  <g transform="translate(575,198)">
    <circle cx="0" cy="0" r="11" fill="#D97706" opacity="0.12"/>
    <path d="M0,-7 L6,0 L0,7 L-6,0 Z" fill="#D97706" opacity="0.35"/>
  </g>
  <g stroke="#3B82F6" stroke-width="1.2" stroke-linecap="round" opacity="0.25">
    <line x1="645" y1="188" x2="660" y2="180"/>
    <line x1="648" y1="202" x2="665" y2="200"/>
  </g>

  <!-- Distraction: Game (left) -->
  <g transform="translate(168,205)">
    <rect x="-18" y="-10" width="36" height="20" rx="10" fill="#EC4899" opacity="0.1" stroke="#EC4899" stroke-width="1" stroke-opacity="0.2"/>
    <rect x="-10" y="-3" width="7" height="2" rx="1" fill="#EC4899" opacity="0.25"/>
    <rect x="-8" y="-6" width="2" height="7" rx="1" fill="#EC4899" opacity="0.25"/>
    <circle cx="7" cy="-2" r="1.8" fill="#EC4899" opacity="0.25"/>
    <circle cx="11" cy="1" r="1.8" fill="#EC4899" opacity="0.25"/>
  </g>
  <g transform="translate(228,198)">
    <circle cx="0" cy="0" r="11" fill="#D97706" opacity="0.12"/>
    <path d="M0,-7 L6,0 L0,7 L-6,0 Z" fill="#D97706" opacity="0.35"/>
  </g>
  <g stroke="#EC4899" stroke-width="1.2" stroke-linecap="round" opacity="0.25">
    <line x1="145" y1="198" x2="130" y2="190"/>
    <line x1="142" y1="212" x2="125" y2="210"/>
  </g>

  <!-- Distraction: News (bottom-left) -->
  <g transform="translate(200,315)">
    <rect x="-14" y="-14" width="28" height="28" rx="4" fill="#F59E0B" opacity="0.1" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.18"/>
    <circle cx="-6" cy="6" r="2.5" fill="#F59E0B" opacity="0.3"/>
    <path d="M-6,0 Q0,0 0,6" stroke="#F59E0B" stroke-width="1.2" fill="none" opacity="0.25"/>
    <path d="M-6,-6 Q6,-6 6,6" stroke="#F59E0B" stroke-width="1.2" fill="none" opacity="0.2"/>
  </g>
  <g transform="translate(242,290)">
    <circle cx="0" cy="0" r="9" fill="#D97706" opacity="0.12"/>
    <path d="M0,-5 L5,0 L0,5 L-5,0 Z" fill="#D97706" opacity="0.35"/>
  </g>

  <!-- Distraction: Music (bottom-right) -->
  <g transform="translate(585,315)">
    <circle cx="0" cy="0" r="14" fill="#10B981" opacity="0.08" stroke="#10B981" stroke-width="1" stroke-opacity="0.18"/>
    <path d="M-2,-4 L-2,-11 L5,-13 L5,-6" stroke="#10B981" stroke-width="1.3" fill="none" opacity="0.35"/>
    <circle cx="-4" cy="-3" r="2.5" fill="#10B981" opacity="0.25"/>
    <circle cx="3" cy="-5" r="2.5" fill="#10B981" opacity="0.25"/>
  </g>
  <g transform="translate(548,290)">
    <circle cx="0" cy="0" r="9" fill="#D97706" opacity="0.12"/>
    <path d="M0,-5 L5,0 L0,5 L-5,0 Z" fill="#D97706" opacity="0.35"/>
  </g>

  <!-- Checkmark at bottom of focus zone -->
  <g transform="translate(400,235)">
    <circle cx="0" cy="0" r="10" fill="#D97706" opacity="0.15"/>
    <polyline points="-5,0 -1,4 6,-4" stroke="#D97706" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  </g>

  <!-- Zone labels -->
  <text x="400" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#92400E" opacity="0.5">FOCUS ZONE</text>
  <text x="400" y="358" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#B45309" opacity="0.4">Block distractions, deepen concentration</text>

  <!-- Subtle corner decorations -->
  <circle cx="55" cy="40" r="3" fill="#D97706" opacity="0.1"/>
  <circle cx="38" cy="60" r="2" fill="#D97706" opacity="0.07"/>
  <circle cx="745" cy="40" r="3" fill="#D97706" opacity="0.1"/>
  <circle cx="762" cy="60" r="2" fill="#D97706" opacity="0.07"/>
  <circle cx="55" cy="360" r="3" fill="#D97706" opacity="0.1"/>
  <circle cx="745" cy="360" r="3" fill="#D97706" opacity="0.1"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="#F3F4F6"/>

  <!-- Title -->
  <text x="200" y="28" text-anchor="middle" fill="#D97706" font-size="12" font-weight="bold" font-family="Arial, sans-serif">THREE TYPES OF ATTENTION</text>

  <!-- ===== 1. Sustained Attention (left) ===== -->
  <g transform="translate(20, 55)">
    <!-- Background card -->
    <rect x="0" y="0" width="110" height="210" rx="8" fill="white" stroke="#D97706" stroke-width="1" opacity="0.8"/>

    <!-- Label -->
    <text x="55" y="22" text-anchor="middle" fill="#D97706" font-size="9" font-weight="bold" font-family="Arial, sans-serif">Sustained</text>
    <text x="55" y="34" text-anchor="middle" fill="#92400E" font-size="7" font-family="Arial, sans-serif">Long-duration focus</text>

    <!-- Flashlight shape -->
    <g transform="translate(55, 85)">
      <!-- Flashlight body -->
      <rect x="-8" y="-12" width="16" height="24" rx="4" fill="#D97706" opacity="0.8"/>
      <rect x="-6" y="-16" width="12" height="6" rx="2" fill="#D97706"/>
      <!-- Lens -->
      <ellipse cx="0" cy="-18" rx="7" ry="3" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
    </g>

    <!-- Straight beam (sustained) -->
    <line x1="55" y1="100" x2="55" y2="180" stroke="#D97706" stroke-width="8" opacity="0.15"/>
    <line x1="55" y1="100" x2="55" y2="180" stroke="#D97706" stroke-width="4" opacity="0.25"/>
    <line x1="55" y1="100" x2="55" y2="180" stroke="#D97706" stroke-width="1.5" opacity="0.5"/>

    <!-- Straight arrow at end -->
    <polygon points="55,185 50,175 60,175" fill="#D97706" opacity="0.5"/>

    <!-- Duration indicator -->
    <text x="55" y="200" text-anchor="middle" fill="#D97706" font-size="7" font-family="Arial, sans-serif" opacity="0.8">~20 min continuous</text>
  </g>

  <!-- ===== 2. Selective Attention (center) ===== -->
  <g transform="translate(145, 55)">
    <!-- Background card -->
    <rect x="0" y="0" width="110" height="210" rx="8" fill="white" stroke="#D97706" stroke-width="1" opacity="0.8"/>

    <!-- Label -->
    <text x="55" y="22" text-anchor="middle" fill="#D97706" font-size="9" font-weight="bold" font-family="Arial, sans-serif">Selective</text>
    <text x="55" y="34" text-anchor="middle" fill="#92400E" font-size="7" font-family="Arial, sans-serif">Spotlight on one item</text>

    <!-- Multiple items scattered -->
    <circle cx="25" cy="75" r="8" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1"/>
    <rect x="70" y="60" width="16" height="16" rx="2" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1"/>
    <circle cx="80" cy="110" r="8" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1"/>
    <rect x="20" y="105" width="16" height="16" rx="2" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1"/>

    <!-- Highlighted target item -->
    <circle cx="55" cy="90" r="12" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
    <text x="55" y="93" text-anchor="middle" fill="#D97706" font-size="8" font-weight="bold" font-family="Arial, sans-serif">!</text>

    <!-- Spotlight cone from above -->
    <path d="M55 50 L35 80 L75 80 Z" fill="#D97706" opacity="0.08"/>
    <path d="M55 50 L40 75 L70 75 Z" fill="#D97706" opacity="0.1"/>

    <!-- Spotlight source -->
    <circle cx="55" cy="48" r="5" fill="#D97706" opacity="0.3"/>

    <!-- "Cocktail Party" label -->
    <g transform="translate(55, 145)">
      <rect x="-40" y="-8" width="80" height="16" rx="4" fill="#FEF3C7" opacity="0.5"/>
      <text x="0" y="-1" text-anchor="middle" fill="#92400E" font-size="6" font-family="Arial, sans-serif">Cocktail Party Effect</text>
    </g>

    <!-- Multiple sound waves (dimmed) + one highlighted -->
    <g opacity="0.25">
      <path d="M15 165 Q22 160, 29 165" stroke="#9CA3AF" stroke-width="1.2" fill="none"/>
      <path d="M75 170 Q82 165, 89 170" stroke="#9CA3AF" stroke-width="1.2" fill="none"/>
    </g>
    <path d="M42 168 Q50 162, 58 168" stroke="#D97706" stroke-width="2" fill="none"/>
    <path d="M45 175 Q52 170, 59 175" stroke="#D97706" stroke-width="1.5" fill="none" opacity="0.6"/>

    <text x="55" y="200" text-anchor="middle" fill="#D97706" font-size="7" font-family="Arial, sans-serif" opacity="0.8">Focus on what matters</text>
  </g>

  <!-- ===== 3. Divided Attention (right) ===== -->
  <g transform="translate(270, 55)">
    <!-- Background card -->
    <rect x="0" y="0" width="110" height="210" rx="8" fill="white" stroke="#D97706" stroke-width="1" opacity="0.8"/>

    <!-- Label -->
    <text x="55" y="22" text-anchor="middle" fill="#D97706" font-size="9" font-weight="bold" font-family="Arial, sans-serif">Divided</text>
    <text x="55" y="34" text-anchor="middle" fill="#92400E" font-size="7" font-family="Arial, sans-serif">Split beam = weaker</text>

    <!-- Source point -->
    <circle cx="55" cy="55" r="6" fill="#D97706" opacity="0.3"/>

    <!-- Split beam left (dimmer) -->
    <path d="M50 60 L20 120" stroke="#D97706" stroke-width="4" opacity="0.12"/>
    <path d="M50 60 L20 120" stroke="#D97706" stroke-width="1.5" opacity="0.25"/>

    <!-- Split beam right (dimmer) -->
    <path d="M60 60 L90 120" stroke="#D97706" stroke-width="4" opacity="0.12"/>
    <path d="M60 60 L90 120" stroke="#D97706" stroke-width="1.5" opacity="0.25"/>

    <!-- Target A (left) -->
    <rect x="8" y="122" width="28" height="22" rx="4" fill="#FEF3C7" opacity="0.4" stroke="#D97706" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="22" y="136" text-anchor="middle" fill="#D97706" font-size="8" font-family="Arial, sans-serif" opacity="0.6">A</text>

    <!-- Target B (right) -->
    <rect x="76" y="122" width="28" height="22" rx="4" fill="#FEF3C7" opacity="0.4" stroke="#D97706" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="90" y="136" text-anchor="middle" fill="#D97706" font-size="8" font-family="Arial, sans-serif" opacity="0.6">B</text>

    <!-- Warning: dimmer/weaker indicator -->
    <g transform="translate(55, 165)">
      <rect x="-35" y="-8" width="70" height="16" rx="4" fill="#FEF3C7" opacity="0.3"/>
      <text x="0" y="-1" text-anchor="middle" fill="#92400E" font-size="6" font-family="Arial, sans-serif">~40% productivity loss</text>
    </g>

    <!-- Rapid switching arrows -->
    <g transform="translate(55, 188)" opacity="0.5">
      <line x1="-15" y1="0" x2="15" y2="0" stroke="#D97706" stroke-width="1.2"/>
      <polygon points="15,0 11,-2.5 11,2.5" fill="#D97706"/>
      <polygon points="-15,0 -11,-2.5 -11,2.5" fill="#D97706"/>
      <text x="0" y="12" text-anchor="middle" fill="#92400E" font-size="6" font-family="Arial, sans-serif">Task switching</text>
    </g>
  </g>

  <!-- Bottom comparison bar -->
  <g transform="translate(30, 278)">
    <!-- Effectiveness gradient -->
    <rect x="0" y="0" width="340" height="6" rx="3" fill="#E5E7EB"/>
    <rect x="0" y="0" width="300" height="6" rx="3" fill="#D97706" opacity="0.2"/>
    <rect x="0" y="0" width="200" height="6" rx="3" fill="#D97706" opacity="0.35"/>
    <rect x="0" y="0" width="100" height="6" rx="3" fill="#D97706" opacity="0.5"/>

    <text x="0" y="18" fill="#D97706" font-size="6" font-family="Arial, sans-serif">Most effective</text>
    <text x="340" y="18" text-anchor="end" fill="#9CA3AF" font-size="6" font-family="Arial, sans-serif">Least effective</text>
  </g>

  <!-- Decorative corner marks -->
  <path d="M8 8 L8 4 L12 4" stroke="#D97706" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M392 8 L392 4 L388 4" stroke="#D97706" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M8 292 L8 296 L12 296" stroke="#D97706" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M392 292 L392 296 L388 296" stroke="#D97706" stroke-width="1" fill="none" opacity="0.3"/>
</svg>
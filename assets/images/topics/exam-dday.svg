<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="#F3F4F6"/>

  <!-- Title -->
  <text x="200" y="24" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#9F1239" text-anchor="middle">D-day Exam Preparation</text>

  <!-- LEFT: Checklist Card -->
  <rect x="15" y="38" width="155" height="180" rx="10" fill="white" stroke="#E11D48" stroke-width="1.5"/>
  <rect x="15" y="38" width="155" height="28" rx="10" fill="#E11D48"/>
  <rect x="15" y="56" width="155" height="10" fill="#E11D48"/>
  <text x="92" y="56" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">D-day Checklist</text>

  <!-- Checklist items -->
  <!-- Item 1: ID card -->
  <rect x="30" y="78" width="12" height="12" rx="3" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <path d="M33 84 L35 87 L39 81" fill="none" stroke="#10B981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="48" y="88" font-family="Arial, sans-serif" font-size="9" fill="#374151">ID Card</text>
  <text x="145" y="88" font-family="Arial, sans-serif" font-size="10" fill="#10B981" text-anchor="end">&#10003;</text>

  <!-- Item 2: Pens -->
  <rect x="30" y="98" width="12" height="12" rx="3" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <path d="M33 104 L35 107 L39 101" fill="none" stroke="#10B981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="48" y="108" font-family="Arial, sans-serif" font-size="9" fill="#374151">Pens (2+)</text>
  <text x="145" y="108" font-family="Arial, sans-serif" font-size="10" fill="#10B981" text-anchor="end">&#10003;</text>

  <!-- Item 3: Watch -->
  <rect x="30" y="118" width="12" height="12" rx="3" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <path d="M33 124 L35 127 L39 121" fill="none" stroke="#10B981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="48" y="128" font-family="Arial, sans-serif" font-size="9" fill="#374151">Watch</text>
  <text x="145" y="128" font-family="Arial, sans-serif" font-size="10" fill="#10B981" text-anchor="end">&#10003;</text>

  <!-- Item 4: Snack -->
  <rect x="30" y="138" width="12" height="12" rx="3" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <path d="M33 144 L35 147 L39 141" fill="none" stroke="#10B981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="48" y="148" font-family="Arial, sans-serif" font-size="9" fill="#374151">Snack &amp; Water</text>
  <text x="145" y="148" font-family="Arial, sans-serif" font-size="10" fill="#10B981" text-anchor="end">&#10003;</text>

  <!-- Item 5: Alarm -->
  <rect x="30" y="158" width="12" height="12" rx="3" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <path d="M33 164 L35 167 L39 161" fill="none" stroke="#10B981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="48" y="168" font-family="Arial, sans-serif" font-size="9" fill="#374151">Alarm (x2)</text>
  <text x="145" y="168" font-family="Arial, sans-serif" font-size="10" fill="#10B981" text-anchor="end">&#10003;</text>

  <!-- Item 6: Summary Notes -->
  <rect x="30" y="178" width="12" height="12" rx="3" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <path d="M33 184 L35 187 L39 181" fill="none" stroke="#10B981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="48" y="188" font-family="Arial, sans-serif" font-size="9" fill="#374151">Summary Notes</text>
  <text x="145" y="188" font-family="Arial, sans-serif" font-size="10" fill="#10B981" text-anchor="end">&#10003;</text>

  <!-- Progress bar -->
  <rect x="25" y="200" width="135" height="6" rx="3" fill="#E5E7EB"/>
  <rect x="25" y="200" width="135" height="6" rx="3" fill="#10B981"/>
  <text x="92" y="214" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#10B981" text-anchor="middle">100% Ready!</text>

  <!-- CENTER-RIGHT TOP: Wake-up Clock -->
  <rect x="185" y="38" width="100" height="90" rx="10" fill="white" stroke="#FECDD3" stroke-width="1.5"/>
  <text x="235" y="54" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#9F1239" text-anchor="middle">Wake Up</text>

  <!-- Clock face -->
  <circle cx="235" cy="85" r="25" fill="#FFF1F2" stroke="#E11D48" stroke-width="2"/>
  <!-- Clock numbers -->
  <text x="235" y="67" font-family="Arial, sans-serif" font-size="6" fill="#9F1239" text-anchor="middle">12</text>
  <text x="256" y="89" font-family="Arial, sans-serif" font-size="6" fill="#9F1239" text-anchor="middle">3</text>
  <text x="235" y="109" font-family="Arial, sans-serif" font-size="6" fill="#9F1239" text-anchor="middle">6</text>
  <text x="214" y="89" font-family="Arial, sans-serif" font-size="6" fill="#9F1239" text-anchor="middle">9</text>
  <!-- Hour hand pointing to ~7 -->
  <line x1="235" y1="85" x2="227" y2="100" stroke="#E11D48" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Minute hand pointing to 12 -->
  <line x1="235" y1="85" x2="235" y2="67" stroke="#E11D48" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="235" cy="85" r="2" fill="#E11D48"/>
  <!-- Alarm bell icon on top -->
  <circle cx="224" cy="60" r="4" fill="none" stroke="#E11D48" stroke-width="1"/>
  <circle cx="246" cy="60" r="4" fill="none" stroke="#E11D48" stroke-width="1"/>

  <text x="235" y="122" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#E11D48" text-anchor="middle">2hrs Before Exam</text>

  <!-- RIGHT TOP: Breathing Exercise -->
  <rect x="295" y="38" width="95" height="90" rx="10" fill="white" stroke="#FECDD3" stroke-width="1.5"/>
  <text x="342" y="54" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#9F1239" text-anchor="middle">Stay Calm</text>

  <!-- Person doing breathing (simple figure) -->
  <!-- Head -->
  <circle cx="342" cy="72" r="8" fill="#FECDD3" stroke="#E11D48" stroke-width="1"/>
  <!-- Closed eyes (relaxed) -->
  <path d="M337 71 Q339 73 341 71" fill="none" stroke="#E11D48" stroke-width="0.8"/>
  <path d="M343 71 Q345 73 347 71" fill="none" stroke="#E11D48" stroke-width="0.8"/>
  <!-- Slight smile -->
  <path d="M339 75 Q342 77 345 75" fill="none" stroke="#E11D48" stroke-width="0.8"/>
  <!-- Body -->
  <line x1="342" y1="80" x2="342" y2="100" stroke="#E11D48" stroke-width="1.5"/>
  <!-- Arms spread in meditation pose -->
  <path d="M342 88 L325 96" stroke="#E11D48" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M342 88 L359 96" stroke="#E11D48" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Legs crossed -->
  <path d="M342 100 L332 108" stroke="#E11D48" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M342 100 L352 108" stroke="#E11D48" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Breath indicators -->
  <path d="M320 78 Q316 72 320 66" fill="none" stroke="#FB7185" stroke-width="0.8" opacity="0.6"/>
  <path d="M317 80 Q313 74 317 68" fill="none" stroke="#FB7185" stroke-width="0.8" opacity="0.4"/>
  <path d="M364 78 Q368 72 364 66" fill="none" stroke="#FB7185" stroke-width="0.8" opacity="0.6"/>
  <path d="M367 80 Q371 74 367 68" fill="none" stroke="#FB7185" stroke-width="0.8" opacity="0.4"/>

  <!-- 4-7-8 breathing label -->
  <text x="342" y="120" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#E11D48" text-anchor="middle">4-7-8 Breathing</text>

  <!-- BOTTOM: 5-Minute Scan Strategy -->
  <rect x="185" y="140" width="205" height="78" rx="10" fill="white" stroke="#FECDD3" stroke-width="1.5"/>
  <text x="287" y="158" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#9F1239" text-anchor="middle">First 5 Minutes: Scan Strategy</text>

  <!-- Stopwatch -->
  <circle cx="212" cy="186" r="18" fill="#FFF1F2" stroke="#E11D48" stroke-width="2"/>
  <line x1="212" y1="186" x2="212" y2="174" stroke="#E11D48" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="212" y1="186" x2="220" y2="183" stroke="#FB7185" stroke-width="1" stroke-linecap="round"/>
  <circle cx="212" cy="186" r="1.5" fill="#E11D48"/>
  <!-- Top button -->
  <rect x="210" y="165" width="4" height="5" rx="1" fill="#E11D48"/>
  <text x="212" y="210" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#E11D48" text-anchor="middle">5 min</text>

  <!-- Scan steps -->
  <text x="250" y="174" font-family="Arial, sans-serif" font-size="7" fill="#374151">1. Count all questions</text>
  <text x="250" y="186" font-family="Arial, sans-serif" font-size="7" fill="#374151">2. Check point values</text>
  <text x="250" y="198" font-family="Arial, sans-serif" font-size="7" fill="#374151">3. Assess difficulty levels</text>
  <text x="250" y="210" font-family="Arial, sans-serif" font-size="7" fill="#374151">4. Plan time allocation</text>

  <!-- Bottom summary -->
  <rect x="15" y="230" width="370" height="45" rx="8" fill="#FFF1F2" stroke="#E11D48" stroke-width="1"/>
  <text x="200" y="248" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#9F1239" text-anchor="middle">Preparation + Calm + Strategy = Best Performance</text>
  <text x="200" y="262" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" text-anchor="middle">Sleep well, arrive early, scan first, solve easy questions first</text>

  <!-- Title bottom -->
  <text x="200" y="290" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#9F1239" text-anchor="middle">Be Prepared, Stay Calm, Think Strategic</text>
</svg>
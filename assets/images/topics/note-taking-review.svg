<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>
  <!-- Spaced repetition timeline -->
  <line x1="60" y1="130" x2="340" y2="130" stroke="#93C5FD" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- Day markers -->
  <circle cx="80" cy="130" r="8" fill="#2563EB"/>
  <text x="80" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#1E40AF">1D</text>
  <circle cx="140" cy="130" r="8" fill="#2563EB" opacity="0.85"/>
  <text x="140" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#1E40AF">3D</text>
  <circle cx="200" cy="130" r="8" fill="#2563EB" opacity="0.7"/>
  <text x="200" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#1E40AF">7D</text>
  <circle cx="260" cy="130" r="8" fill="#2563EB" opacity="0.55"/>
  <text x="260" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#1E40AF">14D</text>
  <circle cx="320" cy="130" r="8" fill="#2563EB" opacity="0.4"/>
  <text x="320" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#1E40AF">30D</text>
  <!-- Memory curve above -->
  <path d="M80 80 Q110 60 140 75 Q170 55 200 70 Q230 50 260 65 Q290 45 320 55" stroke="#2563EB" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Arrow up showing retention -->
  <line x1="320" y1="55" x2="340" y2="45" stroke="#059669" stroke-width="2" stroke-linecap="round"/>
  <polygon points="345,42 335,42 338,50" fill="#059669"/>
  <!-- Notebook with review notes -->
  <rect x="120" y="180" width="160" height="90" rx="6" fill="white" stroke="#93C5FD" stroke-width="1.5"/>
  <!-- Spiral binding -->
  <g fill="#93C5FD">
    <circle cx="135" cy="190" r="3"/><circle cx="135" cy="205" r="3"/>
    <circle cx="135" cy="220" r="3"/><circle cx="135" cy="235" r="3"/>
    <circle cx="135" cy="250" r="3"/>
  </g>
  <!-- Lines in notebook -->
  <line x1="150" y1="195" x2="265" y2="195" stroke="#BFDBFE" stroke-width="1"/>
  <line x1="150" y1="210" x2="265" y2="210" stroke="#BFDBFE" stroke-width="1"/>
  <line x1="150" y1="225" x2="265" y2="225" stroke="#BFDBFE" stroke-width="1"/>
  <line x1="150" y1="240" x2="265" y2="240" stroke="#BFDBFE" stroke-width="1"/>
  <line x1="150" y1="255" x2="265" y2="255" stroke="#BFDBFE" stroke-width="1"/>
  <!-- Fill-in-the-blank style text -->
  <rect x="155" y="190" width="40" height="10" rx="2" fill="#2563EB" opacity="0.15"/>
  <rect x="205" y="190" width="25" height="10" rx="2" fill="#DBEAFE"/>
  <rect x="155" y="205" width="55" height="10" rx="2" fill="#2563EB" opacity="0.15"/>
  <rect x="155" y="220" width="30" height="10" rx="2" fill="#2563EB" opacity="0.15"/>
  <rect x="195" y="220" width="35" height="10" rx="2" fill="#DBEAFE"/>
  <!-- Check marks -->
  <polyline points="245,195 249,200 258,190" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="245,210 249,215 258,205" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Cycle arrows around notebook -->
  <path d="M110 215 Q95 180 120 170" stroke="#2563EB" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <polygon points="122,167 118,175 126,173" fill="#2563EB"/>
  <!-- Labels -->
  <text x="200" y="45" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#1E3A8A">Spaced Repetition Review</text>
  <text x="200" y="290" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#3B82F6">Review at optimal intervals for lasting memory</text>
</svg>

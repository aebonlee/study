<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="#F3F4F6"/>

  <!-- Subtle pattern -->
  <rect width="400" height="300" fill="url(#dots-dig)" rx="12"/>

  <!-- Tablet device -->
  <rect x="40" y="25" width="230" height="260" rx="12" fill="#374151"/>
  <rect x="46" y="35" width="218" height="240" rx="6" fill="#FFFFFF"/>

  <!-- App toolbar -->
  <rect x="46" y="35" width="218" height="24" rx="6" fill="#2563EB"/>
  <rect x="46" y="50" width="218" height="9" fill="#2563EB"/>
  <!-- Toolbar icons -->
  <circle cx="60" cy="47" r="4" fill="white" opacity="0.3"/>
  <rect x="72" y="44" width="30" height="6" rx="3" fill="white" opacity="0.3"/>
  <rect x="230" y="44" width="6" height="6" rx="1" fill="white" opacity="0.3"/>
  <rect x="242" y="44" width="6" height="6" rx="1" fill="white" opacity="0.3"/>
  <rect x="254" y="44" width="6" height="6" rx="1" fill="white" opacity="0.3"/>

  <!-- Sidebar folders -->
  <rect x="46" y="59" width="55" height="216" fill="#F8FAFC" rx="0"/>
  <line x1="101" y1="59" x2="101" y2="275" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Folder items -->
  <g transform="translate(52, 70)">
    <!-- Folder 1 -->
    <rect x="0" y="0" width="42" height="18" rx="4" fill="#DBEAFE"/>
    <path d="M6 6 L6 14 L16 14 L16 8 L12 6 Z" fill="#2563EB" opacity="0.5"/>
    <rect x="20" y="8" width="18" height="2" rx="1" fill="#2563EB" opacity="0.4"/>
    <!-- Folder 2 -->
    <rect x="0" y="22" width="42" height="18" rx="4" fill="#F3F4F6"/>
    <path d="M6 28 L6 36 L16 36 L16 30 L12 28 Z" fill="#6B7280" opacity="0.4"/>
    <rect x="20" y="30" width="18" height="2" rx="1" fill="#6B7280" opacity="0.3"/>
    <!-- Folder 3 -->
    <rect x="0" y="44" width="42" height="18" rx="4" fill="#F3F4F6"/>
    <path d="M6 50 L6 58 L16 58 L16 52 L12 50 Z" fill="#6B7280" opacity="0.4"/>
    <rect x="20" y="52" width="18" height="2" rx="1" fill="#6B7280" opacity="0.3"/>
    <!-- Folder 4 -->
    <rect x="0" y="66" width="42" height="18" rx="4" fill="#F3F4F6"/>
    <path d="M6 72 L6 80 L16 80 L16 74 L12 72 Z" fill="#6B7280" opacity="0.4"/>
    <rect x="20" y="74" width="18" height="2" rx="1" fill="#6B7280" opacity="0.3"/>
  </g>

  <!-- Tags in sidebar bottom -->
  <g transform="translate(52, 180)">
    <rect x="0" y="0" width="22" height="10" rx="5" fill="#DBEAFE" stroke="#2563EB" stroke-width="0.5"/>
    <rect x="0" y="14" width="30" height="10" rx="5" fill="#FEF3C7" stroke="#F59E0B" stroke-width="0.5"/>
    <rect x="0" y="28" width="26" height="10" rx="5" fill="#D1FAE5" stroke="#10B981" stroke-width="0.5"/>
    <circle cx="5" cy="5" r="1.5" fill="#2563EB"/>
    <circle cx="5" cy="19" r="1.5" fill="#F59E0B"/>
    <circle cx="5" cy="33" r="1.5" fill="#10B981"/>
    <rect x="10" y="3" width="8" height="2" rx="1" fill="#2563EB" opacity="0.5"/>
    <rect x="10" y="17" width="16" height="2" rx="1" fill="#F59E0B" opacity="0.5"/>
    <rect x="10" y="31" width="12" height="2" rx="1" fill="#10B981" opacity="0.5"/>
  </g>

  <!-- Main note content area -->
  <g transform="translate(108, 65)">
    <!-- Note title -->
    <rect x="0" y="0" width="120" height="8" rx="2" fill="#1E293B" opacity="0.7"/>

    <!-- Note text lines -->
    <rect x="0" y="16" width="145" height="3" rx="1" fill="#374151" opacity="0.2"/>
    <rect x="0" y="24" width="130" height="3" rx="1" fill="#374151" opacity="0.15"/>
    <rect x="0" y="32" width="148" height="3" rx="1" fill="#374151" opacity="0.2"/>
    <rect x="0" y="40" width="110" height="3" rx="1" fill="#374151" opacity="0.15"/>

    <!-- Inline tag -->
    <rect x="60" y="50" width="35" height="10" rx="5" fill="#DBEAFE"/>
    <rect x="100" y="50" width="28" height="10" rx="5" fill="#D1FAE5"/>

    <!-- More text -->
    <rect x="0" y="68" width="140" height="3" rx="1" fill="#374151" opacity="0.2"/>
    <rect x="0" y="76" width="125" height="3" rx="1" fill="#374151" opacity="0.15"/>
    <rect x="0" y="84" width="148" height="3" rx="1" fill="#374151" opacity="0.2"/>

    <!-- Linked note block -->
    <rect x="5" y="96" width="145" height="30" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="14" y="102" width="80" height="3" rx="1" fill="#2563EB" opacity="0.5"/>
    <rect x="14" y="110" width="120" height="3" rx="1" fill="#2563EB" opacity="0.3"/>
    <rect x="14" y="118" width="100" height="3" rx="1" fill="#2563EB" opacity="0.2"/>

    <!-- More text after link -->
    <rect x="0" y="134" width="135" height="3" rx="1" fill="#374151" opacity="0.2"/>
    <rect x="0" y="142" width="148" height="3" rx="1" fill="#374151" opacity="0.15"/>
    <rect x="0" y="150" width="120" height="3" rx="1" fill="#374151" opacity="0.2"/>
    <rect x="0" y="158" width="140" height="3" rx="1" fill="#374151" opacity="0.15"/>
    <rect x="0" y="166" width="100" height="3" rx="1" fill="#374151" opacity="0.2"/>
  </g>

  <!-- Bi-directional link arrows between floating notes -->
  <!-- Note card 1 (top right) -->
  <rect x="290" y="30" width="95" height="65" rx="8" fill="white" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="300" y="40" width="60" height="4" rx="2" fill="#1E293B" opacity="0.6"/>
  <rect x="300" y="50" width="75" height="2" rx="1" fill="#374151" opacity="0.2"/>
  <rect x="300" y="56" width="70" height="2" rx="1" fill="#374151" opacity="0.15"/>
  <rect x="300" y="62" width="65" height="2" rx="1" fill="#374151" opacity="0.2"/>
  <rect x="300" y="72" width="30" height="8" rx="4" fill="#DBEAFE"/>
  <rect x="335" y="72" width="25" height="8" rx="4" fill="#FEF3C7"/>
  <!-- Link icon -->
  <circle cx="375" y="40" r="6" fill="#2563EB" opacity="0.15"/>
  <path d="M372 38 L376 38 M374 36 L374 40" stroke="#2563EB" stroke-width="1" fill="none"/>

  <!-- Note card 2 (middle right) -->
  <rect x="300" y="120" width="90" height="60" rx="8" fill="white" stroke="#60A5FA" stroke-width="1.5"/>
  <rect x="310" y="130" width="55" height="4" rx="2" fill="#1E293B" opacity="0.6"/>
  <rect x="310" y="140" width="70" height="2" rx="1" fill="#374151" opacity="0.2"/>
  <rect x="310" y="146" width="60" height="2" rx="1" fill="#374151" opacity="0.15"/>
  <rect x="310" y="152" width="65" height="2" rx="1" fill="#374151" opacity="0.2"/>
  <rect x="310" y="162" width="28" height="8" rx="4" fill="#D1FAE5"/>

  <!-- Note card 3 (bottom right) -->
  <rect x="285" y="205" width="100" height="65" rx="8" fill="white" stroke="#93C5FD" stroke-width="1.5"/>
  <rect x="295" y="215" width="65" height="4" rx="2" fill="#1E293B" opacity="0.6"/>
  <rect x="295" y="225" width="80" height="2" rx="1" fill="#374151" opacity="0.2"/>
  <rect x="295" y="231" width="72" height="2" rx="1" fill="#374151" opacity="0.15"/>
  <rect x="295" y="237" width="78" height="2" rx="1" fill="#374151" opacity="0.2"/>
  <rect x="295" y="250" width="32" height="8" rx="4" fill="#FCE7F3"/>
  <rect x="332" y="250" width="28" height="8" rx="4" fill="#DBEAFE"/>

  <!-- Bi-directional arrows -->
  <!-- Arrow: tablet to card 1 -->
  <path d="M264 80 Q278 65 290 62" stroke="#2563EB" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M290 70 Q278 73 264 88" stroke="#2563EB" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>

  <!-- Arrow: card 1 to card 2 -->
  <path d="M335 95 Q330 107 328 120" stroke="#60A5FA" stroke-width="1.2" fill="none" marker-end="url(#arrow-light)"/>
  <path d="M342 120 Q344 107 340 95" stroke="#60A5FA" stroke-width="1.2" fill="none" marker-end="url(#arrow-light)"/>

  <!-- Arrow: card 2 to card 3 -->
  <path d="M340 180 Q335 192 335 205" stroke="#93C5FD" stroke-width="1.2" fill="none" marker-end="url(#arrow-lighter)"/>
  <path d="M348 205 Q350 192 346 180" stroke="#93C5FD" stroke-width="1.2" fill="none" marker-end="url(#arrow-lighter)"/>

  <!-- Arrow: tablet to card 3 -->
  <path d="M264 220 Q274 225 285 228" stroke="#2563EB" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)" opacity="0.6"/>

  <!-- Arrow markers -->
  <defs>
    <pattern id="dots-dig" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.8" fill="#E5E7EB"/>
    </pattern>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
    <marker id="arrow-light" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60A5FA"/>
    </marker>
    <marker id="arrow-lighter" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#93C5FD"/>
    </marker>
  </defs>

  <!-- Paper notebook element (bottom left) - showing paper to digital transition -->
  <g transform="translate(15, 245) rotate(-8)">
    <rect width="50" height="40" rx="3" fill="#FEF3C7" stroke="#F59E0B" stroke-width="0.5"/>
    <rect x="8" y="8" width="34" height="2" rx="1" fill="#92400E" opacity="0.3"/>
    <rect x="8" y="14" width="30" height="2" rx="1" fill="#92400E" opacity="0.2"/>
    <rect x="8" y="20" width="32" height="2" rx="1" fill="#92400E" opacity="0.3"/>
    <rect x="8" y="26" width="25" height="2" rx="1" fill="#92400E" opacity="0.2"/>
  </g>

  <!-- Transition arrow paper to digital -->
  <path d="M55 260 Q65 255 70 248 Q78 237 85 232" stroke="#9CA3AF" stroke-width="1" fill="none" stroke-dasharray="3,2"/>
  <polygon points="86,230 82,236 88,234" fill="#9CA3AF"/>

  <!-- Sync icon -->
  <g transform="translate(280, 280)">
    <circle cx="0" cy="0" r="10" fill="#2563EB" opacity="0.1"/>
    <path d="M-5 -2 A 5 5 0 0 1 5 -2" stroke="#2563EB" stroke-width="1.2" fill="none"/>
    <polygon points="5,-2 3,-5 7,-4" fill="#2563EB"/>
    <path d="M5 2 A 5 5 0 0 1 -5 2" stroke="#2563EB" stroke-width="1.2" fill="none"/>
    <polygon points="-5,2 -3,5 -7,4" fill="#2563EB"/>
  </g>
</svg>
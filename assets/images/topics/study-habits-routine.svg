<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="#F3F4F6"/>

  <!-- Subtle pattern -->
  <rect width="400" height="300" fill="url(#sr-grid)"/>

  <!-- Central clock -->
  <circle cx="200" cy="150" r="40" fill="white" stroke="#059669" stroke-width="2"/>
  <circle cx="200" cy="150" r="3" fill="#059669"/>
  <line x1="200" y1="150" x2="200" y2="125" stroke="#059669" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="200" y1="150" x2="218" y2="145" stroke="#047857" stroke-width="2" stroke-linecap="round"/>

  <!-- Cycle nodes positioned around -->
  <!-- Node 1: Wake Up (top) -->
  <circle cx="200" cy="35" r="26" fill="#D1FAE5" stroke="#059669" stroke-width="2"/>
  <text x="200" y="30" text-anchor="middle" fill="#059669" font-size="16" font-family="sans-serif">&#9728;</text>
  <text x="200" y="46" text-anchor="middle" fill="#047857" font-size="8" font-family="sans-serif" font-weight="600">Wake Up</text>

  <!-- Node 2: Study (right) -->
  <circle cx="340" cy="105" r="26" fill="#D1FAE5" stroke="#059669" stroke-width="2"/>
  <text x="340" y="100" text-anchor="middle" fill="#059669" font-size="16" font-family="sans-serif">&#128214;</text>
  <text x="340" y="116" text-anchor="middle" fill="#047857" font-size="8" font-family="sans-serif" font-weight="600">Study</text>

  <!-- Node 3: Break (bottom-right) -->
  <circle cx="340" cy="205" r="26" fill="#D1FAE5" stroke="#059669" stroke-width="2"/>
  <text x="340" y="200" text-anchor="middle" fill="#059669" font-size="16" font-family="sans-serif">&#9749;</text>
  <text x="340" y="216" text-anchor="middle" fill="#047857" font-size="8" font-family="sans-serif" font-weight="600">Break</text>

  <!-- Node 4: Review (bottom-left) -->
  <circle cx="60" cy="205" r="26" fill="#D1FAE5" stroke="#059669" stroke-width="2"/>
  <text x="60" y="200" text-anchor="middle" fill="#059669" font-size="16" font-family="sans-serif">&#128260;</text>
  <text x="60" y="216" text-anchor="middle" fill="#047857" font-size="8" font-family="sans-serif" font-weight="600">Review</text>

  <!-- Node 5: Sleep (left) -->
  <circle cx="60" cy="105" r="26" fill="#D1FAE5" stroke="#059669" stroke-width="2"/>
  <text x="60" y="100" text-anchor="middle" fill="#059669" font-size="16" font-family="sans-serif">&#127769;</text>
  <text x="60" y="116" text-anchor="middle" fill="#047857" font-size="8" font-family="sans-serif" font-weight="600">Sleep</text>

  <!-- Arrows connecting nodes (circular flow) -->
  <defs>
    <pattern id="sr-grid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="30" height="30" fill="none" stroke="#059669" stroke-width="0.3" opacity="0.08"/>
    </pattern>
    <marker id="sr-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#059669"/>
    </marker>
  </defs>

  <!-- Wake -> Study -->
  <path d="M224 42 Q280 40 320 85" stroke="#059669" stroke-width="2" fill="none" marker-end="url(#sr-arrow)"/>

  <!-- Study -> Break -->
  <path d="M348 131 Q355 165 348 180" stroke="#059669" stroke-width="2" fill="none" marker-end="url(#sr-arrow)"/>

  <!-- Break -> Review -->
  <path d="M315 215 Q200 260 88 215" stroke="#059669" stroke-width="2" fill="none" marker-end="url(#sr-arrow)"/>

  <!-- Review -> Sleep -->
  <path d="M52 179 Q45 155 52 131" stroke="#059669" stroke-width="2" fill="none" marker-end="url(#sr-arrow)"/>

  <!-- Sleep -> Wake -->
  <path d="M80 85 Q120 40 175 35" stroke="#059669" stroke-width="2" fill="none" marker-end="url(#sr-arrow)"/>

  <!-- Bottom label -->
  <text x="200" y="278" text-anchor="middle" fill="#059669" font-size="12" font-family="sans-serif" font-weight="600" opacity="0.6">Daily Study Routine Cycle</text>
</svg>
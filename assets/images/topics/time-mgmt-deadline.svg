<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#F3F4F6"/>

  <!-- Title -->
  <text x="200" y="26" text-anchor="middle" fill="#334155" font-size="14" font-family="system-ui" font-weight="700">Backward Planning from Deadline</text>

  <!-- "Plan Backwards" arrow -->
  <line x1="340" y1="58" x2="60" y2="58" stroke="#0891B2" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="60,53 48,58 60,63" fill="#0891B2"/>
  <text x="200" y="52" text-anchor="middle" fill="#0891B2" font-size="10" font-family="system-ui" font-weight="700">Plan Backwards ←</text>

  <!-- Main horizontal timeline -->
  <line x1="40" y1="120" x2="360" y2="120" stroke="#CBD5E1" stroke-width="2"/>

  <!-- Week 1 (Now) - leftmost -->
  <circle cx="80" cy="120" r="8" fill="#0891B2" opacity="0.5"/>
  <circle cx="80" cy="120" r="4" fill="#0891B2"/>
  <text x="80" y="108" text-anchor="middle" fill="#0891B2" font-size="9" font-family="system-ui" font-weight="700">-4 weeks</text>
  <text x="80" y="140" text-anchor="middle" fill="#334155" font-size="8" font-family="system-ui" font-weight="600">Week 1 (Now)</text>
  <!-- Task list -->
  <rect x="50" y="148" width="60" height="55" rx="5" fill="white" stroke="#CBD5E1" stroke-width="0.8"/>
  <text x="56" y="162" fill="#334155" font-size="7" font-family="system-ui">&#x2610; First pass</text>
  <text x="56" y="174" fill="#334155" font-size="7" font-family="system-ui">&#x2610; Mark gaps</text>
  <text x="56" y="186" fill="#334155" font-size="7" font-family="system-ui">&#x2610; Gather</text>
  <text x="62" y="196" fill="#334155" font-size="7" font-family="system-ui">materials</text>

  <!-- Week 2 -->
  <circle cx="160" cy="120" r="8" fill="#0891B2" opacity="0.6"/>
  <circle cx="160" cy="120" r="4" fill="#0891B2"/>
  <text x="160" y="108" text-anchor="middle" fill="#0891B2" font-size="9" font-family="system-ui" font-weight="700">-3 weeks</text>
  <text x="160" y="140" text-anchor="middle" fill="#334155" font-size="8" font-family="system-ui" font-weight="600">Week 2</text>
  <!-- Task list -->
  <rect x="130" y="148" width="60" height="55" rx="5" fill="white" stroke="#CBD5E1" stroke-width="0.8"/>
  <text x="136" y="162" fill="#334155" font-size="7" font-family="system-ui">&#x2610; Second pass</text>
  <text x="136" y="174" fill="#334155" font-size="7" font-family="system-ui">&#x2610; Summaries</text>
  <text x="136" y="186" fill="#334155" font-size="7" font-family="system-ui">&#x2610; Key concept</text>
  <text x="142" y="196" fill="#334155" font-size="7" font-family="system-ui">notes</text>

  <!-- Week 3 -->
  <circle cx="240" cy="120" r="8" fill="#0891B2" opacity="0.7"/>
  <circle cx="240" cy="120" r="4" fill="#0891B2"/>
  <text x="240" y="108" text-anchor="middle" fill="#0891B2" font-size="9" font-family="system-ui" font-weight="700">-2 weeks</text>
  <text x="240" y="140" text-anchor="middle" fill="#334155" font-size="8" font-family="system-ui" font-weight="600">Week 3</text>
  <!-- Task list -->
  <rect x="210" y="148" width="60" height="55" rx="5" fill="white" stroke="#CBD5E1" stroke-width="0.8"/>
  <text x="216" y="162" fill="#334155" font-size="7" font-family="system-ui">&#x2610; Weak areas</text>
  <text x="216" y="174" fill="#334155" font-size="7" font-family="system-ui">&#x2610; Error notes</text>
  <text x="216" y="186" fill="#334155" font-size="7" font-family="system-ui">&#x2610; Practice</text>
  <text x="222" y="196" fill="#334155" font-size="7" font-family="system-ui">problems</text>

  <!-- Week 4 - Exam week -->
  <circle cx="320" cy="120" r="8" fill="#0891B2" opacity="0.85"/>
  <circle cx="320" cy="120" r="4" fill="#0891B2"/>
  <text x="320" y="108" text-anchor="middle" fill="#0891B2" font-size="9" font-family="system-ui" font-weight="700">-1 week</text>
  <text x="320" y="140" text-anchor="middle" fill="#334155" font-size="8" font-family="system-ui" font-weight="600">Week 4</text>
  <!-- Task list -->
  <rect x="290" y="148" width="60" height="55" rx="5" fill="white" stroke="#CBD5E1" stroke-width="0.8"/>
  <text x="296" y="162" fill="#334155" font-size="7" font-family="system-ui">&#x2610; Final review</text>
  <text x="296" y="174" fill="#334155" font-size="7" font-family="system-ui">&#x2610; Mock tests</text>
  <text x="296" y="186" fill="#334155" font-size="7" font-family="system-ui">&#x2610; Rest well</text>

  <!-- DEADLINE red flag at far right -->
  <line x1="370" y1="90" x2="370" y2="130" stroke="#EF4444" stroke-width="2"/>
  <polygon points="370,90 395,97 370,104" fill="#EF4444"/>
  <text x="370" y="142" text-anchor="middle" fill="#EF4444" font-size="9" font-family="system-ui" font-weight="800">DEADLINE</text>

  <!-- Connecting arrows between milestones (right to left) -->
  <path d="M312,120 L168,120" stroke="#0891B2" stroke-width="0" fill="none"/>

  <!-- Bottom: Parkinson's Law quote -->
  <rect x="40" y="220" width="320" height="60" rx="8" fill="white" stroke="#0891B2" stroke-width="1" opacity="0.9"/>
  <text x="200" y="240" text-anchor="middle" fill="#0891B2" font-size="9" font-family="system-ui" font-weight="700">Parkinson's Law</text>
  <text x="200" y="255" text-anchor="middle" fill="#334155" font-size="8" font-family="system-ui" font-style="italic">"Work expands to fill the time available for its completion."</text>
  <text x="200" y="270" text-anchor="middle" fill="#64748B" font-size="8" font-family="system-ui">Set tight deadlines to boost focus and efficiency.</text>

  <!-- Small timer icon next to Parkinson box -->
  <g transform="translate(370, 250)">
    <circle cx="0" cy="0" r="14" fill="#0891B2" opacity="0.15"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#0891B2" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="0" y2="-6" stroke="#0891B2" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="5" y2="2" stroke="#0891B2" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="1.2" fill="#0891B2"/>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="#F3F4F6"/>

  <!-- Document / Page -->
  <rect x="130" y="60" width="140" height="180" rx="6" fill="white" stroke="#D1D5DB" stroke-width="1.5"/>
  <!-- Document lines -->
  <line x1="150" y1="90" x2="250" y2="90" stroke="#E5E7EB" stroke-width="2"/>
  <line x1="150" y1="105" x2="240" y2="105" stroke="#E5E7EB" stroke-width="2"/>
  <line x1="150" y1="120" x2="248" y2="120" stroke="#E5E7EB" stroke-width="2"/>
  <line x1="150" y1="135" x2="230" y2="135" stroke="#E5E7EB" stroke-width="2"/>
  <line x1="150" y1="150" x2="250" y2="150" stroke="#E5E7EB" stroke-width="2"/>
  <line x1="150" y1="165" x2="235" y2="165" stroke="#E5E7EB" stroke-width="2"/>
  <line x1="150" y1="180" x2="245" y2="180" stroke="#E5E7EB" stroke-width="2"/>
  <line x1="150" y1="195" x2="220" y2="195" stroke="#E5E7EB" stroke-width="2"/>
  <line x1="150" y1="210" x2="250" y2="210" stroke="#E5E7EB" stroke-width="2"/>
  <!-- Highlight on some lines -->
  <rect x="150" y="116" width="98" height="8" rx="2" fill="#D1FAE5" opacity="0.7"/>
  <rect x="150" y="146" width="100" height="8" rx="2" fill="#D1FAE5" opacity="0.7"/>

  <!-- Magnifying glass -->
  <circle cx="220" cy="150" r="55" fill="none" stroke="#10B981" stroke-width="3.5" opacity="0.3"/>
  <circle cx="220" cy="150" r="55" fill="#10B981" opacity="0.05"/>
  <line x1="258" y1="188" x2="290" y2="220" stroke="#10B981" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <!-- Handle -->
  <rect x="283" y="213" width="16" height="30" rx="4" fill="#10B981" opacity="0.4" transform="rotate(45 291 228)"/>

  <!-- Thought bubble 1: Balance Scale (top left) -->
  <circle cx="60" cy="60" r="40" fill="white" stroke="#10B981" stroke-width="1.5"/>
  <!-- Scale base -->
  <line x1="60" y1="78" x2="60" y2="50" stroke="#059669" stroke-width="2"/>
  <rect x="55" y="78" width="10" height="4" rx="1" fill="#059669"/>
  <!-- Scale beam -->
  <line x1="38" y1="50" x2="82" y2="56" stroke="#059669" stroke-width="2"/>
  <!-- Scale pans -->
  <path d="M32 52 Q38 60 44 52" fill="none" stroke="#059669" stroke-width="1.5"/>
  <path d="M76 58 Q82 66 88 58" fill="none" stroke="#059669" stroke-width="1.5"/>
  <!-- Strings -->
  <line x1="38" y1="50" x2="32" y2="52" stroke="#059669" stroke-width="1"/>
  <line x1="38" y1="50" x2="44" y2="52" stroke="#059669" stroke-width="1"/>
  <line x1="82" y1="56" x2="76" y2="58" stroke="#059669" stroke-width="1"/>
  <line x1="82" y1="56" x2="88" y2="58" stroke="#059669" stroke-width="1"/>
  <!-- Label -->
  <text x="60" y="96" font-family="Arial, sans-serif" font-size="8" fill="#065F46" text-anchor="middle">Evidence</text>
  <!-- Bubble connector dots -->
  <circle cx="95" cy="85" r="4" fill="white" stroke="#10B981" stroke-width="1"/>
  <circle cx="108" cy="95" r="3" fill="white" stroke="#10B981" stroke-width="1"/>

  <!-- Thought bubble 2: Question Mark (top right) -->
  <circle cx="340" cy="60" r="40" fill="white" stroke="#10B981" stroke-width="1.5"/>
  <!-- Big question mark -->
  <text x="340" y="72" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#10B981" text-anchor="middle">?</text>
  <!-- Label -->
  <text x="340" y="96" font-family="Arial, sans-serif" font-size="8" fill="#065F46" text-anchor="middle">Assumptions</text>
  <!-- Bubble connector dots -->
  <circle cx="305" cy="85" r="4" fill="white" stroke="#10B981" stroke-width="1"/>
  <circle cx="292" cy="95" r="3" fill="white" stroke="#10B981" stroke-width="1"/>

  <!-- Thought bubble 3: Connected Arrows (bottom) -->
  <circle cx="340" cy="220" r="44" fill="white" stroke="#10B981" stroke-width="1.5"/>
  <!-- Network nodes -->
  <circle cx="325" cy="205" r="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <circle cx="355" cy="205" r="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <circle cx="340" cy="232" r="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <!-- Connecting arrows -->
  <line x1="330" y1="207" x2="350" y2="207" stroke="#10B981" stroke-width="1.5"/>
  <line x1="328" y1="210" x2="337" y2="228" stroke="#10B981" stroke-width="1.5"/>
  <line x1="352" y1="210" x2="343" y2="228" stroke="#10B981" stroke-width="1.5"/>
  <!-- Arrow tips -->
  <circle cx="340" cy="207" r="2" fill="#10B981"/>
  <circle cx="333" cy="219" r="2" fill="#10B981"/>
  <circle cx="347" cy="219" r="2" fill="#10B981"/>
  <!-- Label -->
  <text x="340" y="258" font-family="Arial, sans-serif" font-size="8" fill="#065F46" text-anchor="middle">Relationships</text>
  <!-- Bubble connector dots -->
  <circle cx="300" cy="200" r="4" fill="white" stroke="#10B981" stroke-width="1"/>
  <circle cx="288" cy="190" r="3" fill="white" stroke="#10B981" stroke-width="1"/>

  <!-- Title -->
  <text x="200" y="285" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#065F46" text-anchor="middle">Critical Reading Process</text>
</svg>
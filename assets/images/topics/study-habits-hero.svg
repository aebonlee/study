<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <!-- Background -->
  <rect width="800" height="400" rx="16" fill="#F3F4F6"/>

  <!-- Subtle pattern -->
  <defs>
    <pattern id="sh-dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#059669" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#sh-dots)"/>

  <!-- Desk -->
  <rect x="180" y="250" width="440" height="16" rx="4" fill="#059669"/>
  <rect x="200" y="266" width="12" height="80" rx="3" fill="#047857"/>
  <rect x="588" y="266" width="12" height="80" rx="3" fill="#047857"/>

  <!-- Chair -->
  <rect x="340" y="210" width="80" height="8" rx="4" fill="#6EE7B7"/>
  <rect x="335" y="160" width="90" height="55" rx="8" fill="#34D399"/>
  <rect x="350" y="218" width="10" height="50" rx="3" fill="#047857"/>
  <rect x="400" y="218" width="10" height="50" rx="3" fill="#047857"/>
  <ellipse cx="380" cy="272" rx="40" ry="6" fill="#047857" opacity="0.3"/>

  <!-- Student (simplified figure) -->
  <circle cx="380" cy="130" r="28" fill="#FCD34D"/>
  <!-- Hair -->
  <path d="M352 125 Q352 100 380 100 Q408 100 408 125" fill="#92400E"/>
  <!-- Body -->
  <rect x="360" y="158" width="40" height="50" rx="10" fill="#059669"/>
  <!-- Arms reaching to desk -->
  <path d="M360 175 L320 230 L330 235" stroke="#059669" stroke-width="8" stroke-linecap="round" fill="none"/>
  <path d="M400 175 L440 230 L430 235" stroke="#059669" stroke-width="8" stroke-linecap="round" fill="none"/>

  <!-- Books stacked on left side of desk -->
  <rect x="220" y="222" width="70" height="12" rx="2" fill="#059669"/>
  <rect x="225" y="210" width="60" height="12" rx="2" fill="#10B981"/>
  <rect x="222" y="198" width="65" height="12" rx="2" fill="#34D399"/>
  <rect x="228" y="186" width="55" height="12" rx="2" fill="#6EE7B7"/>

  <!-- Lamp on desk -->
  <rect x="500" y="200" width="8" height="50" rx="2" fill="#6B7280"/>
  <path d="M480 200 L528 200 L515 180 L493 180 Z" fill="#FCD34D"/>
  <ellipse cx="504" cy="200" rx="18" ry="4" fill="#FDE68A" opacity="0.5"/>
  <!-- Light glow -->
  <ellipse cx="504" cy="235" rx="30" ry="15" fill="#FDE68A" opacity="0.15"/>

  <!-- Clock on wall -->
  <circle cx="560" cy="90" r="35" fill="white" stroke="#059669" stroke-width="3"/>
  <circle cx="560" cy="90" r="2" fill="#059669"/>
  <!-- Clock hands showing 8:00 -->
  <line x1="560" y1="90" x2="560" y2="65" stroke="#059669" stroke-width="3" stroke-linecap="round"/>
  <line x1="560" y1="90" x2="540" y2="90" stroke="#047857" stroke-width="2" stroke-linecap="round"/>
  <!-- Hour markers -->
  <circle cx="560" cy="60" r="2" fill="#059669"/>
  <circle cx="585" cy="90" r="2" fill="#059669"/>
  <circle cx="560" cy="120" r="2" fill="#059669"/>
  <circle cx="535" cy="90" r="2" fill="#059669"/>

  <!-- Calendar on wall -->
  <rect x="140" y="60" width="90" height="80" rx="6" fill="white" stroke="#059669" stroke-width="2"/>
  <rect x="140" y="60" width="90" height="20" rx="6" fill="#059669"/>
  <text x="185" y="75" text-anchor="middle" fill="white" font-size="11" font-family="sans-serif" font-weight="bold">APRIL</text>
  <!-- Calendar grid with checks -->
  <g fill="#D1FAE5" font-size="8" font-family="sans-serif">
    <rect x="150" y="86" width="14" height="14" rx="2"/>
    <rect x="168" y="86" width="14" height="14" rx="2"/>
    <rect x="186" y="86" width="14" height="14" rx="2"/>
    <rect x="204" y="86" width="14" height="14" rx="2"/>
    <rect x="150" y="104" width="14" height="14" rx="2"/>
    <rect x="168" y="104" width="14" height="14" rx="2"/>
    <rect x="186" y="104" width="14" height="14" rx="2"/>
    <rect x="204" y="104" width="14" height="14" rx="2"/>
  </g>
  <!-- Check marks -->
  <g stroke="#059669" stroke-width="2" stroke-linecap="round" fill="none">
    <polyline points="153,93 156,97 163,88"/>
    <polyline points="171,93 174,97 181,88"/>
    <polyline points="189,93 192,97 199,88"/>
    <polyline points="207,93 210,97 217,88"/>
    <polyline points="153,111 156,115 163,106"/>
    <polyline points="171,111 174,115 181,106"/>
    <polyline points="189,111 192,115 199,106"/>
  </g>

  <!-- Plant on desk (growth metaphor) -->
  <rect x="440" y="228" width="30" height="22" rx="4" fill="#059669"/>
  <path d="M455 228 Q455 210 445 200 Q450 208 455 210 Q460 208 465 200 Q455 210 455 228" fill="#34D399"/>
  <path d="M455 215 Q448 205 440 198" stroke="#10B981" stroke-width="2" fill="none"/>
  <path d="M455 215 Q462 205 470 198" stroke="#10B981" stroke-width="2" fill="none"/>
  <ellipse cx="440" cy="198" rx="5" ry="4" fill="#6EE7B7"/>
  <ellipse cx="470" cy="198" rx="5" ry="4" fill="#6EE7B7"/>

  <!-- Notebook on desk -->
  <rect x="330" y="232" width="50" height="18" rx="2" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <line x1="338" y1="238" x2="372" y2="238" stroke="#D1D5DB" stroke-width="1"/>
  <line x1="338" y1="243" x2="368" y2="243" stroke="#D1D5DB" stroke-width="1"/>

  <!-- Pencil -->
  <rect x="385" y="235" width="40" height="5" rx="1" fill="#FCD34D" transform="rotate(-15 385 235)"/>
  <polygon points="383,240 378,238 383,236" fill="#374151"/>

  <!-- Decorative elements - floating icons -->
  <!-- Star -->
  <polygon points="680,80 685,95 700,95 688,105 692,120 680,110 668,120 672,105 660,95 675,95" fill="#059669" opacity="0.2"/>

  <!-- Growth arrow -->
  <path d="M660 180 L660 150 L650 160 M660 150 L670 160" stroke="#34D399" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Small decorative circles -->
  <circle cx="100" cy="120" r="8" fill="#D1FAE5"/>
  <circle cx="700" cy="300" r="12" fill="#D1FAE5"/>
  <circle cx="120" cy="300" r="6" fill="#A7F3D0"/>
  <circle cx="680" cy="250" r="5" fill="#6EE7B7" opacity="0.5"/>

  <!-- Bottom label -->
  <text x="400" y="370" text-anchor="middle" fill="#059669" font-size="16" font-family="sans-serif" font-weight="600" opacity="0.7">Study Habits</text>
</svg>
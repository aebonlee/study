<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="#F3F4F6"/>

  <!-- Title -->
  <text x="200" y="26" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#065F46" text-anchor="middle">Speed Reading: Visual Span</text>

  <!-- LEFT: Normal Reading -->
  <text x="100" y="50" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#6B7280" text-anchor="middle">Normal Reading</text>

  <!-- Text lines (left) -->
  <rect x="20" y="60" width="160" height="80" rx="8" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <!-- Words as small rects -->
  <rect x="30" y="70" width="22" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="56" y="70" width="18" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="78" y="70" width="26" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="108" y="70" width="20" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="132" y="70" width="24" height="6" rx="2" fill="#D1D5DB"/>

  <rect x="30" y="84" width="20" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="54" y="84" width="28" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="86" y="84" width="16" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="106" y="84" width="24" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="134" y="84" width="22" height="6" rx="2" fill="#D1D5DB"/>

  <rect x="30" y="98" width="26" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="60" y="98" width="18" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="82" y="98" width="22" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="108" y="98" width="20" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="132" y="98" width="26" height="6" rx="2" fill="#D1D5DB"/>

  <rect x="30" y="112" width="18" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="52" y="112" width="24" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="80" y="112" width="20" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="104" y="112" width="26" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="134" y="112" width="22" height="6" rx="2" fill="#D1D5DB"/>

  <!-- Eye focus: narrow highlight on single word -->
  <rect x="53" y="82" width="30" height="10" rx="3" fill="#10B981" opacity="0.2" stroke="#10B981" stroke-width="1"/>
  <!-- Eye icon above narrow focus -->
  <ellipse cx="68" cy="74" rx="6" ry="4" fill="none" stroke="#10B981" stroke-width="1.2"/>
  <circle cx="68" cy="74" r="2" fill="#10B981"/>
  <!-- Small jumpy arrows (saccades) -->
  <path d="M42 127 L55 127 M60 127 L73 127 M78 127 L91 127 M96 127 L109 127 M114 127 L127 127" fill="none" stroke="#EF4444" stroke-width="1" marker-end="url(#arrowTiny)"/>
  <text x="100" y="138" font-family="Arial, sans-serif" font-size="7" fill="#EF4444" text-anchor="middle">word by word</text>

  <!-- RIGHT: Speed Reading -->
  <text x="300" y="50" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#065F46" text-anchor="middle">Speed Reading</text>

  <!-- Text lines (right) -->
  <rect x="220" y="60" width="160" height="80" rx="8" fill="white" stroke="#10B981" stroke-width="1.5"/>
  <!-- Words as small rects -->
  <rect x="230" y="70" width="22" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="256" y="70" width="18" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="278" y="70" width="26" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="308" y="70" width="20" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="332" y="70" width="24" height="6" rx="2" fill="#D1D5DB"/>

  <rect x="230" y="84" width="20" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="254" y="84" width="28" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="286" y="84" width="16" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="306" y="84" width="24" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="334" y="84" width="22" height="6" rx="2" fill="#D1D5DB"/>

  <rect x="230" y="98" width="26" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="260" y="98" width="18" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="282" y="98" width="22" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="308" y="98" width="20" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="332" y="98" width="26" height="6" rx="2" fill="#D1D5DB"/>

  <rect x="230" y="112" width="18" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="252" y="112" width="24" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="280" y="112" width="20" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="304" y="112" width="26" height="6" rx="2" fill="#D1D5DB"/>
  <rect x="334" y="112" width="22" height="6" rx="2" fill="#D1D5DB"/>

  <!-- Eye focus: wide highlight across chunk -->
  <rect x="228" y="82" width="130" height="10" rx="3" fill="#10B981" opacity="0.2" stroke="#10B981" stroke-width="1.5"/>
  <!-- Eye icon above wide focus -->
  <ellipse cx="293" cy="74" rx="8" ry="5" fill="none" stroke="#10B981" stroke-width="1.5"/>
  <circle cx="293" cy="74" r="3" fill="#10B981"/>
  <!-- Wide sweep arrows -->
  <path d="M240 127 L290 127 M300 127 L350 127" fill="none" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <text x="300" y="138" font-family="Arial, sans-serif" font-size="7" fill="#10B981" text-anchor="middle">chunk by chunk</text>

  <!-- VS divider -->
  <text x="200" y="105" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#9CA3AF" text-anchor="middle">vs</text>

  <!-- Bottom: Speedometer / WPM Gauge -->
  <rect x="80" y="155" width="240" height="120" rx="10" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <text x="200" y="175" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#374151" text-anchor="middle">Reading Speed (WPM)</text>

  <!-- Gauge arc -->
  <path d="M120 250 A80 80 0 0 1 280 250" fill="none" stroke="#E5E7EB" stroke-width="10" stroke-linecap="round"/>
  <!-- Slow zone (red) -->
  <path d="M120 250 A80 80 0 0 1 155 195" fill="none" stroke="#FCA5A5" stroke-width="10" stroke-linecap="round"/>
  <!-- Medium zone (yellow) -->
  <path d="M155 195 A80 80 0 0 1 200 170" fill="none" stroke="#FDE68A" stroke-width="10" stroke-linecap="round"/>
  <!-- Fast zone (green) -->
  <path d="M200 170 A80 80 0 0 1 280 250" fill="none" stroke="#6EE7B7" stroke-width="10" stroke-linecap="round"/>

  <!-- Gauge needle pointing to fast zone -->
  <line x1="200" y1="250" x2="255" y2="195" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="200" cy="250" r="5" fill="#10B981"/>

  <!-- WPM labels -->
  <text x="115" y="265" font-family="Arial, sans-serif" font-size="8" fill="#EF4444" text-anchor="middle">150</text>
  <text x="155" y="195" font-family="Arial, sans-serif" font-size="8" fill="#F59E0B" text-anchor="end">300</text>
  <text x="200" y="168" font-family="Arial, sans-serif" font-size="8" fill="#374151" text-anchor="middle">500</text>
  <text x="285" y="265" font-family="Arial, sans-serif" font-size="8" fill="#10B981" text-anchor="middle">1000</text>

  <!-- WPM display -->
  <text x="200" y="240" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#10B981" text-anchor="middle">600+</text>
  <text x="200" y="252" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" text-anchor="middle">WPM</text>

  <!-- Title bottom -->
  <text x="200" y="292" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#065F46" text-anchor="middle">Expand Your Visual Span for Faster Reading</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 Z" fill="#10B981"/>
    </marker>
    <marker id="arrowTiny" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0 0 L5 2 L0 4 Z" fill="#EF4444"/>
    </marker>
  </defs>
</svg>
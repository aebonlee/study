<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <!-- Background -->
  <rect width="800" height="400" rx="16" fill="#F3F4F6"/>

  <!-- Subtle pattern -->
  <defs>
    <pattern id="mh-dots" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <circle cx="25" cy="25" r="1.5" fill="#8B5CF6" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#mh-dots)"/>

  <!-- Brain outline (stylized) -->
  <g transform="translate(300, 80)">
    <!-- Left hemisphere -->
    <path d="M100 20 Q30 20 20 80 Q10 140 40 180 Q60 210 100 220"
          fill="#EDE9FE" stroke="#8B5CF6" stroke-width="3"/>
    <!-- Right hemisphere -->
    <path d="M100 20 Q170 20 180 80 Q190 140 160 180 Q140 210 100 220"
          fill="#DDD6FE" stroke="#8B5CF6" stroke-width="3"/>
    <!-- Center line -->
    <path d="M100 20 Q95 80 100 120 Q105 160 100 220"
          stroke="#8B5CF6" stroke-width="2" fill="none"/>

    <!-- Brain folds left -->
    <path d="M40 70 Q60 60 80 70" stroke="#A78BFA" stroke-width="2" fill="none"/>
    <path d="M30 110 Q55 95 75 110" stroke="#A78BFA" stroke-width="2" fill="none"/>
    <path d="M45 150 Q65 135 85 145" stroke="#A78BFA" stroke-width="2" fill="none"/>

    <!-- Brain folds right -->
    <path d="M120 70 Q140 60 160 70" stroke="#A78BFA" stroke-width="2" fill="none"/>
    <path d="M125 110 Q145 95 170 110" stroke="#A78BFA" stroke-width="2" fill="none"/>
    <path d="M115 150 Q135 135 155 145" stroke="#A78BFA" stroke-width="2" fill="none"/>

    <!-- Neural connections / synapses lighting up -->
    <!-- Glowing nodes -->
    <circle cx="60" cy="80" r="6" fill="#8B5CF6" opacity="0.8">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="140" cy="80" r="5" fill="#A78BFA" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="130" r="7" fill="#7C3AED" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="130" cy="140" r="5" fill="#8B5CF6" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="100" r="6" fill="#7C3AED" opacity="0.9">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/>
    </circle>

    <!-- Synapse connections -->
    <line x1="60" y1="80" x2="100" y2="100" stroke="#C4B5FD" stroke-width="1.5" opacity="0.6"/>
    <line x1="140" y1="80" x2="100" y2="100" stroke="#C4B5FD" stroke-width="1.5" opacity="0.6"/>
    <line x1="80" y1="130" x2="100" y2="100" stroke="#C4B5FD" stroke-width="1.5" opacity="0.6"/>
    <line x1="130" y1="140" x2="100" y2="100" stroke="#C4B5FD" stroke-width="1.5" opacity="0.6"/>
    <line x1="60" y1="80" x2="80" y2="130" stroke="#C4B5FD" stroke-width="1" opacity="0.4"/>
    <line x1="140" y1="80" x2="130" y2="140" stroke="#C4B5FD" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Floating knowledge symbols -->

  <!-- Book (top-left) -->
  <g transform="translate(120, 80)">
    <rect x="0" y="5" width="45" height="35" rx="3" fill="#DDD6FE" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="22" y1="5" x2="22" y2="40" stroke="#8B5CF6" stroke-width="1.5"/>
    <line x1="8" y1="15" x2="18" y2="15" stroke="#A78BFA" stroke-width="1.5"/>
    <line x1="8" y1="22" x2="18" y2="22" stroke="#A78BFA" stroke-width="1.5"/>
    <line x1="27" y1="15" x2="38" y2="15" stroke="#A78BFA" stroke-width="1.5"/>
    <line x1="27" y1="22" x2="38" y2="22" stroke="#A78BFA" stroke-width="1.5"/>
  </g>

  <!-- Lightbulb (top-right) -->
  <g transform="translate(620, 60)">
    <circle cx="25" cy="22" r="20" fill="#FDE68A" stroke="#F59E0B" stroke-width="2"/>
    <rect x="18" y="40" width="14" height="8" rx="2" fill="#F59E0B"/>
    <!-- Filament -->
    <path d="M20 25 Q25 15 30 25" stroke="#F59E0B" stroke-width="1.5" fill="none"/>
    <!-- Rays -->
    <line x1="25" y1="-2" x2="25" y2="-8" stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
    <line x1="48" y1="10" x2="53" y2="6" stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
    <line x1="48" y1="35" x2="53" y2="39" stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
    <line x1="2" y1="10" x2="-3" y2="6" stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
    <line x1="2" y1="35" x2="-3" y2="39" stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Musical note (bottom-left) -->
  <g transform="translate(140, 260)">
    <circle cx="12" cy="30" r="8" fill="#8B5CF6" opacity="0.7"/>
    <rect x="18" y="5" width="3" height="27" fill="#8B5CF6"/>
    <path d="M21 5 Q35 0 35 12 Q35 18 21 15" fill="#A78BFA"/>
  </g>

  <!-- Formula / math (bottom-right) -->
  <g transform="translate(610, 250)">
    <rect x="0" y="0" width="70" height="40" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
    <text x="35" y="18" text-anchor="middle" fill="#7C3AED" font-size="11" font-family="serif" font-style="italic">E = mc</text>
    <text x="55" y="14" fill="#7C3AED" font-size="8" font-family="serif">2</text>
    <text x="35" y="33" text-anchor="middle" fill="#A78BFA" font-size="9" font-family="serif" font-style="italic">F = ma</text>
  </g>

  <!-- Puzzle piece (left) -->
  <g transform="translate(80, 170)">
    <path d="M10 5 L25 5 Q25 0 30 0 Q35 0 35 5 L50 5 L50 20 Q55 20 55 25 Q55 30 50 30 L50 45 L35 45 Q35 50 30 50 Q25 50 25 45 L10 45 L10 30 Q5 30 5 25 Q5 20 10 20 Z"
          fill="#DDD6FE" stroke="#8B5CF6" stroke-width="1.5"/>
  </g>

  <!-- Gear/cog (right) -->
  <g transform="translate(660, 160)">
    <circle cx="20" cy="20" r="12" fill="none" stroke="#A78BFA" stroke-width="3"/>
    <circle cx="20" cy="20" r="5" fill="#8B5CF6"/>
    <line x1="20" y1="4" x2="20" y2="0" stroke="#A78BFA" stroke-width="4" stroke-linecap="round"/>
    <line x1="20" y1="36" x2="20" y2="40" stroke="#A78BFA" stroke-width="4" stroke-linecap="round"/>
    <line x1="4" y1="20" x2="0" y2="20" stroke="#A78BFA" stroke-width="4" stroke-linecap="round"/>
    <line x1="36" y1="20" x2="40" y2="20" stroke="#A78BFA" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Atom symbol (top center) -->
  <g transform="translate(420, 50)">
    <ellipse cx="20" cy="20" rx="25" ry="10" fill="none" stroke="#C4B5FD" stroke-width="1.5" transform="rotate(0 20 20)"/>
    <ellipse cx="20" cy="20" rx="25" ry="10" fill="none" stroke="#C4B5FD" stroke-width="1.5" transform="rotate(60 20 20)"/>
    <ellipse cx="20" cy="20" rx="25" ry="10" fill="none" stroke="#C4B5FD" stroke-width="1.5" transform="rotate(120 20 20)"/>
    <circle cx="20" cy="20" r="4" fill="#8B5CF6"/>
  </g>

  <!-- Decorative particles -->
  <circle cx="200" cy="50" r="4" fill="#DDD6FE"/>
  <circle cx="600" cy="340" r="6" fill="#EDE9FE"/>
  <circle cx="80" cy="340" r="5" fill="#C4B5FD" opacity="0.4"/>
  <circle cx="720" cy="120" r="4" fill="#DDD6FE"/>
  <circle cx="550" cy="320" r="3" fill="#8B5CF6" opacity="0.3"/>
  <circle cx="250" cy="340" r="3" fill="#A78BFA" opacity="0.4"/>

  <!-- Connection lines from brain to floating elements -->
  <line x1="330" y1="140" x2="165" y2="100" stroke="#C4B5FD" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>
  <line x1="470" y1="140" x2="620" y2="80" stroke="#C4B5FD" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>
  <line x1="340" y1="270" x2="170" y2="280" stroke="#C4B5FD" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>
  <line x1="460" y1="270" x2="610" y2="260" stroke="#C4B5FD" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>

  <!-- Bottom label -->
  <text x="400" y="375" text-anchor="middle" fill="#8B5CF6" font-size="16" font-family="sans-serif" font-weight="600" opacity="0.7">Memory Enhancement</text>
</svg>
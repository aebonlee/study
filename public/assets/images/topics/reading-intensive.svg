<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="#F3F4F6"/>

  <!-- Title -->
  <text x="200" y="26" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#065F46" text-anchor="middle">Intensive vs Extensive Reading</text>

  <!-- Balance bar at top -->
  <line x1="100" y1="46" x2="300" y2="46" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>
  <!-- Fulcrum triangle -->
  <polygon points="200,46 193,56 207,56" fill="#10B981"/>
  <!-- 30% label (left) -->
  <rect x="90" y="36" width="36" height="16" rx="4" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
  <text x="108" y="48" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#065F46" text-anchor="middle">30%</text>
  <!-- 70% label (right) -->
  <rect x="274" y="36" width="36" height="16" rx="4" fill="#10B981"/>
  <text x="292" y="48" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">70%</text>

  <!-- LEFT: Intensive Reading -->
  <rect x="15" y="65" width="175" height="195" rx="10" fill="white" stroke="#10B981" stroke-width="1.5"/>
  <text x="102" y="85" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#065F46" text-anchor="middle">Intensive</text>
  <text x="102" y="96" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" text-anchor="middle">Deep &amp; Focused</text>

  <!-- Open book with magnifying glass -->
  <rect x="55" y="108" width="95" height="70" rx="6" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
  <!-- Book pages -->
  <line x1="102" y1="112" x2="102" y2="174" stroke="#A7F3D0" stroke-width="1"/>
  <!-- Left page lines -->
  <line x1="62" y1="120" x2="96" y2="120" stroke="#D1D5DB" stroke-width="1"/>
  <line x1="62" y1="128" x2="96" y2="128" stroke="#D1D5DB" stroke-width="1"/>
  <line x1="62" y1="136" x2="96" y2="136" stroke="#D1D5DB" stroke-width="1"/>
  <line x1="62" y1="144" x2="96" y2="144" stroke="#D1D5DB" stroke-width="1"/>
  <line x1="62" y1="152" x2="96" y2="152" stroke="#D1D5DB" stroke-width="1"/>
  <line x1="62" y1="160" x2="96" y2="160" stroke="#D1D5DB" stroke-width="1"/>
  <!-- Right page lines -->
  <line x1="108" y1="120" x2="142" y2="120" stroke="#D1D5DB" stroke-width="1"/>
  <line x1="108" y1="128" x2="142" y2="128" stroke="#D1D5DB" stroke-width="1"/>
  <line x1="108" y1="136" x2="142" y2="136" stroke="#D1D5DB" stroke-width="1"/>
  <line x1="108" y1="144" x2="142" y2="144" stroke="#D1D5DB" stroke-width="1"/>
  <line x1="108" y1="152" x2="142" y2="152" stroke="#D1D5DB" stroke-width="1"/>
  <line x1="108" y1="160" x2="142" y2="160" stroke="#D1D5DB" stroke-width="1"/>

  <!-- Highlights on some lines -->
  <rect x="62" y="126" width="34" height="4" rx="1" fill="#FDE68A" opacity="0.7"/>
  <rect x="108" y="142" width="34" height="4" rx="1" fill="#FDE68A" opacity="0.7"/>
  <rect x="62" y="150" width="20" height="4" rx="1" fill="#FECDD3" opacity="0.7"/>

  <!-- Magnifying glass -->
  <circle cx="140" cy="170" r="14" fill="none" stroke="#10B981" stroke-width="2.5"/>
  <line x1="150" y1="180" x2="160" y2="190" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="140" cy="170" r="14" fill="#10B981" opacity="0.08"/>

  <!-- Annotation markers -->
  <circle cx="155" cy="120" r="4" fill="#EF4444" opacity="0.6"/>
  <text x="155" y="122" font-family="Arial, sans-serif" font-size="5" fill="white" text-anchor="middle">!</text>
  <circle cx="155" cy="135" r="4" fill="#3B82F6" opacity="0.6"/>
  <text x="155" y="137" font-family="Arial, sans-serif" font-size="5" fill="white" text-anchor="middle">?</text>

  <!-- Labels -->
  <text x="102" y="210" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" text-anchor="middle">1 book, deeply</text>
  <text x="102" y="222" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" text-anchor="middle">Annotations &amp; Analysis</text>
  <text x="102" y="234" font-family="Arial, sans-serif" font-size="8" fill="#10B981" text-anchor="middle" font-weight="bold">Depth</text>

  <!-- RIGHT: Extensive Reading -->
  <rect x="210" y="65" width="175" height="195" rx="10" fill="white" stroke="#10B981" stroke-width="1.5"/>
  <text x="297" y="85" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#065F46" text-anchor="middle">Extensive</text>
  <text x="297" y="96" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" text-anchor="middle">Wide &amp; Broad</text>

  <!-- Stack of multiple books -->
  <!-- Book 1 (bottom) -->
  <rect x="250" y="170" width="70" height="12" rx="3" fill="#6EE7B7" stroke="#10B981" stroke-width="1"/>
  <!-- Book 2 -->
  <rect x="255" y="155" width="65" height="12" rx="3" fill="#A7F3D0" stroke="#10B981" stroke-width="1"/>
  <!-- Book 3 -->
  <rect x="248" y="140" width="72" height="12" rx="3" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
  <!-- Book 4 -->
  <rect x="253" y="125" width="62" height="12" rx="3" fill="#ECFDF5" stroke="#10B981" stroke-width="1"/>
  <!-- Book 5 (top) -->
  <rect x="256" y="110" width="58" height="12" rx="3" fill="#F0FDF4" stroke="#10B981" stroke-width="1"/>

  <!-- Checkmarks on books -->
  <path d="M330 174 L333 177 L338 171" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M328 159 L331 162 L336 156" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M328 144 L331 147 L336 141" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M323 129 L326 132 L331 126" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Additional books scattered -->
  <rect x="235" y="108" width="14" height="18" rx="2" fill="#D1FAE5" stroke="#10B981" stroke-width="0.8" transform="rotate(-10 242 117)"/>
  <rect x="325" y="130" width="14" height="18" rx="2" fill="#A7F3D0" stroke="#10B981" stroke-width="0.8" transform="rotate(8 332 139)"/>

  <!-- Count badge -->
  <circle cx="350" cy="110" r="14" fill="#10B981"/>
  <text x="350" y="113" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">5+</text>
  <text x="350" y="135" font-family="Arial, sans-serif" font-size="7" fill="#6B7280" text-anchor="middle">books</text>

  <!-- Labels -->
  <text x="297" y="210" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" text-anchor="middle">Many books, broadly</text>
  <text x="297" y="222" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" text-anchor="middle">Flow &amp; Fluency</text>
  <text x="297" y="234" font-family="Arial, sans-serif" font-size="8" fill="#10B981" text-anchor="middle" font-weight="bold">Breadth</text>

  <!-- Bottom recommendation -->
  <rect x="100" y="268" width="200" height="24" rx="8" fill="#10B981"/>
  <text x="200" y="284" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Recommended: 30% Deep + 70% Wide</text>
</svg>
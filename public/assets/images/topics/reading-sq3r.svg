<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="#F3F4F6"/>

  <!-- Step 1: Survey -->
  <rect x="20" y="30" width="100" height="50" rx="12" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <!-- Eye icon -->
  <ellipse cx="50" cy="48" rx="10" ry="7" fill="none" stroke="#059669" stroke-width="1.5"/>
  <circle cx="50" cy="48" r="3.5" fill="#059669"/>
  <text x="65" y="60" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#065F46">Survey</text>

  <!-- Arrow 1→2 -->
  <path d="M120 55 L148 55" fill="none" stroke="#10B981" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Step 2: Question -->
  <rect x="150" y="30" width="100" height="50" rx="12" fill="#A7F3D0" stroke="#10B981" stroke-width="2"/>
  <!-- Question mark -->
  <text x="172" y="56" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#059669">?</text>
  <text x="186" y="60" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#065F46">Question</text>

  <!-- Arrow 2→3 -->
  <path d="M250 55 L278 55" fill="none" stroke="#10B981" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Step 3: Read -->
  <rect x="280" y="30" width="100" height="50" rx="12" fill="#6EE7B7" stroke="#10B981" stroke-width="2"/>
  <!-- Book icon -->
  <path d="M302 42 L302 60 L314 56 L326 60 L326 42 L314 38 Z" fill="none" stroke="#065F46" stroke-width="1.5"/>
  <line x1="314" y1="38" x2="314" y2="56" stroke="#065F46" stroke-width="1.5"/>
  <text x="330" y="56" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#065F46">Read</text>

  <!-- Arrow 3→4 (goes down) -->
  <path d="M330 80 L330 108" fill="none" stroke="#10B981" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Step 4: Recite -->
  <rect x="280" y="110" width="100" height="50" rx="12" fill="#34D399" stroke="#10B981" stroke-width="2"/>
  <!-- Speech bubble icon -->
  <rect x="298" y="124" width="18" height="14" rx="4" fill="none" stroke="white" stroke-width="1.5"/>
  <path d="M304 138 L302 144 L308 138" fill="none" stroke="white" stroke-width="1.5"/>
  <text x="320" y="140" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Recite</text>

  <!-- Arrow 4→5 (goes left then down) -->
  <path d="M280 135 L220 135 L220 168" fill="none" stroke="#10B981" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Step 5: Review -->
  <rect x="150" y="170" width="140" height="55" rx="12" fill="#10B981" stroke="#059669" stroke-width="2"/>
  <!-- Checkmark icon -->
  <circle cx="180" cy="197" r="12" fill="none" stroke="white" stroke-width="2"/>
  <path d="M174 197 L178 202 L188 190" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="198" y="202" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Review</text>

  <!-- Descriptive sublabels -->
  <text x="70" y="98" font-family="Arial, sans-serif" font-size="9" fill="#6B7280" text-anchor="middle">Skim &amp; Preview</text>
  <text x="200" y="98" font-family="Arial, sans-serif" font-size="9" fill="#6B7280" text-anchor="middle">Ask Questions</text>
  <text x="330" y="98" font-family="Arial, sans-serif" font-size="9" fill="#6B7280" text-anchor="middle">Active Reading</text>
  <text x="330" y="178" font-family="Arial, sans-serif" font-size="9" fill="#6B7280" text-anchor="middle">Speak / Write</text>
  <text x="220" y="242" font-family="Arial, sans-serif" font-size="9" fill="#6B7280" text-anchor="middle">Check &amp; Consolidate</text>

  <!-- Cycle arrow (review loops back) -->
  <path d="M150 197 Q80 197 80 55 Q80 30 120 40" fill="none" stroke="#10B981" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5" marker-end="url(#arrowG)"/>
  <text x="55" y="125" font-family="Arial, sans-serif" font-size="8" fill="#10B981" transform="rotate(-90 55 125)">Repeat</text>

  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#065F46" text-anchor="middle">SQ3R Reading Method</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 Z" fill="#10B981"/>
    </marker>
  </defs>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#F3F4F6"/>

  <!-- Monthly Grid / Habit Calendar -->
  <rect x="20" y="20" width="175" height="150" rx="10" fill="white" stroke="#059669" stroke-width="1.5"/>
  <text x="107" y="42" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#059669">HABIT TRACKER</text>
  <line x1="30" y1="50" x2="185" y2="50" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Day labels -->
  <text x="42" y="64" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#9CA3AF">M</text>
  <text x="64" y="64" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#9CA3AF">T</text>
  <text x="86" y="64" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#9CA3AF">W</text>
  <text x="108" y="64" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#9CA3AF">T</text>
  <text x="130" y="64" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#9CA3AF">F</text>
  <text x="152" y="64" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#9CA3AF">S</text>
  <text x="174" y="64" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#9CA3AF">S</text>

  <!-- Row 1 checks -->
  <text x="42" y="82" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#059669">&#10003;</text>
  <text x="64" y="82" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#059669">&#10003;</text>
  <text x="86" y="82" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#059669">&#10003;</text>
  <text x="108" y="82" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#EF4444">&#10007;</text>
  <text x="130" y="82" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#059669">&#10003;</text>
  <text x="152" y="82" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#059669">&#10003;</text>
  <text x="174" y="82" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#059669">&#10003;</text>

  <!-- Row 2 -->
  <text x="42" y="100" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#059669">&#10003;</text>
  <text x="64" y="100" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#059669">&#10003;</text>
  <text x="86" y="100" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#059669">&#10003;</text>
  <text x="108" y="100" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#059669">&#10003;</text>
  <text x="130" y="100" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#059669">&#10003;</text>
  <text x="152" y="100" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#059669">&#10003;</text>
  <text x="174" y="100" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#EF4444">&#10007;</text>

  <!-- Row 3 -->
  <text x="42" y="118" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#059669">&#10003;</text>
  <text x="64" y="118" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#059669">&#10003;</text>
  <text x="86" y="118" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#059669">&#10003;</text>
  <text x="108" y="118" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#059669">&#10003;</text>
  <text x="130" y="118" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#059669">&#10003;</text>
  <text x="152" y="118" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#059669">&#10003;</text>
  <text x="174" y="118" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#059669">&#10003;</text>

  <!-- Row 4 (partial) -->
  <text x="42" y="136" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#059669">&#10003;</text>
  <text x="64" y="136" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#059669">&#10003;</text>
  <text x="86" y="136" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#059669">&#10003;</text>
  <text x="108" y="136" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#059669">&#10003;</text>
  <text x="130" y="136" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#059669">&#10003;</text>
  <text x="152" y="136" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#059669">&#10003;</text>
  <text x="174" y="136" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#059669">&#10003;</text>

  <!-- Streak Counter -->
  <rect x="210" y="20" width="170" height="65" rx="10" fill="white" stroke="#059669" stroke-width="1.5"/>
  <text x="295" y="42" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6B7280">CURRENT STREAK</text>
  <!-- Flame icon -->
  <path d="M275 56 C275 50, 280 46, 283 50 C286 46, 291 50, 291 56 C291 64, 283 68, 283 68 C283 68, 275 64, 275 56Z" fill="#F59E0B"/>
  <text x="308" y="68" text-anchor="start" font-family="sans-serif" font-size="22" font-weight="bold" fill="#059669">21</text>
  <text x="340" y="68" text-anchor="start" font-family="sans-serif" font-size="11" fill="#6B7280">days</text>

  <!-- Progress Ring -->
  <rect x="210" y="95" width="170" height="75" rx="10" fill="white" stroke="#059669" stroke-width="1.5"/>
  <text x="260" y="115" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6B7280">COMPLETION</text>
  <!-- Ring background -->
  <circle cx="260" cy="145" r="20" fill="none" stroke="#E5E7EB" stroke-width="5"/>
  <!-- Ring progress (70% = 252deg of 360) -->
  <circle cx="260" cy="145" r="20" fill="none" stroke="#059669" stroke-width="5" stroke-linecap="round" stroke-dasharray="87.96 125.66" transform="rotate(-90 260 145)"/>
  <text x="260" y="149" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#059669">70%</text>

  <!-- Mini bar graph for weekly hours -->
  <text x="335" y="115" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">WEEKLY</text>
  <!-- Bars -->
  <rect x="310" y="150" width="8" height="15" rx="2" fill="#A7F3D0"/>
  <rect x="322" y="140" width="8" height="25" rx="2" fill="#6EE7B7"/>
  <rect x="334" y="132" width="8" height="33" rx="2" fill="#34D399"/>
  <rect x="346" y="125" width="8" height="40" rx="2" fill="#059669"/>

  <!-- Bottom section: Study Hours Bar Graph -->
  <rect x="20" y="185" width="360" height="100" rx="10" fill="white" stroke="#059669" stroke-width="1.5"/>
  <text x="200" y="205" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#059669">WEEKLY STUDY HOURS</text>

  <!-- Day labels and bars -->
  <text x="55" y="272" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">Mon</text>
  <rect x="45" y="232" width="20" height="32" rx="4" fill="#A7F3D0"/>
  <text x="55" y="227" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#059669">2h</text>

  <text x="105" y="272" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">Tue</text>
  <rect x="95" y="222" width="20" height="42" rx="4" fill="#6EE7B7"/>
  <text x="105" y="217" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#059669">3h</text>

  <text x="155" y="272" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">Wed</text>
  <rect x="145" y="240" width="20" height="24" rx="4" fill="#A7F3D0"/>
  <text x="155" y="235" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#059669">1.5h</text>

  <text x="205" y="272" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">Thu</text>
  <rect x="195" y="225" width="20" height="39" rx="4" fill="#6EE7B7"/>
  <text x="205" y="220" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#059669">2.5h</text>

  <text x="255" y="272" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">Fri</text>
  <rect x="245" y="215" width="20" height="49" rx="4" fill="#34D399"/>
  <text x="255" y="210" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#059669">3.5h</text>

  <text x="305" y="272" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">Sat</text>
  <rect x="295" y="210" width="20" height="54" rx="4" fill="#059669"/>
  <text x="305" y="205" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">4h</text>

  <text x="355" y="272" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">Sun</text>
  <rect x="345" y="235" width="20" height="29" rx="4" fill="#A7F3D0"/>
  <text x="355" y="230" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#059669">2h</text>
</svg>
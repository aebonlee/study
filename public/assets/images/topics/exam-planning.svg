<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="#F3F4F6"/>

  <!-- Title -->
  <text x="200" y="28" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#9F1239" text-anchor="middle">Backward Planning Timeline</text>

  <!-- Descending staircase timeline -->
  <!-- Step 1: D-30 -->
  <rect x="30" y="48" width="95" height="36" rx="8" fill="#FECDD3" stroke="#E11D48" stroke-width="1.5"/>
  <text x="50" y="63" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#E11D48">D-30</text>
  <text x="50" y="77" font-family="Arial, sans-serif" font-size="8" fill="#9F1239">Overview</text>
  <!-- Icon: eye -->
  <circle cx="105" cy="62" r="8" fill="#E11D48" opacity="0.15"/>
  <ellipse cx="105" cy="62" rx="6" ry="4" fill="none" stroke="#E11D48" stroke-width="1.2"/>
  <circle cx="105" cy="62" r="2" fill="#E11D48"/>

  <!-- Arrow down-right -->
  <path d="M78 84 L108 96" fill="none" stroke="#FB7185" stroke-width="1.5" marker-end="url(#arrowR)"/>

  <!-- Step 2: D-21 -->
  <rect x="85" y="96" width="95" height="36" rx="8" fill="#FECDD3" stroke="#E11D48" stroke-width="1.5"/>
  <text x="105" y="111" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#E11D48">D-21</text>
  <text x="105" y="125" font-family="Arial, sans-serif" font-size="8" fill="#9F1239">Deep Study</text>
  <!-- Icon: book -->
  <circle cx="160" cy="110" r="8" fill="#E11D48" opacity="0.15"/>
  <path d="M155 106 L155 115 L160 113 L165 115 L165 106 L160 104 Z" fill="none" stroke="#E11D48" stroke-width="1"/>
  <line x1="160" y1="104" x2="160" y2="113" stroke="#E11D48" stroke-width="1"/>

  <!-- Arrow -->
  <path d="M133 132 L163 144" fill="none" stroke="#FB7185" stroke-width="1.5" marker-end="url(#arrowR)"/>

  <!-- Step 3: D-14 -->
  <rect x="140" y="144" width="95" height="36" rx="8" fill="#FB7185" stroke="#E11D48" stroke-width="1.5"/>
  <text x="160" y="159" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">D-14</text>
  <text x="160" y="173" font-family="Arial, sans-serif" font-size="8" fill="#FFF1F2">Problem Solving</text>
  <!-- Icon: pencil -->
  <circle cx="215" cy="158" r="8" fill="white" opacity="0.2"/>
  <line x1="211" y1="163" x2="219" y2="153" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="211" y1="163" x2="213" y2="161" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Arrow -->
  <path d="M188 180 L218 192" fill="none" stroke="#FB7185" stroke-width="1.5" marker-end="url(#arrowR)"/>

  <!-- Step 4: D-7 -->
  <rect x="195" y="192" width="95" height="36" rx="8" fill="#E11D48" stroke="#BE123C" stroke-width="1.5"/>
  <text x="215" y="207" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">D-7</text>
  <text x="215" y="221" font-family="Arial, sans-serif" font-size="8" fill="#FECDD3">Review</text>
  <!-- Icon: cycle arrows -->
  <circle cx="270" cy="206" r="8" fill="white" opacity="0.15"/>
  <path d="M266 203 A5 5 0 1 1 274 206" fill="none" stroke="white" stroke-width="1.2"/>
  <path d="M274 206 L276 203 L272 204" fill="white"/>

  <!-- Arrow -->
  <path d="M243 228 L273 240" fill="none" stroke="#FB7185" stroke-width="1.5" marker-end="url(#arrowR)"/>

  <!-- Step 5: D-3 -->
  <rect x="250" y="240" width="95" height="36" rx="8" fill="#BE123C" stroke="#9F1239" stroke-width="1.5"/>
  <text x="270" y="255" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">D-3</text>
  <text x="270" y="269" font-family="Arial, sans-serif" font-size="8" fill="#FECDD3">Final Review</text>
  <!-- Icon: checklist -->
  <circle cx="325" cy="254" r="8" fill="white" opacity="0.15"/>
  <path d="M321 251 L323 253 L327 249" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="321" y1="257" x2="329" y2="257" stroke="white" stroke-width="1" stroke-linecap="round"/>

  <!-- Arrow to D-Day -->
  <path d="M345 258 L358 258" fill="none" stroke="#9F1239" stroke-width="2" marker-end="url(#arrowR)"/>

  <!-- Step 6: D-Day (special) -->
  <circle cx="375" cy="258" r="16" fill="#9F1239" stroke="#881337" stroke-width="2"/>
  <text x="375" y="255" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white" text-anchor="middle">D</text>
  <text x="375" y="265" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white" text-anchor="middle">DAY</text>

  <!-- Star/sparkle at D-Day -->
  <polygon points="375,236 377,242 383,242 378,246 380,252 375,248 370,252 372,246 367,242 373,242" fill="#F59E0B" opacity="0.7"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 Z" fill="#E11D48"/>
    </marker>
  </defs>
</svg>
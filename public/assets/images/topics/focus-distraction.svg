<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="#F3F4F6"/>

  <!-- Title -->
  <text x="200" y="26" text-anchor="middle" fill="#D97706" font-size="12" font-weight="bold" font-family="Arial, sans-serif">BLOCKING DISTRACTIONS</text>

  <!-- ===== LEFT SIDE: Distractions ===== -->

  <!-- Notification bell -->
  <g transform="translate(55, 70)">
    <circle cx="0" cy="0" r="18" fill="#FEE2E2" opacity="0.6"/>
    <path d="M-7 -2 C-7 -9, 7 -9, 7 -2 L7 4 L10 7 L-10 7 L-7 4 Z" fill="#EF4444" opacity="0.7"/>
    <circle cx="0" cy="9" r="2" fill="#EF4444" opacity="0.7"/>
    <!-- Alert badge -->
    <circle cx="8" cy="-8" r="5" fill="#EF4444"/>
    <text x="8" y="-5" text-anchor="middle" fill="white" font-size="6" font-weight="bold" font-family="Arial, sans-serif">9</text>
  </g>

  <!-- Social media icon -->
  <g transform="translate(100, 120)">
    <circle cx="0" cy="0" r="18" fill="#DBEAFE" opacity="0.6"/>
    <rect x="-8" y="-8" width="16" height="16" rx="4" fill="#3B82F6" opacity="0.6"/>
    <circle cx="0" cy="-2" r="3" fill="white" opacity="0.8"/>
    <circle cx="0" cy="4" r="1.5" fill="white" opacity="0.6"/>
  </g>

  <!-- Email envelope -->
  <g transform="translate(45, 170)">
    <circle cx="0" cy="0" r="18" fill="#FEF3C7" opacity="0.6"/>
    <rect x="-9" y="-6" width="18" height="12" rx="2" fill="none" stroke="#D97706" stroke-width="1.5" opacity="0.7"/>
    <polyline points="-9,-6 0,2 9,-6" fill="none" stroke="#D97706" stroke-width="1.5" opacity="0.7"/>
    <!-- Alert badge -->
    <circle cx="8" cy="-6" r="4" fill="#EF4444" opacity="0.8"/>
    <text x="8" y="-3.5" text-anchor="middle" fill="white" font-size="5" font-weight="bold" font-family="Arial, sans-serif">!</text>
  </g>

  <!-- Chat bubbles -->
  <g transform="translate(95, 220)">
    <circle cx="0" cy="0" r="18" fill="#E5E7EB" opacity="0.6"/>
    <rect x="-10" y="-8" width="14" height="10" rx="3" fill="#6B7280" opacity="0.5"/>
    <polygon points="-6,2 -8,6 -3,2" fill="#6B7280" opacity="0.5"/>
    <rect x="-2" y="-4" width="12" height="8" rx="3" fill="#9CA3AF" opacity="0.5"/>
    <polygon points="4,4 6,8 8,4" fill="#9CA3AF" opacity="0.5"/>
  </g>

  <!-- Music/video icon -->
  <g transform="translate(50, 120)">
    <circle cx="0" cy="0" r="14" fill="#F3E8FF" opacity="0.6"/>
    <polygon points="-4,-6 -4,6 6,0" fill="#8B5CF6" opacity="0.5"/>
  </g>

  <!-- Red warning waves from distractions -->
  <g opacity="0.3">
    <path d="M120 70 Q130 65, 140 70" stroke="#EF4444" stroke-width="1.5" fill="none"/>
    <path d="M125 120 Q135 115, 145 120" stroke="#EF4444" stroke-width="1.5" fill="none"/>
    <path d="M110 170 Q120 165, 130 170" stroke="#EF4444" stroke-width="1.5" fill="none"/>
    <path d="M120 220 Q130 215, 140 220" stroke="#EF4444" stroke-width="1.5" fill="none"/>
  </g>

  <!-- ===== CENTER: Shield/Wall ===== -->
  <g transform="translate(185, 50)">
    <!-- Shield shape -->
    <path d="M0 0 L30 0 L30 155 C30 185, 15 200, 15 200 C15 200, 0 185, 0 155 Z" fill="#D97706" opacity="0.15" stroke="#D97706" stroke-width="2"/>

    <!-- Shield inner -->
    <path d="M5 8 L25 8 L25 150 C25 175, 15 188, 15 188 C15 188, 5 175, 5 150 Z" fill="white" opacity="0.6"/>

    <!-- Crossed-out phone icon on shield -->
    <g transform="translate(15, 80)">
      <rect x="-8" y="-14" width="16" height="28" rx="3" fill="none" stroke="#D97706" stroke-width="1.5"/>
      <rect x="-5" y="-10" width="10" height="18" rx="1" fill="#D97706" opacity="0.1"/>
      <circle cx="0" cy="11" r="2" fill="none" stroke="#D97706" stroke-width="1"/>
      <!-- Cross-out -->
      <line x1="-12" y1="-16" x2="12" y2="16" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="16" fill="none" stroke="#EF4444" stroke-width="2" opacity="0.5"/>
    </g>

    <!-- Shield label -->
    <text x="15" y="150" text-anchor="middle" fill="#D97706" font-size="6" font-weight="bold" font-family="Arial, sans-serif" transform="rotate(-90, 15, 150)">FOCUS SHIELD</text>
  </g>

  <!-- Blocked arrows (red, with X) -->
  <g opacity="0.5">
    <line x1="145" y1="80" x2="175" y2="90" stroke="#EF4444" stroke-width="1.5"/>
    <text x="165" y="82" fill="#EF4444" font-size="10" font-weight="bold" font-family="Arial, sans-serif">x</text>

    <line x1="150" y1="130" x2="175" y2="135" stroke="#EF4444" stroke-width="1.5"/>
    <text x="168" y="128" fill="#EF4444" font-size="10" font-weight="bold" font-family="Arial, sans-serif">x</text>

    <line x1="140" y1="180" x2="175" y2="175" stroke="#EF4444" stroke-width="1.5"/>
    <text x="163" y="182" fill="#EF4444" font-size="10" font-weight="bold" font-family="Arial, sans-serif">x</text>

    <line x1="145" y1="225" x2="175" y2="215" stroke="#EF4444" stroke-width="1.5"/>
    <text x="165" y="225" fill="#EF4444" font-size="10" font-weight="bold" font-family="Arial, sans-serif">x</text>
  </g>

  <!-- ===== RIGHT SIDE: Peaceful Study Space ===== -->

  <!-- Peaceful background -->
  <rect x="230" y="55" width="155" height="195" rx="10" fill="white" opacity="0.5"/>

  <!-- Desk -->
  <rect x="250" y="190" width="120" height="8" rx="2" fill="#D97706" opacity="0.2"/>
  <!-- Desk legs -->
  <rect x="258" y="198" width="6" height="30" rx="1" fill="#D97706" opacity="0.15"/>
  <rect x="356" y="198" width="6" height="30" rx="1" fill="#D97706" opacity="0.15"/>

  <!-- Person at desk -->
  <g transform="translate(310, 150)">
    <!-- Head -->
    <circle cx="0" cy="-10" r="14" fill="#D97706" opacity="0.3"/>
    <!-- Body -->
    <rect x="-12" y="6" width="24" height="30" rx="6" fill="#D97706" opacity="0.3"/>
    <!-- Arms reaching to desk -->
    <line x1="-12" y1="16" x2="-22" y2="28" stroke="#D97706" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
    <line x1="12" y1="16" x2="22" y2="28" stroke="#D97706" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
  </g>

  <!-- Book on desk -->
  <rect x="270" y="178" width="24" height="16" rx="2" fill="#FEF3C7" stroke="#D97706" stroke-width="1" opacity="0.7"/>
  <line x1="282" y1="180" x2="282" y2="192" stroke="#D97706" stroke-width="0.5" opacity="0.4"/>

  <!-- Laptop on desk -->
  <rect x="330" y="174" width="28" height="18" rx="2" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1" opacity="0.6"/>
  <rect x="326" y="192" width="36" height="3" rx="1" fill="#D1D5DB" opacity="0.5"/>

  <!-- Peace/calm indicators -->
  <g transform="translate(260, 75)" opacity="0.5">
    <text x="0" y="0" fill="#D97706" font-size="10" font-family="Arial, sans-serif">~</text>
    <text x="18" y="-5" fill="#D97706" font-size="8" font-family="Arial, sans-serif">~</text>
    <text x="8" y="8" fill="#D97706" font-size="6" font-family="Arial, sans-serif">~</text>
  </g>

  <!-- Checkmark in peaceful zone -->
  <g transform="translate(370, 75)">
    <circle cx="0" cy="0" r="10" fill="#D97706" opacity="0.1"/>
    <polyline points="-5,0 -1,4 5,-4" stroke="#D97706" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Focus label in peaceful zone -->
  <text x="310" y="72" text-anchor="middle" fill="#D97706" font-size="8" font-weight="bold" font-family="Arial, sans-serif">FOCUSED</text>

  <!-- Bottom labels -->
  <text x="75" y="268" text-anchor="middle" fill="#EF4444" font-size="8" font-family="Arial, sans-serif">Distractions</text>
  <text x="200" y="268" text-anchor="middle" fill="#D97706" font-size="8" font-family="Arial, sans-serif">Shield</text>
  <text x="310" y="268" text-anchor="middle" fill="#D97706" font-size="8" font-weight="bold" font-family="Arial, sans-serif">Deep Focus Zone</text>

  <!-- Decorative corner marks -->
  <path d="M8 8 L8 4 L12 4" stroke="#D97706" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M392 8 L392 4 L388 4" stroke="#D97706" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M8 292 L8 296 L12 296" stroke="#D97706" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M392 292 L392 296 L388 296" stroke="#D97706" stroke-width="1" fill="none" opacity="0.3"/>
</svg>
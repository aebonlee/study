<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#F3F4F6"/>

  <!-- Ground line -->
  <rect x="0" y="230" width="400" height="70" rx="0" fill="#D1FAE5"/>
  <line x1="0" y1="230" x2="400" y2="230" stroke="#059669" stroke-width="1"/>

  <!-- Stage 1: Seed (Month 1-2) -->
  <!-- Seed underground -->
  <ellipse cx="55" cy="245" rx="8" ry="6" fill="#92400E"/>
  <path d="M55 239 C55 235, 58 232, 58 228" stroke="#059669" stroke-width="1.5" fill="none"/>
  <!-- Tiny root -->
  <path d="M55 251 C52 258, 48 262, 45 268" stroke="#92400E" stroke-width="1" fill="none"/>
  <path d="M55 251 C58 256, 62 260, 65 265" stroke="#92400E" stroke-width="1" fill="none"/>

  <!-- Stage 2: Sprout (Month 3-4) -->
  <line x1="140" y1="230" x2="140" y2="205" stroke="#059669" stroke-width="2.5"/>
  <ellipse cx="134" cy="202" rx="10" ry="7" fill="#34D399"/>
  <ellipse cx="146" cy="202" rx="10" ry="7" fill="#6EE7B7"/>
  <!-- Roots -->
  <path d="M140 230 C135 245, 128 255, 122 265" stroke="#92400E" stroke-width="1.5" fill="none"/>
  <path d="M140 230 C145 248, 152 258, 158 265" stroke="#92400E" stroke-width="1.5" fill="none"/>
  <text x="140" y="278" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#065F46">habits</text>

  <!-- Stage 3: Sapling (Month 5-7) -->
  <line x1="225" y1="230" x2="225" y2="170" stroke="#059669" stroke-width="3"/>
  <!-- Branches -->
  <path d="M225 200 C215 190, 205 185, 200 180" stroke="#059669" stroke-width="2" fill="none"/>
  <ellipse cx="198" cy="175" rx="12" ry="9" fill="#34D399"/>
  <path d="M225 190 C235 180, 245 175, 250 170" stroke="#059669" stroke-width="2" fill="none"/>
  <ellipse cx="252" cy="166" rx="12" ry="9" fill="#6EE7B7"/>
  <ellipse cx="225" cy="165" rx="14" ry="10" fill="#059669"/>
  <!-- Roots -->
  <path d="M225 230 C218 248, 208 258, 198 270" stroke="#92400E" stroke-width="2" fill="none"/>
  <path d="M225 230 C232 248, 242 258, 252 270" stroke="#92400E" stroke-width="2" fill="none"/>
  <path d="M225 230 C225 250, 225 260, 225 272" stroke="#92400E" stroke-width="1.5" fill="none"/>
  <text x="225" y="284" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#065F46">habits</text>

  <!-- Stage 4: Full Tree (Month 8-12) -->
  <line x1="330" y1="230" x2="330" y2="120" stroke="#059669" stroke-width="4"/>
  <!-- Main branches -->
  <path d="M330 170 C315 155, 300 145, 290 140" stroke="#059669" stroke-width="3" fill="none"/>
  <path d="M330 160 C345 145, 360 135, 370 130" stroke="#059669" stroke-width="3" fill="none"/>
  <path d="M330 150 C320 135, 305 125, 298 120" stroke="#059669" stroke-width="2.5" fill="none"/>
  <path d="M330 140 C340 125, 355 118, 362 115" stroke="#059669" stroke-width="2.5" fill="none"/>
  <!-- Large canopy -->
  <ellipse cx="330" cy="105" rx="55" ry="40" fill="#059669" opacity="0.8"/>
  <ellipse cx="310" cy="115" rx="30" ry="25" fill="#34D399" opacity="0.7"/>
  <ellipse cx="350" cy="112" rx="28" ry="22" fill="#6EE7B7" opacity="0.6"/>

  <!-- Fruits (skills) -->
  <circle cx="298" cy="100" r="8" fill="#F59E0B"/>
  <text x="298" y="103" text-anchor="middle" font-family="sans-serif" font-size="5" fill="white">Skill</text>
  <circle cx="340" cy="85" r="8" fill="#F59E0B"/>
  <text x="340" y="88" text-anchor="middle" font-family="sans-serif" font-size="5" fill="white">Skill</text>
  <circle cx="365" cy="100" r="8" fill="#F59E0B"/>
  <text x="365" y="103" text-anchor="middle" font-family="sans-serif" font-size="5" fill="white">Skill</text>
  <circle cx="320" cy="90" r="8" fill="#F59E0B"/>
  <text x="320" y="93" text-anchor="middle" font-family="sans-serif" font-size="5" fill="white">Skill</text>

  <!-- Roots -->
  <path d="M330 230 C320 250, 305 262, 290 275" stroke="#92400E" stroke-width="2.5" fill="none"/>
  <path d="M330 230 C340 250, 355 262, 370 275" stroke="#92400E" stroke-width="2.5" fill="none"/>
  <path d="M330 230 C326 255, 318 268, 312 278" stroke="#92400E" stroke-width="2" fill="none"/>
  <path d="M330 230 C334 255, 342 268, 348 278" stroke="#92400E" stroke-width="2" fill="none"/>
  <text x="330" y="290" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#065F46">habits</text>

  <!-- Timeline at bottom -->
  <line x1="30" y1="230" x2="385" y2="230" stroke="#059669" stroke-width="1" stroke-dasharray="4 2"/>

  <!-- Month markers on timeline -->
  <text x="55" y="225" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#059669">1</text>
  <text x="95" y="225" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#059669">2</text>
  <text x="140" y="225" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#059669">3</text>
  <text x="180" y="225" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#059669">5</text>
  <text x="225" y="225" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#059669">6</text>
  <text x="270" y="225" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#059669">8</text>
  <text x="330" y="225" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#059669">12</text>

  <!-- Stage labels -->
  <text x="55" y="16" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#059669">Seed</text>
  <text x="140" y="16" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#059669">Sprout</text>
  <text x="225" y="16" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#059669">Sapling</text>
  <text x="330" y="16" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#059669">Full Tree</text>

  <!-- Arrows between stages -->
  <path d="M80 18 L115 18" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arrowG)"/>
  <path d="M168 18 L200 18" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arrowG)"/>
  <path d="M253 18 L295 18" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arrowG)"/>
  <defs>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6Z" fill="#059669"/>
    </marker>
  </defs>

  <!-- Months label -->
  <text x="200" y="298" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">Months of Consistent Practice</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#F3F4F6"/>

  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" fill="#334155" font-size="13" font-family="system-ui" font-weight="700">Burnout Stages &amp; Prevention</text>

  <!-- Battery outline (main visual) -->
  <g transform="translate(50,45)">
    <!-- Battery body -->
    <rect x="0" y="0" width="300" height="130" rx="12" fill="white" stroke="#CBD5E1" stroke-width="2.5"/>
    <!-- Battery terminal -->
    <rect x="300" y="40" width="15" height="50" rx="6" fill="#CBD5E1"/>

    <!-- Stage 1: Full (100% green) -->
    <rect x="8" y="8" width="52" height="114" rx="6" fill="#22C55E"/>
    <text x="34" y="55" text-anchor="middle" fill="white" font-size="10" font-family="system-ui" font-weight="700">100%</text>
    <text x="34" y="72" text-anchor="middle" fill="white" font-size="8" font-family="system-ui" opacity="0.9">FULL</text>
    <!-- Lightning bolt -->
    <g transform="translate(34,90)">
      <path d="M-3,-8 L1,-2 L-2,-2 L3,8 L-1,2 L2,2Z" fill="white" opacity="0.8"/>
    </g>

    <!-- Stage 2: 75% yellow-green -->
    <rect x="66" y="8" width="52" height="114" rx="6" fill="#84CC16"/>
    <rect x="66" y="8" width="52" height="28" rx="6" fill="white" opacity="0.3"/>
    <text x="92" y="55" text-anchor="middle" fill="white" font-size="10" font-family="system-ui" font-weight="700">75%</text>
    <text x="92" y="72" text-anchor="middle" fill="white" font-size="8" font-family="system-ui" opacity="0.9">STRESS</text>
    <!-- Small warning -->
    <text x="92" y="100" text-anchor="middle" fill="white" font-size="14" font-family="system-ui" opacity="0.7">!</text>

    <!-- Stage 3: 50% yellow/amber -->
    <rect x="124" y="8" width="52" height="114" rx="6" fill="#F59E0B"/>
    <rect x="124" y="8" width="52" height="56" rx="6" fill="white" opacity="0.2"/>
    <text x="150" y="68" text-anchor="middle" fill="white" font-size="10" font-family="system-ui" font-weight="700">50%</text>
    <text x="150" y="85" text-anchor="middle" fill="white" font-size="7" font-family="system-ui" opacity="0.9">CHRONIC</text>
    <!-- Warning triangle -->
    <g transform="translate(150,100)">
      <path d="M0,-6 L6,5 L-6,5Z" fill="white" opacity="0.6"/>
      <text x="0" y="3" text-anchor="middle" fill="#F59E0B" font-size="7" font-family="system-ui" font-weight="700">!</text>
    </g>

    <!-- Stage 4: 25% orange -->
    <rect x="182" y="8" width="52" height="114" rx="6" fill="#EF4444" opacity="0.7"/>
    <rect x="182" y="8" width="52" height="85" rx="6" fill="white" opacity="0.15"/>
    <text x="208" y="80" text-anchor="middle" fill="white" font-size="10" font-family="system-ui" font-weight="700">25%</text>
    <text x="208" y="97" text-anchor="middle" fill="white" font-size="7" font-family="system-ui" opacity="0.9">BURNOUT</text>
    <!-- Danger icon -->
    <g transform="translate(208,108)">
      <line x1="-5" y1="-5" x2="5" y2="5" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <line x1="5" y1="-5" x2="-5" y2="5" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    </g>

    <!-- Stage 5: ~5% red, nearly empty -->
    <rect x="240" y="8" width="52" height="114" rx="6" fill="#991B1B" opacity="0.6"/>
    <rect x="240" y="8" width="52" height="102" rx="6" fill="white" opacity="0.1"/>
    <text x="266" y="96" text-anchor="middle" fill="white" font-size="10" font-family="system-ui" font-weight="700">5%</text>
    <text x="266" y="112" text-anchor="middle" fill="white" font-size="6" font-family="system-ui" opacity="0.9">EMPTY</text>
    <!-- Flashing indicator -->
    <circle cx="266" cy="25" r="4" fill="#EF4444" opacity="0.4"/>
    <circle cx="266" cy="25" r="2" fill="#EF4444" opacity="0.8"/>

    <!-- Drain arrow below -->
    <line x1="34" y1="135" x2="266" y2="135" stroke="#94A3B8" stroke-width="1.5" opacity="0.5"/>
    <polyline points="258,131 266,135 258,139" stroke="#94A3B8" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
    <text x="150" y="150" text-anchor="middle" fill="#94A3B8" font-size="9" font-family="system-ui">Energy Drain →</text>
  </g>

  <!-- Charging stations (prevention strategies) -->
  <text x="200" y="215" text-anchor="middle" fill="#334155" font-size="11" font-family="system-ui" font-weight="600">Charging Stations (Prevention)</text>

  <!-- Station 1: Rest -->
  <g transform="translate(65,255)">
    <rect x="-30" y="-20" width="60" height="40" rx="8" fill="white" stroke="#22C55E" stroke-width="1.5"/>
    <!-- Moon icon -->
    <path d="M-5,-8 A6,6 0 1,0 3,-12 A5,5 0 0,1 -5,-8Z" fill="#22C55E" opacity="0.6"/>
    <circle cx="6" cy="-10" r="1" fill="#22C55E" opacity="0.3"/>
    <!-- Lightning -->
    <path d="M-2,0 L1,4 L-1,4 L2,9" stroke="#22C55E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <text x="0" y="30" text-anchor="middle" fill="#22C55E" font-size="9" font-family="system-ui" font-weight="600">Rest</text>
  </g>

  <!-- Station 2: Exercise -->
  <g transform="translate(165,255)">
    <rect x="-30" y="-20" width="60" height="40" rx="8" fill="white" stroke="#F59E0B" stroke-width="1.5"/>
    <!-- Running figure -->
    <circle cx="-2" cy="-10" r="4" fill="#F59E0B" opacity="0.6"/>
    <line x1="-2" y1="-6" x2="-2" y2="2" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="-2" y1="2" x2="-7" y2="8" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="-2" y1="2" x2="3" y2="8" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="-2" y1="-3" x2="-8" y2="-6" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="-2" y1="-3" x2="5" y2="0" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <!-- Lightning -->
    <path d="M10,-2 L13,2 L11,2 L14,7" stroke="#F59E0B" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <text x="0" y="30" text-anchor="middle" fill="#F59E0B" font-size="9" font-family="system-ui" font-weight="600">Exercise</text>
  </g>

  <!-- Station 3: Hobby -->
  <g transform="translate(265,255)">
    <rect x="-30" y="-20" width="60" height="40" rx="8" fill="white" stroke="#8B5CF6" stroke-width="1.5"/>
    <!-- Music note / hobby icon -->
    <g fill="#8B5CF6" opacity="0.6">
      <circle cx="-4" cy="6" r="4"/>
      <rect x="-1" y="-10" width="2.5" height="16" rx="1"/>
      <path d="M1,-10 Q8,-14 8,-8 Q8,-4 1,-6Z"/>
    </g>
    <!-- Lightning -->
    <path d="M12,-2 L15,2 L13,2 L16,7" stroke="#8B5CF6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <text x="0" y="30" text-anchor="middle" fill="#8B5CF6" font-size="9" font-family="system-ui" font-weight="600">Hobby</text>
  </g>

  <!-- Station 4: Social -->
  <g transform="translate(350,255)">
    <rect x="-30" y="-20" width="60" height="40" rx="8" fill="white" stroke="#0891B2" stroke-width="1.5"/>
    <!-- Two people icon -->
    <circle cx="-5" cy="-8" r="4" fill="#0891B2" opacity="0.5"/>
    <circle cx="7" cy="-8" r="4" fill="#0891B2" opacity="0.7"/>
    <path d="M-10,-2 Q-5,-5 0,-2 L-1,5 L-9,5Z" fill="#0891B2" opacity="0.4"/>
    <path d="M2,-2 Q7,-5 12,-2 L11,5 L3,5Z" fill="#0891B2" opacity="0.6"/>
    <!-- Lightning -->
    <path d="M16,-4 L19,0 L17,0 L20,5" stroke="#0891B2" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <text x="0" y="30" text-anchor="middle" fill="#0891B2" font-size="9" font-family="system-ui" font-weight="600">Social</text>
  </g>

  <!-- Connecting dots from battery to stations -->
  <circle cx="100" cy="200" r="2" fill="#CBD5E1"/>
  <circle cx="200" cy="202" r="2" fill="#CBD5E1"/>
  <circle cx="300" cy="200" r="2" fill="#CBD5E1"/>
</svg>

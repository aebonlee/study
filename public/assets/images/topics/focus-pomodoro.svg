<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="#F3F4F6"/>

  <!-- Subtle pattern -->
  <pattern id="dots-pom" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="0.7" fill="#E5E7EB"/>
  </pattern>
  <rect width="400" height="300" fill="url(#dots-pom)" rx="12"/>

  <!-- Tomato timer (left side) -->
  <g transform="translate(110, 130)">
    <!-- Tomato body -->
    <ellipse cx="0" cy="10" rx="60" ry="55" fill="#D97706" opacity="0.12"/>
    <ellipse cx="0" cy="10" rx="55" ry="50" fill="#D97706" opacity="0.15"/>
    <ellipse cx="0" cy="10" rx="50" ry="45" fill="white" stroke="#D97706" stroke-width="2"/>

    <!-- Stem -->
    <path d="M0 -35 Q-2 -45 0 -50 Q2 -45 0 -35" fill="#16A34A" opacity="0.6"/>
    <path d="M0 -40 Q-10 -48 -15 -45" stroke="#16A34A" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M0 -40 Q10 -48 15 -45" stroke="#16A34A" stroke-width="1.5" fill="none" opacity="0.4"/>
    <!-- Leaf -->
    <ellipse cx="-12" cy="-46" rx="6" ry="3" fill="#16A34A" opacity="0.3" transform="rotate(-20 -12 -46)"/>
    <ellipse cx="12" cy="-46" rx="6" ry="3" fill="#16A34A" opacity="0.3" transform="rotate(20 12 -46)"/>

    <!-- Timer face markings -->
    <!-- 12 hour marks -->
    <line x1="0" y1="-38" x2="0" y2="-32" stroke="#D97706" stroke-width="2" stroke-linecap="round"/>
    <line x1="19" y1="-30" x2="16" y2="-26" stroke="#D97706" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="33" y1="-12" x2="28" y2="-10" stroke="#D97706" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="38" y1="10" x2="32" y2="10" stroke="#D97706" stroke-width="2" stroke-linecap="round"/>
    <line x1="33" y1="32" x2="28" y2="30" stroke="#D97706" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="19" y1="48" x2="16" y2="44" stroke="#D97706" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="53" x2="0" y2="47" stroke="#D97706" stroke-width="2" stroke-linecap="round"/>
    <line x1="-19" y1="48" x2="-16" y2="44" stroke="#D97706" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-33" y1="32" x2="-28" y2="30" stroke="#D97706" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-38" y1="10" x2="-32" y2="10" stroke="#D97706" stroke-width="2" stroke-linecap="round"/>
    <line x1="-33" y1="-12" x2="-28" y2="-10" stroke="#D97706" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-19" y1="-30" x2="-16" y2="-26" stroke="#D97706" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Timer hand pointing to ~25 min position -->
    <line x1="0" y1="10" x2="22" y2="-18" stroke="#D97706" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="10" r="3" fill="#D97706"/>

    <!-- 25 text -->
    <text x="0" y="30" text-anchor="middle" fill="#D97706" font-size="16" font-weight="bold" font-family="Arial, sans-serif">25</text>
    <text x="0" y="40" text-anchor="middle" fill="#D97706" font-size="7" font-family="Arial, sans-serif" opacity="0.7">min</text>

    <!-- Progress arc (showing ~25/60 filled) -->
    <path d="M0 -40 A 40 40 0 0 1 35 -15" stroke="#D97706" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- Cycle diagram (right side) -->
  <g transform="translate(290, 140)">
    <!-- Central circle path -->
    <!-- Work session 1 -->
    <path d="M0 -68 A 68 68 0 0 1 59 -34" stroke="#D97706" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Break 1 -->
    <path d="M62 -28 A 68 68 0 0 1 68 0" stroke="#FCD34D" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Work session 2 -->
    <path d="M68 5 A 68 68 0 0 1 34 59" stroke="#D97706" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Break 2 -->
    <path d="M28 62 A 68 68 0 0 1 0 68" stroke="#FCD34D" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Work session 3 -->
    <path d="M-5 68 A 68 68 0 0 1 -59 34" stroke="#D97706" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Break 3 -->
    <path d="M-62 28 A 68 68 0 0 1 -68 0" stroke="#FCD34D" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Work session 4 -->
    <path d="M-68 -5 A 68 68 0 0 1 -34 -59" stroke="#D97706" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Long break -->
    <path d="M-28 -62 A 68 68 0 0 1 -5 -68" stroke="#92400E" stroke-width="7" fill="none" stroke-linecap="round"/>

    <!-- Labels around the cycle -->
    <!-- Work 1 -->
    <text x="38" y="-60" text-anchor="middle" fill="#D97706" font-size="7" font-weight="bold" font-family="Arial, sans-serif">25m</text>
    <!-- Break 1 -->
    <text x="76" y="-10" text-anchor="start" fill="#F59E0B" font-size="6" font-family="Arial, sans-serif">5m</text>
    <!-- Work 2 -->
    <text x="60" y="50" text-anchor="middle" fill="#D97706" font-size="7" font-weight="bold" font-family="Arial, sans-serif">25m</text>
    <!-- Break 2 -->
    <text x="15" y="82" text-anchor="middle" fill="#F59E0B" font-size="6" font-family="Arial, sans-serif">5m</text>
    <!-- Work 3 -->
    <text x="-55" y="48" text-anchor="middle" fill="#D97706" font-size="7" font-weight="bold" font-family="Arial, sans-serif">25m</text>
    <!-- Break 3 -->
    <text x="-78" y="12" text-anchor="end" fill="#F59E0B" font-size="6" font-family="Arial, sans-serif">5m</text>
    <!-- Work 4 -->
    <text x="-58" y="-46" text-anchor="middle" fill="#D97706" font-size="7" font-weight="bold" font-family="Arial, sans-serif">25m</text>
    <!-- Long break -->
    <text x="-18" y="-78" text-anchor="middle" fill="#92400E" font-size="6" font-weight="bold" font-family="Arial, sans-serif">15m</text>

    <!-- Direction arrows on cycle -->
    <polygon points="60,-32 55,-38 65,-36" fill="#D97706"/>
    <polygon points="67,3 63,-4 70,0" fill="#FCD34D"/>
    <polygon points="30,60 25,54 35,56" fill="#D97706"/>
    <polygon points="-2,68 3,62 0,70" fill="#FCD34D"/>
    <polygon points="-60,30 -55,36 -64,34" fill="#D97706"/>
    <polygon points="-68,-3 -64,4 -70,0" fill="#FCD34D"/>
    <polygon points="-32,-60 -26,-56 -35,-55" fill="#D97706"/>
    <polygon points="-3,-68 2,-62 -6,-66" fill="#92400E"/>

    <!-- Center icon -->
    <circle cx="0" cy="0" r="20" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" fill="#D97706" font-size="8" font-weight="bold" font-family="Arial, sans-serif">1 SET</text>
    <text x="0" y="14" text-anchor="middle" fill="#92400E" font-size="6" font-family="Arial, sans-serif">~2 hrs</text>

    <!-- Small icons for work vs break -->
    <!-- Work icon (pencil) at 45 degrees -->
    <g transform="translate(42, -52)">
      <rect x="-2" y="-5" width="4" height="10" rx="1" fill="#D97706" opacity="0.5"/>
    </g>
    <!-- Break icon (coffee) -->
    <g transform="translate(80, -12)">
      <rect x="-4" y="-3" width="8" height="6" rx="1" fill="#F59E0B" opacity="0.4"/>
      <path d="M4 -2 Q7 -2 7 1 Q7 4 4 3" stroke="#F59E0B" stroke-width="0.8" fill="none" opacity="0.4"/>
    </g>
  </g>

  <!-- Legend at bottom -->
  <g transform="translate(130, 264)">
    <rect x="0" y="0" width="12" height="6" rx="3" fill="#D97706"/>
    <text x="18" y="5.5" fill="#374151" font-size="8" font-family="Arial, sans-serif">Work (25 min)</text>

    <rect x="90" y="0" width="8" height="6" rx="3" fill="#FCD34D"/>
    <text x="104" y="5.5" fill="#374151" font-size="8" font-family="Arial, sans-serif">Short Break (5 min)</text>

    <rect x="210" y="0" width="10" height="6" rx="3" fill="#92400E"/>
    <text x="226" y="5.5" fill="#374151" font-size="8" font-family="Arial, sans-serif">Long Break (15 min)</text>
  </g>

  <!-- Decorative tomato shapes -->
  <g transform="translate(30, 30)">
    <circle cx="0" cy="0" r="8" fill="#D97706" opacity="0.08"/>
    <path d="M0 -8 Q-1 -12 0 -13 Q1 -12 0 -8" fill="#16A34A" opacity="0.2"/>
  </g>
  <g transform="translate(370, 280)">
    <circle cx="0" cy="0" r="6" fill="#D97706" opacity="0.08"/>
    <path d="M0 -6 Q-1 -9 0 -10 Q1 -9 0 -6" fill="#16A34A" opacity="0.2"/>
  </g>

  <!-- Title -->
  <text x="110" y="28" text-anchor="middle" fill="#D97706" font-size="10" font-weight="bold" font-family="Arial, sans-serif" opacity="0.7">POMODORO TIMER</text>
  <text x="290" y="28" text-anchor="middle" fill="#D97706" font-size="10" font-weight="bold" font-family="Arial, sans-serif" opacity="0.7">CYCLE DIAGRAM</text>
</svg>
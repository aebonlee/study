<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" rx="16" fill="#FFFBEB"/>

  <!-- Concentric focus rings -->
  <circle cx="400" cy="175" r="150" fill="none" stroke="#D97706" stroke-width="1.5" opacity="0.1" stroke-dasharray="8,4"/>
  <circle cx="400" cy="175" r="120" fill="none" stroke="#D97706" stroke-width="1.5" opacity="0.15" stroke-dasharray="6,4"/>
  <circle cx="400" cy="175" r="90" fill="#D97706" opacity="0.04"/>
  <circle cx="400" cy="175" r="90" fill="none" stroke="#D97706" stroke-width="2" opacity="0.2"/>
  <circle cx="400" cy="175" r="60" fill="#D97706" opacity="0.06"/>
  <circle cx="400" cy="175" r="60" fill="none" stroke="#D97706" stroke-width="2" opacity="0.25"/>
  <circle cx="400" cy="175" r="30" fill="#D97706" opacity="0.1"/>
  <circle cx="400" cy="175" r="30" fill="none" stroke="#D97706" stroke-width="2.5" opacity="0.35"/>

  <!-- Person meditating -->
  <circle cx="400" cy="148" r="12" fill="#D97706" opacity="0.7"/>
  <path d="M400,160 L400,180" stroke="#D97706" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <path d="M400,168 Q387,163 375,173" stroke="#D97706" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M400,168 Q413,163 425,173" stroke="#D97706" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M400,180 Q390,190 377,193" stroke="#D97706" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M400,180 Q410,190 423,193" stroke="#D97706" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <circle cx="375" cy="175" r="3.5" fill="#D97706" opacity="0.45"/>
  <circle cx="425" cy="175" r="3.5" fill="#D97706" opacity="0.45"/>

  <!-- Distraction: Phone (top-left) -->
  <g transform="translate(190,80)">
    <rect x="-14" y="-22" width="28" height="44" rx="4" fill="#FEE2E2" stroke="#EF4444" stroke-width="1"/>
    <rect x="-10" y="-16" width="20" height="30" rx="2" fill="white" opacity="0.5"/>
    <circle cx="7" cy="-13" r="4" fill="#EF4444" opacity="0.5"/>
    <text x="7" y="-10" text-anchor="middle" fill="white" font-family="sans-serif" font-size="5" font-weight="700">3</text>
  </g>
  <circle cx="235" cy="110" r="10" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <path d="M232,110 L235,113 L240,107" stroke="#D97706" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Distraction: Social media (top-right) -->
  <g transform="translate(600,75)">
    <rect x="-16" y="-16" width="32" height="32" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/>
    <circle cx="-4" cy="-3" r="3" fill="#8B5CF6" opacity="0.4"/>
    <circle cx="5" cy="-6" r="2.5" fill="#8B5CF6" opacity="0.3"/>
    <path d="M-4,0 L5,-3" stroke="#8B5CF6" stroke-width="1" opacity="0.3"/>
  </g>
  <circle cx="558" cy="98" r="10" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <path d="M555,98 L558,101 L563,95" stroke="#D97706" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Distraction: Email (right) -->
  <g transform="translate(628,190)">
    <rect x="-15" y="-10" width="30" height="20" rx="3" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
    <path d="M-13,-8 L0,1 L13,-8" stroke="#3B82F6" stroke-width="1" fill="none" opacity="0.5"/>
  </g>
  <circle cx="578" cy="190" r="10" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <path d="M575,190 L578,193 L583,187" stroke="#D97706" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Distraction: Game (left) -->
  <g transform="translate(170,200)">
    <rect x="-16" y="-9" width="32" height="18" rx="9" fill="#FCE7F3" stroke="#EC4899" stroke-width="1"/>
    <rect x="-8" y="-2" width="6" height="2" rx="1" fill="#EC4899" opacity="0.3"/>
    <rect x="-6" y="-5" width="2" height="6" rx="1" fill="#EC4899" opacity="0.3"/>
    <circle cx="6" cy="-1" r="1.5" fill="#EC4899" opacity="0.3"/>
    <circle cx="10" cy="1" r="1.5" fill="#EC4899" opacity="0.3"/>
  </g>
  <circle cx="222" cy="195" r="10" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <path d="M219,195 L222,198 L227,192" stroke="#D97706" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Distraction: News (bottom-left) -->
  <g transform="translate(215,310)">
    <rect x="-12" y="-12" width="24" height="24" rx="4" fill="#FEF9C3" stroke="#F59E0B" stroke-width="1"/>
    <circle cx="-4" cy="4" r="2.5" fill="#F59E0B" opacity="0.3"/>
    <path d="M-4,-1 Q1,-1 1,4" stroke="#F59E0B" stroke-width="1" fill="none" opacity="0.3"/>
    <path d="M-4,-5 Q5,-5 5,4" stroke="#F59E0B" stroke-width="1" fill="none" opacity="0.25"/>
  </g>

  <!-- Distraction: Music (bottom-right) -->
  <g transform="translate(580,310)">
    <circle cx="0" cy="0" r="12" fill="#ECFDF5" stroke="#10B981" stroke-width="1"/>
    <path d="M-2,-3 L-2,-9 L4,-11 L4,-5" stroke="#10B981" stroke-width="1.2" fill="none" opacity="0.4"/>
    <circle cx="-4" cy="-2" r="2" fill="#10B981" opacity="0.3"/>
    <circle cx="2" cy="-4" r="2" fill="#10B981" opacity="0.3"/>
  </g>

  <!-- Focus zone check -->
  <circle cx="400" cy="225" r="10" fill="#D97706" opacity="0.15"/>
  <polyline points="395,225 399,229 406,221" stroke="#D97706" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>

  <!-- Labels -->
  <text x="400" y="340" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#92400E" opacity="0.5">FOCUS ZONE</text>
  <text x="400" y="358" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#B45309" opacity="0.4">Block distractions, deepen concentration</text>

  <!-- Corner decorations -->
  <circle cx="55" cy="40" r="3" fill="#D97706" opacity="0.1"/>
  <circle cx="745" cy="40" r="3" fill="#D97706" opacity="0.1"/>
  <circle cx="55" cy="360" r="3" fill="#D97706" opacity="0.1"/>
  <circle cx="745" cy="360" r="3" fill="#D97706" opacity="0.1"/>
</svg>

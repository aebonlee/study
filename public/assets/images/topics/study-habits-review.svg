<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#F3F4F6"/>

  <!-- Title -->
  <text x="200" y="28" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#059669">Ebbinghaus Forgetting Curve + Spaced Review</text>

  <!-- Axis -->
  <line x1="50" y1="250" x2="380" y2="250" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="50" y1="250" x2="50" y2="45" stroke="#9CA3AF" stroke-width="1.5"/>

  <!-- Y-axis label -->
  <text x="20" y="150" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280" transform="rotate(-90 20 150)">Memory Retention %</text>
  <text x="45" y="58" text-anchor="end" font-family="sans-serif" font-size="8" fill="#9CA3AF">100%</text>
  <text x="45" y="105" text-anchor="end" font-family="sans-serif" font-size="8" fill="#9CA3AF">75%</text>
  <text x="45" y="155" text-anchor="end" font-family="sans-serif" font-size="8" fill="#9CA3AF">50%</text>
  <text x="45" y="205" text-anchor="end" font-family="sans-serif" font-size="8" fill="#9CA3AF">25%</text>

  <!-- X-axis labels -->
  <text x="200" y="270" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">Time</text>

  <!-- Forgetting Curve (without review) - dashed -->
  <path d="M55 55 C80 100, 110 160, 150 190 C190 210, 250 225, 375 240" stroke="#D1D5DB" stroke-width="2" stroke-dasharray="6 3" fill="none"/>
  <text x="360" y="235" font-family="sans-serif" font-size="7" fill="#9CA3AF">No review</text>

  <!-- Spaced Review Curve (with review points boosting retention) -->
  <!-- Initial learning to 1hr review -->
  <path d="M55 55 C70 80, 80 105, 95 120" stroke="#059669" stroke-width="2.5" fill="none"/>
  <!-- Boost at 1hr -->
  <line x1="95" y1="120" x2="95" y2="65" stroke="#059669" stroke-width="2.5"/>
  <!-- 1hr to 1day -->
  <path d="M95 65 C115 85, 135 110, 155 125" stroke="#059669" stroke-width="2.5" fill="none"/>
  <!-- Boost at 1day -->
  <line x1="155" y1="125" x2="155" y2="72" stroke="#059669" stroke-width="2.5"/>
  <!-- 1day to 3days -->
  <path d="M155 72 C180 88, 210 108, 225 118" stroke="#059669" stroke-width="2.5" fill="none"/>
  <!-- Boost at 3days -->
  <line x1="225" y1="118" x2="225" y2="68" stroke="#059669" stroke-width="2.5"/>
  <!-- 3days to 7days -->
  <path d="M225 68 C250 78, 280 95, 295 102" stroke="#059669" stroke-width="2.5" fill="none"/>
  <!-- Boost at 7days -->
  <line x1="295" y1="102" x2="295" y2="62" stroke="#059669" stroke-width="2.5"/>
  <!-- 7days to 30days -->
  <path d="M295 62 C320 68, 345 78, 355 82" stroke="#059669" stroke-width="2.5" fill="none"/>
  <!-- Boost at 30days -->
  <line x1="355" y1="82" x2="355" y2="58" stroke="#059669" stroke-width="2.5"/>
  <!-- Final sustained -->
  <path d="M355 58 C365 60, 372 62, 375 63" stroke="#059669" stroke-width="2.5" fill="none"/>

  <!-- Review point markers -->
  <circle cx="95" cy="120" r="5" fill="#059669"/>
  <circle cx="155" cy="125" r="5" fill="#059669"/>
  <circle cx="225" cy="118" r="5" fill="#059669"/>
  <circle cx="295" cy="102" r="5" fill="#059669"/>
  <circle cx="355" cy="82" r="5" fill="#059669"/>

  <!-- Review point labels -->
  <text x="95" y="140" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="#059669">1hr</text>
  <text x="155" y="145" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="#059669">1day</text>
  <text x="225" y="138" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="#059669">3days</text>
  <text x="295" y="122" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="#059669">7days</text>
  <text x="355" y="100" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="#059669">30days</text>

  <!-- Legend boxes -->
  <rect x="60" y="274" width="150" height="22" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="135" y="289" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#059669">Active Recall</text>

  <rect x="225" y="274" width="150" height="22" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="300" y="289" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#059669">Spaced Repetition</text>

  <!-- Small upward arrows at review points -->
  <path d="M90 75 L95 60 L100 75" stroke="#34D399" stroke-width="1.5" fill="none"/>
  <path d="M150 82 L155 67 L160 82" stroke="#34D399" stroke-width="1.5" fill="none"/>
  <path d="M220 78 L225 63 L230 78" stroke="#34D399" stroke-width="1.5" fill="none"/>
  <path d="M290 72 L295 57 L300 72" stroke="#34D399" stroke-width="1.5" fill="none"/>
  <path d="M350 68 L355 53 L360 68" stroke="#34D399" stroke-width="1.5" fill="none"/>
</svg>
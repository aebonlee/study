<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="eh-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F3F4F6"/>
      <stop offset="100%" stop-color="#FFF1F2"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="400" rx="16" fill="url(#eh-bg)"/>

  <!-- Strategy board behind student -->
  <rect x="80" y="40" width="260" height="200" rx="8" fill="white" stroke="#E11D48" stroke-width="2"/>
  <!-- Board title bar -->
  <rect x="80" y="40" width="260" height="30" rx="8" fill="#E11D48"/>
  <rect x="80" y="58" width="260" height="12" fill="#E11D48"/>
  <text x="210" y="60" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">STRATEGY PLAN</text>
  <!-- Board items -->
  <rect x="100" y="85" width="10" height="10" rx="2" fill="#FECDD3" stroke="#E11D48" stroke-width="1"/>
  <path d="M102 90 L105 93 L108 87" fill="none" stroke="#E11D48" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="120" y1="90" x2="220" y2="90" stroke="#E5E7EB" stroke-width="2"/>

  <rect x="100" y="105" width="10" height="10" rx="2" fill="#FECDD3" stroke="#E11D48" stroke-width="1"/>
  <path d="M102 110 L105 113 L108 107" fill="none" stroke="#E11D48" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="120" y1="110" x2="240" y2="110" stroke="#E5E7EB" stroke-width="2"/>

  <rect x="100" y="125" width="10" height="10" rx="2" fill="#FECDD3" stroke="#E11D48" stroke-width="1"/>
  <path d="M102 130 L105 133 L108 127" fill="none" stroke="#E11D48" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="120" y1="130" x2="210" y2="130" stroke="#E5E7EB" stroke-width="2"/>

  <rect x="100" y="145" width="10" height="10" rx="2" fill="#FECDD3" stroke="#E11D48" stroke-width="1"/>
  <line x1="120" y1="150" x2="230" y2="150" stroke="#E5E7EB" stroke-width="2"/>

  <!-- Progress bar on board -->
  <rect x="100" y="175" width="220" height="12" rx="6" fill="#FECDD3"/>
  <rect x="100" y="175" width="165" height="12" rx="6" fill="#E11D48"/>
  <text x="210" y="210" font-family="Arial, sans-serif" font-size="10" fill="#9F1239" text-anchor="middle">75% Complete</text>

  <!-- Student figure (confident pose) -->
  <!-- Head -->
  <circle cx="420" cy="140" r="40" fill="#E11D48"/>
  <circle cx="420" cy="140" r="36" fill="#FCD34D"/>
  <!-- Eyes (confident) -->
  <circle cx="408" cy="134" r="3" fill="#1F2937"/>
  <circle cx="432" cy="134" r="3" fill="#1F2937"/>
  <!-- Confident smile -->
  <path d="M408 150 Q420 162 432 150" fill="none" stroke="#1F2937" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Hair -->
  <path d="M384 128 Q390 98 420 98 Q450 98 456 128" fill="#1F2937"/>
  <!-- Body -->
  <rect x="395" y="180" width="50" height="70" rx="10" fill="#E11D48"/>
  <!-- Arms (one raised in confidence) -->
  <path d="M395 195 Q370 200 360 230" fill="none" stroke="#E11D48" stroke-width="12" stroke-linecap="round"/>
  <path d="M445 190 Q470 170 480 140" fill="none" stroke="#E11D48" stroke-width="12" stroke-linecap="round"/>
  <!-- Hands -->
  <circle cx="360" cy="230" r="8" fill="#FCD34D"/>
  <circle cx="480" cy="140" r="8" fill="#FCD34D"/>
  <!-- Legs -->
  <rect x="402" y="250" width="14" height="50" rx="5" fill="#6B7280"/>
  <rect x="424" y="250" width="14" height="50" rx="5" fill="#6B7280"/>
  <!-- Shoes -->
  <ellipse cx="409" cy="302" rx="12" ry="6" fill="#374151"/>
  <ellipse cx="431" cy="302" rx="12" ry="6" fill="#374151"/>

  <!-- Exam paper with checkmarks (left of student) -->
  <rect x="340" y="220" width="55" height="70" rx="4" fill="white" stroke="#E11D48" stroke-width="1.5" transform="rotate(-5 367 255)"/>
  <text x="355" y="238" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#E11D48" transform="rotate(-5 367 255)">EXAM</text>
  <path d="M352 248 L356 252 L364 244" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" transform="rotate(-5 367 255)"/>
  <path d="M352 260 L356 264 L364 256" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" transform="rotate(-5 367 255)"/>
  <path d="M352 272 L356 276 L364 268" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" transform="rotate(-5 367 255)"/>

  <!-- D-30 Calendar/Timeline -->
  <g transform="translate(540, 60)">
    <rect width="100" height="90" rx="8" fill="white" stroke="#E11D48" stroke-width="2"/>
    <rect width="100" height="25" rx="8" fill="#E11D48"/>
    <rect y="18" width="100" height="8" fill="#E11D48"/>
    <text x="50" y="18" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">D-DAY</text>
    <text x="50" y="62" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#E11D48" text-anchor="middle">30</text>
    <text x="50" y="82" font-family="Arial, sans-serif" font-size="9" fill="#9F1239" text-anchor="middle">days to go</text>
  </g>

  <!-- Brain with lightning bolt -->
  <g transform="translate(560, 180)">
    <!-- Brain shape -->
    <path d="M40 20 Q20 10 15 25 Q5 25 8 38 Q2 42 10 50 Q12 60 25 58 Q30 65 40 60 Q50 65 55 58 Q68 60 70 50 Q78 42 72 38 Q75 25 65 25 Q60 10 40 20Z" fill="#FECDD3" stroke="#E11D48" stroke-width="2"/>
    <!-- Brain center line -->
    <line x1="40" y1="22" x2="40" y2="58" stroke="#E11D48" stroke-width="1" stroke-dasharray="2 2"/>
    <!-- Lightning bolt -->
    <polygon points="38,28 44,28 41,40 47,40 36,56 39,44 33,44" fill="#F59E0B" stroke="#D97706" stroke-width="1"/>
  </g>

  <!-- Trophy -->
  <g transform="translate(680, 200)">
    <!-- Cup -->
    <path d="M30 10 L30 50 Q30 70 55 70 Q80 70 80 50 L80 10 Z" fill="#FCD34D" stroke="#D97706" stroke-width="2"/>
    <!-- Handles -->
    <path d="M30 20 Q10 20 10 35 Q10 50 30 50" fill="none" stroke="#D97706" stroke-width="2.5"/>
    <path d="M80 20 Q100 20 100 35 Q100 50 80 50" fill="none" stroke="#D97706" stroke-width="2.5"/>
    <!-- Base -->
    <rect x="42" y="70" width="26" height="10" rx="2" fill="#D97706"/>
    <rect x="35" y="80" width="40" height="6" rx="3" fill="#D97706"/>
    <!-- Star on trophy -->
    <polygon points="55,25 58,35 68,35 60,41 63,51 55,45 47,51 50,41 42,35 52,35" fill="#D97706"/>
    <!-- Shine -->
    <line x1="40" y1="18" x2="42" y2="28" stroke="white" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
  </g>

  <!-- Connecting path (dotted line from calendar through brain to trophy) -->
  <path d="M640 105 Q650 140 600 210 Q580 240 620 260 Q660 270 680 260" fill="none" stroke="#E11D48" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.4"/>

  <!-- Sparkles around raised hand -->
  <circle cx="490" cy="120" r="3" fill="#F59E0B"/>
  <circle cx="500" cy="130" r="2" fill="#E11D48" opacity="0.6"/>
  <circle cx="475" cy="125" r="2.5" fill="#FB7185" opacity="0.5"/>
  <!-- Star sparkle -->
  <polygon points="495,108 496,112 500,113 496,114 495,118 494,114 490,113 494,112" fill="#F59E0B"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#FFFBEB"/>

  <!-- Title -->
  <text x="200" y="26" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#92400E">Deep Work vs Shallow Work</text>

  <!-- LEFT SIDE: Shallow Work -->
  <text x="100" y="55" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#B45309" opacity="0.7">Shallow Work</text>

  <!-- Fragmented blocks -->
  <rect x="30" y="65" width="45" height="20" rx="4" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
  <text x="52" y="78" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#B45309">Email</text>
  <rect x="80" y="65" width="40" height="20" rx="4" fill="#FEF9C3" stroke="#F59E0B" stroke-width="1"/>
  <text x="100" y="78" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#B45309">SNS</text>
  <rect x="125" y="65" width="50" height="20" rx="4" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
  <text x="150" y="78" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#B45309">Meeting</text>

  <rect x="25" y="90" width="38" height="20" rx="4" fill="#FEF9C3" stroke="#F59E0B" stroke-width="1"/>
  <text x="44" y="103" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#B45309">Chat</text>
  <rect x="68" y="90" width="50" height="20" rx="4" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
  <text x="93" y="103" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#B45309">Admin</text>
  <rect x="123" y="90" width="48" height="20" rx="4" fill="#FEF9C3" stroke="#F59E0B" stroke-width="1"/>
  <text x="147" y="103" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#B45309">Browse</text>

  <rect x="35" y="115" width="42" height="20" rx="4" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
  <text x="56" y="128" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#B45309">Reply</text>
  <rect x="82" y="115" width="45" height="20" rx="4" fill="#FEF9C3" stroke="#F59E0B" stroke-width="1"/>
  <text x="104" y="128" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#B45309">Filing</text>
  <rect x="132" y="115" width="40" height="20" rx="4" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
  <text x="152" y="128" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#B45309">News</text>

  <!-- Output meter (low) -->
  <text x="100" y="155" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="600" fill="#92400E">Output</text>
  <rect x="45" y="160" width="110" height="8" rx="4" fill="#D97706" opacity="0.1"/>
  <rect x="45" y="160" width="30" height="8" rx="4" fill="#EF4444" opacity="0.5"/>
  <text x="160" y="167" font-family="sans-serif" font-size="7" fill="#EF4444" font-weight="600">Low</text>

  <!-- CENTER: VS -->
  <line x1="200" y1="50" x2="200" y2="175" stroke="#D97706" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  <circle cx="200" cy="105" r="18" fill="#D97706"/>
  <text x="200" y="110" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="800" fill="white">VS</text>

  <!-- RIGHT SIDE: Deep Work -->
  <text x="300" y="55" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#92400E">Deep Work</text>

  <!-- Single large focused block -->
  <rect x="230" y="65" width="150" height="75" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
  <rect x="235" y="70" width="140" height="65" rx="6" fill="#D97706" opacity="0.05"/>

  <!-- Focus icon -->
  <circle cx="305" cy="93" r="14" fill="#D97706" opacity="0.12"/>
  <circle cx="305" cy="93" r="9" fill="#D97706" opacity="0.2"/>
  <circle cx="305" cy="93" r="4" fill="#D97706" opacity="0.5"/>

  <text x="305" y="120" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="#92400E">Focused Deep Work</text>
  <text x="305" y="132" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#B45309">3-4 hours uninterrupted</text>

  <!-- Output meter (high) -->
  <text x="300" y="155" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="600" fill="#92400E">Output</text>
  <rect x="245" y="160" width="110" height="8" rx="4" fill="#D97706" opacity="0.1"/>
  <rect x="245" y="160" width="100" height="8" rx="4" fill="#059669" opacity="0.6"/>
  <text x="360" y="167" font-family="sans-serif" font-size="7" fill="#059669" font-weight="600">High</text>

  <!-- Bottom comparison -->
  <rect x="20" y="190" width="170" height="80" rx="8" fill="white" stroke="#FCA5A5" stroke-width="1"/>
  <text x="105" y="208" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="#EF4444">Shallow Work Results</text>
  <text x="105" y="223" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#78716C">- Constant task switching</text>
  <text x="105" y="236" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#78716C">- 40% productivity loss</text>
  <text x="105" y="249" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#78716C">- Easily replaceable work</text>
  <text x="105" y="262" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#78716C">- 23 min recovery per interrupt</text>

  <rect x="210" y="190" width="170" height="80" rx="8" fill="white" stroke="#6EE7B7" stroke-width="1"/>
  <text x="295" y="208" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="#059669">Deep Work Results</text>
  <text x="295" y="223" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#78716C">- Sustained concentration</text>
  <text x="295" y="236" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#78716C">- Peak quality output</text>
  <text x="295" y="249" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#78716C">- Rapid skill development</text>
  <text x="295" y="262" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#78716C">- Hard-to-replicate value</text>

  <!-- Bottom label -->
  <text x="200" y="290" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#92400E" opacity="0.6">Quality over Quantity</text>
</svg>

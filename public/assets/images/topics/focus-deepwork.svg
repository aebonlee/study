<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="#F3F4F6"/>

  <!-- Subtle pattern -->
  <pattern id="dots-dw" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="0.7" fill="#E5E7EB"/>
  </pattern>
  <rect width="400" height="300" fill="url(#dots-dw)" rx="12"/>

  <!-- Title -->
  <text x="200" y="24" text-anchor="middle" fill="#D97706" font-size="10" font-weight="bold" font-family="Arial, sans-serif" opacity="0.8">DEEP WORK vs SHALLOW WORK</text>

  <!-- Timeline section (top half) -->
  <g transform="translate(30, 50)">
    <!-- Time axis -->
    <line x1="0" y1="80" x2="340" y2="80" stroke="#9CA3AF" stroke-width="1"/>

    <!-- Time labels -->
    <text x="0" y="95" text-anchor="middle" fill="#6B7280" font-size="7" font-family="Arial, sans-serif">8AM</text>
    <text x="42" y="95" text-anchor="middle" fill="#6B7280" font-size="7" font-family="Arial, sans-serif">9</text>
    <text x="85" y="95" text-anchor="middle" fill="#6B7280" font-size="7" font-family="Arial, sans-serif">10</text>
    <text x="127" y="95" text-anchor="middle" fill="#6B7280" font-size="7" font-family="Arial, sans-serif">11</text>
    <text x="170" y="95" text-anchor="middle" fill="#6B7280" font-size="7" font-family="Arial, sans-serif">12</text>
    <text x="212" y="95" text-anchor="middle" fill="#6B7280" font-size="7" font-family="Arial, sans-serif">1PM</text>
    <text x="255" y="95" text-anchor="middle" fill="#6B7280" font-size="7" font-family="Arial, sans-serif">2</text>
    <text x="297" y="95" text-anchor="middle" fill="#6B7280" font-size="7" font-family="Arial, sans-serif">3</text>
    <text x="340" y="95" text-anchor="middle" fill="#6B7280" font-size="7" font-family="Arial, sans-serif">4PM</text>

    <!-- Tick marks -->
    <line x1="0" y1="78" x2="0" y2="82" stroke="#9CA3AF" stroke-width="1"/>
    <line x1="42" y1="78" x2="42" y2="82" stroke="#9CA3AF" stroke-width="1"/>
    <line x1="85" y1="78" x2="85" y2="82" stroke="#9CA3AF" stroke-width="1"/>
    <line x1="127" y1="78" x2="127" y2="82" stroke="#9CA3AF" stroke-width="1"/>
    <line x1="170" y1="78" x2="170" y2="82" stroke="#9CA3AF" stroke-width="1"/>
    <line x1="212" y1="78" x2="212" y2="82" stroke="#9CA3AF" stroke-width="1"/>
    <line x1="255" y1="78" x2="255" y2="82" stroke="#9CA3AF" stroke-width="1"/>
    <line x1="297" y1="78" x2="297" y2="82" stroke="#9CA3AF" stroke-width="1"/>
    <line x1="340" y1="78" x2="340" y2="82" stroke="#9CA3AF" stroke-width="1"/>

    <!-- Shallow work blocks (thin, light) -->
    <!-- Email check 8-8:30 -->
    <rect x="0" y="65" width="21" height="15" rx="3" fill="#D97706" opacity="0.15" stroke="#D97706" stroke-width="0.5" opacity="0.3"/>
    <text x="10" y="74" text-anchor="middle" fill="#D97706" font-size="5" font-family="Arial, sans-serif" opacity="0.7">email</text>

    <!-- Meeting 8:30-9 -->
    <rect x="22" y="65" width="20" height="15" rx="3" fill="#D97706" opacity="0.15" stroke="#D97706" stroke-width="0.5" opacity="0.3"/>
    <text x="32" y="74" text-anchor="middle" fill="#D97706" font-size="5" font-family="Arial, sans-serif" opacity="0.7">mtg</text>

    <!-- DEEP WORK block 9-12 (thick, dark) -->
    <rect x="44" y="30" width="124" height="50" rx="6" fill="#D97706" opacity="0.25" stroke="#D97706" stroke-width="2"/>
    <rect x="44" y="30" width="124" height="50" rx="6" fill="url(#deep-gradient)" opacity="0.15"/>
    <text x="106" y="52" text-anchor="middle" fill="#D97706" font-size="11" font-weight="bold" font-family="Arial, sans-serif">DEEP WORK</text>
    <text x="106" y="64" text-anchor="middle" fill="#D97706" font-size="7" font-family="Arial, sans-serif" opacity="0.7">3 hours focused</text>

    <!-- Lunch 12-12:30 -->
    <rect x="170" y="68" width="20" height="12" rx="3" fill="#9CA3AF" opacity="0.15" stroke="#9CA3AF" stroke-width="0.5" opacity="0.3"/>
    <text x="180" y="76" text-anchor="middle" fill="#6B7280" font-size="5" font-family="Arial, sans-serif">lunch</text>

    <!-- Shallow: emails 12:30-1 -->
    <rect x="191" y="65" width="20" height="15" rx="3" fill="#D97706" opacity="0.15" stroke="#D97706" stroke-width="0.5" opacity="0.3"/>
    <text x="201" y="74" text-anchor="middle" fill="#D97706" font-size="5" font-family="Arial, sans-serif" opacity="0.7">email</text>

    <!-- Meeting 1-1:30 -->
    <rect x="212" y="65" width="21" height="15" rx="3" fill="#D97706" opacity="0.15" stroke="#D97706" stroke-width="0.5" opacity="0.3"/>
    <text x="222" y="74" text-anchor="middle" fill="#D97706" font-size="5" font-family="Arial, sans-serif" opacity="0.7">mtg</text>

    <!-- DEEP WORK block 1:30-3:30 -->
    <rect x="234" y="40" width="84" height="40" rx="6" fill="#D97706" opacity="0.2" stroke="#D97706" stroke-width="1.5"/>
    <text x="276" y="57" text-anchor="middle" fill="#D97706" font-size="9" font-weight="bold" font-family="Arial, sans-serif">DEEP WORK</text>
    <text x="276" y="68" text-anchor="middle" fill="#D97706" font-size="6" font-family="Arial, sans-serif" opacity="0.7">2 hours</text>

    <!-- Shallow: admin 3:30-4 -->
    <rect x="319" y="65" width="21" height="15" rx="3" fill="#D97706" opacity="0.15" stroke="#D97706" stroke-width="0.5" opacity="0.3"/>
    <text x="329" y="74" text-anchor="middle" fill="#D97706" font-size="5" font-family="Arial, sans-serif" opacity="0.7">admin</text>

    <!-- Depth indicator arrows -->
    <text x="-5" y="40" text-anchor="end" fill="#D97706" font-size="6" font-family="Arial, sans-serif" transform="rotate(-90 -5 55)" opacity="0.5">DEPTH</text>
  </g>

  <!-- Deep gradient definition -->
  <defs>
    <linearGradient id="deep-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D97706" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Pool/diving metaphor (bottom half) -->
  <g transform="translate(30, 170)">
    <!-- Water surface -->
    <rect x="0" y="20" width="170" height="95" rx="8" fill="#D97706" opacity="0.05"/>
    <path d="M0 20 Q10 16 20 20 Q30 24 40 20 Q50 16 60 20 Q70 24 80 20 Q90 16 100 20 Q110 24 120 20 Q130 16 140 20 Q150 24 160 20 Q165 18 170 20" stroke="#D97706" stroke-width="1.5" fill="none" opacity="0.4"/>

    <!-- Surface label -->
    <text x="85" y="14" text-anchor="middle" fill="#D97706" font-size="8" font-weight="bold" font-family="Arial, sans-serif" opacity="0.6">SHALLOW</text>

    <!-- Depth gradient -->
    <rect x="0" y="20" width="170" height="95" rx="8" fill="url(#pool-gradient)" opacity="0.3"/>

    <!-- Depth lines -->
    <line x1="5" y1="40" x2="165" y2="40" stroke="#D97706" stroke-width="0.3" opacity="0.2" stroke-dasharray="4,4"/>
    <line x1="5" y1="60" x2="165" y2="60" stroke="#D97706" stroke-width="0.3" opacity="0.2" stroke-dasharray="4,4"/>
    <line x1="5" y1="80" x2="165" y2="80" stroke="#D97706" stroke-width="0.3" opacity="0.2" stroke-dasharray="4,4"/>
    <line x1="5" y1="100" x2="165" y2="100" stroke="#D97706" stroke-width="0.3" opacity="0.2" stroke-dasharray="4,4"/>

    <!-- Deep label -->
    <text x="85" y="108" text-anchor="middle" fill="#92400E" font-size="8" font-weight="bold" font-family="Arial, sans-serif" opacity="0.7">DEEP</text>

    <!-- Person diving -->
    <g transform="translate(95, 55)">
      <!-- Head -->
      <circle cx="0" cy="20" r="7" fill="#D97706" opacity="0.7"/>
      <!-- Body diving down -->
      <path d="M0 13 L0 -5" stroke="#D97706" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- Arms streamlined -->
      <path d="M0 -5 L-8 -12" stroke="#D97706" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M0 -5 L8 -12" stroke="#D97706" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- Legs -->
      <path d="M0 26 L-5 35" stroke="#D97706" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M0 26 L5 35" stroke="#D97706" stroke-width="2" fill="none" stroke-linecap="round"/>

      <!-- Bubble trail -->
      <circle cx="-3" cy="40" r="2" fill="none" stroke="#D97706" stroke-width="0.5" opacity="0.3"/>
      <circle cx="2" cy="47" r="1.5" fill="none" stroke="#D97706" stroke-width="0.5" opacity="0.25"/>
      <circle cx="-1" cy="53" r="1" fill="none" stroke="#D97706" stroke-width="0.5" opacity="0.2"/>
    </g>

    <!-- Depth arrow on right -->
    <line x1="175" y1="22" x2="175" y2="112" stroke="#D97706" stroke-width="1" opacity="0.4"/>
    <polygon points="175,114 172,108 178,108" fill="#D97706" opacity="0.4"/>
    <text x="182" y="70" fill="#D97706" font-size="6" font-family="Arial, sans-serif" opacity="0.5" transform="rotate(90 182 70)">CONCENTRATION</text>
  </g>

  <!-- Pool gradient -->
  <defs>
    <linearGradient id="pool-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FEF3C7" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#D97706" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#92400E" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <!-- Comparison metrics (right side) -->
  <g transform="translate(230, 180)">
    <!-- Deep work benefits -->
    <rect x="0" y="0" width="150" height="85" rx="8" fill="white" stroke="#D97706" stroke-width="1"/>

    <text x="75" y="18" text-anchor="middle" fill="#D97706" font-size="8" font-weight="bold" font-family="Arial, sans-serif">BENEFITS OF DEPTH</text>

    <!-- Metric bars -->
    <g transform="translate(10, 28)">
      <text x="0" y="0" fill="#374151" font-size="6.5" font-family="Arial, sans-serif">Quality Output</text>
      <rect x="0" y="4" width="130" height="6" rx="3" fill="#F3F4F6"/>
      <rect x="0" y="4" width="120" height="6" rx="3" fill="#D97706" opacity="0.7"/>
    </g>

    <g transform="translate(10, 46)">
      <text x="0" y="0" fill="#374151" font-size="6.5" font-family="Arial, sans-serif">Skill Development</text>
      <rect x="0" y="4" width="130" height="6" rx="3" fill="#F3F4F6"/>
      <rect x="0" y="4" width="110" height="6" rx="3" fill="#D97706" opacity="0.5"/>
    </g>

    <g transform="translate(10, 64)">
      <text x="0" y="0" fill="#374151" font-size="6.5" font-family="Arial, sans-serif">Satisfaction</text>
      <rect x="0" y="4" width="130" height="6" rx="3" fill="#F3F4F6"/>
      <rect x="0" y="4" width="115" height="6" rx="3" fill="#D97706" opacity="0.6"/>
    </g>
  </g>

  <!-- Legend -->
  <g transform="translate(230, 270)">
    <rect x="0" y="0" width="18" height="10" rx="3" fill="#D97706" opacity="0.25" stroke="#D97706" stroke-width="1.5"/>
    <text x="24" y="8" fill="#374151" font-size="7" font-family="Arial, sans-serif">Deep Work</text>

    <rect x="80" y="2" width="14" height="7" rx="2" fill="#D97706" opacity="0.12" stroke="#D97706" stroke-width="0.5"/>
    <text x="100" y="8" fill="#374151" font-size="7" font-family="Arial, sans-serif">Shallow Work</text>
  </g>

  <!-- Decorative -->
  <circle cx="385" cy="285" r="4" fill="#D97706" opacity="0.1"/>
  <circle cx="15" cy="285" r="3" fill="#D97706" opacity="0.1"/>
</svg>
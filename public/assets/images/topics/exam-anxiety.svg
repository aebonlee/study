<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="#F3F4F6"/>

  <!-- Divider line -->
  <line x1="200" y1="30" x2="200" y2="270" stroke="#D1D5DB" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- LEFT SIDE: Stressed -->
  <text x="100" y="28" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#9F1239" text-anchor="middle">BEFORE</text>

  <!-- Anxiety clouds -->
  <ellipse cx="50" cy="70" rx="35" ry="20" fill="#FECDD3" opacity="0.6"/>
  <ellipse cx="140" cy="55" rx="30" ry="18" fill="#FECDD3" opacity="0.5"/>
  <ellipse cx="90" cy="50" rx="25" ry="15" fill="#FB7185" opacity="0.3"/>
  <!-- Cloud text -->
  <text x="50" y="73" font-family="Arial, sans-serif" font-size="7" fill="#9F1239" text-anchor="middle">Worry</text>
  <text x="140" y="58" font-family="Arial, sans-serif" font-size="7" fill="#9F1239" text-anchor="middle">Stress</text>
  <text x="90" y="53" font-family="Arial, sans-serif" font-size="7" fill="#9F1239" text-anchor="middle">Fear</text>

  <!-- Stressed person -->
  <!-- Head -->
  <circle cx="100" cy="120" r="26" fill="#FCD34D"/>
  <!-- Worried eyes -->
  <ellipse cx="92" cy="116" rx="3" ry="4" fill="#1F2937"/>
  <ellipse cx="108" cy="116" rx="3" ry="4" fill="#1F2937"/>
  <!-- Frown -->
  <path d="M90 132 Q100 126 110 132" fill="none" stroke="#1F2937" stroke-width="2" stroke-linecap="round"/>
  <!-- Sweat drops -->
  <path d="M126 108 Q128 114 126 118" fill="#60A5FA" opacity="0.6"/>
  <path d="M130 116 Q132 120 130 124" fill="#60A5FA" opacity="0.4"/>
  <!-- Worry lines above head -->
  <path d="M85 90 Q88 86 91 90" fill="none" stroke="#E11D48" stroke-width="1.2"/>
  <path d="M96 86 Q99 82 102 86" fill="none" stroke="#E11D48" stroke-width="1.2"/>
  <path d="M107 90 Q110 86 113 90" fill="none" stroke="#E11D48" stroke-width="1.2"/>

  <!-- Body -->
  <rect x="82" y="146" width="36" height="45" rx="8" fill="#9F1239"/>

  <!-- Scattered papers -->
  <rect x="30" y="175" width="28" height="36" rx="2" fill="white" stroke="#D1D5DB" stroke-width="1" transform="rotate(-20 44 193)"/>
  <rect x="55" y="210" width="28" height="36" rx="2" fill="white" stroke="#D1D5DB" stroke-width="1" transform="rotate(15 69 228)"/>
  <rect x="120" y="200" width="28" height="36" rx="2" fill="white" stroke="#D1D5DB" stroke-width="1" transform="rotate(-10 134 218)"/>
  <rect x="145" y="180" width="28" height="36" rx="2" fill="white" stroke="#D1D5DB" stroke-width="1" transform="rotate(25 159 198)"/>
  <!-- X marks on papers -->
  <g transform="rotate(-20 44 193)">
    <line x1="36" y1="182" x2="52" y2="198" stroke="#E11D48" stroke-width="1.5"/>
    <line x1="52" y1="182" x2="36" y2="198" stroke="#E11D48" stroke-width="1.5"/>
  </g>

  <!-- Clock ticking -->
  <circle cx="155" cy="100" r="18" fill="white" stroke="#E11D48" stroke-width="2"/>
  <line x1="155" y1="100" x2="155" y2="88" stroke="#1F2937" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="155" y1="100" x2="164" y2="104" stroke="#E11D48" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="155" cy="100" r="2" fill="#1F2937"/>
  <!-- Tick marks -->
  <line x1="155" y1="84" x2="155" y2="86" stroke="#6B7280" stroke-width="1"/>
  <line x1="155" y1="114" x2="155" y2="116" stroke="#6B7280" stroke-width="1"/>
  <line x1="139" y1="100" x2="141" y2="100" stroke="#6B7280" stroke-width="1"/>
  <line x1="169" y1="100" x2="171" y2="100" stroke="#6B7280" stroke-width="1"/>

  <!-- Exclamation marks -->
  <text x="42" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E11D48">!</text>
  <text x="65" y="100" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#E11D48">!</text>


  <!-- RIGHT SIDE: Calm -->
  <text x="300" y="28" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#059669" text-anchor="middle">AFTER</text>

  <!-- Calm person -->
  <!-- Head -->
  <circle cx="300" cy="120" r="26" fill="#FCD34D"/>
  <!-- Calm happy eyes (closed/relaxed) -->
  <path d="M288 116 Q292 112 296 116" fill="none" stroke="#1F2937" stroke-width="2" stroke-linecap="round"/>
  <path d="M304 116 Q308 112 312 116" fill="none" stroke="#1F2937" stroke-width="2" stroke-linecap="round"/>
  <!-- Smile -->
  <path d="M290 130 Q300 140 310 130" fill="none" stroke="#1F2937" stroke-width="2" stroke-linecap="round"/>
  <!-- Peaceful aura lines -->
  <path d="M268 105 Q264 100 268 95" fill="none" stroke="#6EE7B7" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M332 105 Q336 100 332 95" fill="none" stroke="#6EE7B7" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M300 90 L300 84" fill="none" stroke="#6EE7B7" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Body (confident posture) -->
  <rect x="282" y="146" width="36" height="45" rx="8" fill="#059669"/>
  <!-- Arms at sides (relaxed) -->
  <path d="M282 155 Q270 165 268 180" fill="none" stroke="#059669" stroke-width="8" stroke-linecap="round"/>
  <path d="M318 155 Q330 165 332 180" fill="none" stroke="#059669" stroke-width="8" stroke-linecap="round"/>

  <!-- Organized materials (neatly stacked) -->
  <rect x="225" y="200" width="32" height="42" rx="3" fill="white" stroke="#10B981" stroke-width="1.5"/>
  <line x1="231" y1="210" x2="251" y2="210" stroke="#D1D5DB" stroke-width="1"/>
  <line x1="231" y1="218" x2="249" y2="218" stroke="#D1D5DB" stroke-width="1"/>
  <line x1="231" y1="226" x2="251" y2="226" stroke="#D1D5DB" stroke-width="1"/>
  <path d="M231 233 L235 237 L243 229" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>

  <rect x="262" y="200" width="32" height="42" rx="3" fill="white" stroke="#10B981" stroke-width="1.5"/>
  <line x1="268" y1="210" x2="288" y2="210" stroke="#D1D5DB" stroke-width="1"/>
  <line x1="268" y1="218" x2="286" y2="218" stroke="#D1D5DB" stroke-width="1"/>
  <line x1="268" y1="226" x2="288" y2="226" stroke="#D1D5DB" stroke-width="1"/>
  <path d="M268 233 L272 237 L280 229" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Breathing exercise (4-7-8) -->
  <g transform="translate(330, 180)">
    <rect width="55" height="65" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
    <text x="27" y="16" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#065F46" text-anchor="middle">Breathe</text>
    <!-- 4 -->
    <circle cx="15" cy="32" r="9" fill="#6EE7B7"/>
    <text x="15" y="36" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#065F46" text-anchor="middle">4</text>
    <text x="15" y="50" font-family="Arial, sans-serif" font-size="6" fill="#059669" text-anchor="middle">In</text>
    <!-- 7 -->
    <circle cx="27" cy="32" r="9" fill="#34D399"/>
    <text x="27" y="36" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">7</text>
    <text x="27" y="50" font-family="Arial, sans-serif" font-size="6" fill="#059669" text-anchor="middle">Hold</text>
    <!-- 8 -->
    <circle cx="39" cy="32" r="9" fill="#10B981"/>
    <text x="39" y="36" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">8</text>
    <text x="39" y="50" font-family="Arial, sans-serif" font-size="6" fill="#059669" text-anchor="middle">Out</text>
  </g>

  <!-- Calm clouds (green tinted) -->
  <ellipse cx="260" cy="65" rx="28" ry="15" fill="#D1FAE5" opacity="0.5"/>
  <ellipse cx="330" cy="55" rx="30" ry="16" fill="#A7F3D0" opacity="0.4"/>

  <!-- Checkmark / star in calm clouds -->
  <path d="M254 63 L258 68 L268 58" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="330,47 332,53 338,53 333,57 335,63 330,59 325,63 327,57 322,53 328,53" fill="#10B981" opacity="0.4"/>

  <!-- Labels at bottom -->
  <text x="100" y="272" font-family="Arial, sans-serif" font-size="9" fill="#9F1239" text-anchor="middle">Anxiety &amp; Chaos</text>
  <text x="300" y="272" font-family="Arial, sans-serif" font-size="9" fill="#059669" text-anchor="middle">Calm &amp; Prepared</text>

  <!-- VS divider circle -->
  <circle cx="200" cy="150" r="14" fill="white" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="200" y="154" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#6B7280" text-anchor="middle">VS</text>
</svg>
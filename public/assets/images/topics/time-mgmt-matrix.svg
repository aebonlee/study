<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#F3F4F6"/>

  <!-- Title -->
  <text x="200" y="28" text-anchor="middle" fill="#334155" font-size="14" font-family="system-ui" font-weight="700">Eisenhower Priority Matrix</text>

  <!-- Axis labels -->
  <text x="200" y="290" text-anchor="middle" fill="#64748B" font-size="10" font-family="system-ui">Urgent ←――――――――――→ Not Urgent</text>
  <g transform="translate(18,165) rotate(-90)">
    <text x="0" y="0" text-anchor="middle" fill="#64748B" font-size="10" font-family="system-ui">Important ↑  Not Important ↓</text>
  </g>

  <!-- Grid lines -->
  <line x1="200" y1="42" x2="200" y2="270" stroke="#CBD5E1" stroke-width="2"/>
  <line x1="35" y1="155" x2="380" y2="155" stroke="#CBD5E1" stroke-width="2"/>

  <!-- Quadrant 1: DO (Top-left, Urgent+Important) -->
  <rect x="38" y="44" width="158" height="108" rx="8" fill="#065F73" opacity="0.9"/>
  <text x="117" y="75" text-anchor="middle" fill="white" font-size="18" font-family="system-ui" font-weight="800">DO</text>
  <!-- Fire icon -->
  <g transform="translate(117,95)">
    <path d="M0,-12 Q8,-6 5,2 Q3,8 0,10 Q-3,8 -5,2 Q-8,-6 0,-12Z" fill="#F59E0B"/>
    <path d="M0,-4 Q4,-1 2,3 Q1,6 0,7 Q-1,6 -2,3 Q-4,-1 0,-4Z" fill="#FBBF24"/>
  </g>
  <text x="117" y="125" text-anchor="middle" fill="white" font-size="9" font-family="system-ui" opacity="0.9">Urgent + Important</text>
  <text x="117" y="140" text-anchor="middle" fill="white" font-size="8" font-family="system-ui" opacity="0.7">Do it NOW</text>

  <!-- Quadrant 2: SCHEDULE (Top-right, Not Urgent+Important) -->
  <rect x="204" y="44" width="172" height="108" rx="8" fill="#0891B2"/>
  <text x="290" y="75" text-anchor="middle" fill="white" font-size="18" font-family="system-ui" font-weight="800">SCHEDULE</text>
  <!-- Calendar icon -->
  <g transform="translate(290,95)">
    <rect x="-10" y="-10" width="20" height="18" rx="3" fill="white" opacity="0.3"/>
    <rect x="-10" y="-10" width="20" height="6" rx="3" fill="white" opacity="0.5"/>
    <rect x="-6" y="0" width="4" height="3" rx="1" fill="white" opacity="0.6"/>
    <rect x="2" y="0" width="4" height="3" rx="1" fill="white" opacity="0.6"/>
  </g>
  <text x="290" y="125" text-anchor="middle" fill="white" font-size="9" font-family="system-ui" opacity="0.9">Not Urgent + Important</text>
  <text x="290" y="140" text-anchor="middle" fill="white" font-size="8" font-family="system-ui" opacity="0.7">Plan a time</text>

  <!-- Quadrant 3: DELEGATE (Bottom-left, Urgent+Not Important) -->
  <rect x="38" y="159" width="158" height="108" rx="8" fill="#67CDD8"/>
  <text x="117" y="190" text-anchor="middle" fill="#065F73" font-size="18" font-family="system-ui" font-weight="800">DELEGATE</text>
  <!-- Person icon -->
  <g transform="translate(117,210)">
    <circle cx="0" cy="-6" r="5" fill="#065F73" opacity="0.5"/>
    <path d="M-8,4 Q0,-2 8,4 L6,10 L-6,10Z" fill="#065F73" opacity="0.5"/>
    <path d="M8,0 L16,-4" stroke="#065F73" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>
  <text x="117" y="240" text-anchor="middle" fill="#065F73" font-size="9" font-family="system-ui" opacity="0.8">Urgent + Not Important</text>
  <text x="117" y="255" text-anchor="middle" fill="#065F73" font-size="8" font-family="system-ui" opacity="0.6">Assign to others</text>

  <!-- Quadrant 4: DELETE (Bottom-right, Not Urgent+Not Important) -->
  <rect x="204" y="159" width="172" height="108" rx="8" fill="#E2E8F0"/>
  <text x="290" y="190" text-anchor="middle" fill="#94A3B8" font-size="18" font-family="system-ui" font-weight="800">DELETE</text>
  <!-- Trash icon -->
  <g transform="translate(290,210)">
    <rect x="-7" y="-4" width="14" height="14" rx="2" fill="#94A3B8" opacity="0.5"/>
    <rect x="-9" y="-6" width="18" height="3" rx="1.5" fill="#94A3B8" opacity="0.5"/>
    <line x1="-3" y1="0" x2="-3" y2="7" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="0" y1="0" x2="0" y2="7" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="3" y1="0" x2="3" y2="7" stroke="white" stroke-width="1" opacity="0.6"/>
  </g>
  <text x="290" y="240" text-anchor="middle" fill="#94A3B8" font-size="9" font-family="system-ui">Not Urgent + Not Important</text>
  <text x="290" y="255" text-anchor="middle" fill="#94A3B8" font-size="8" font-family="system-ui" opacity="0.7">Eliminate it</text>

  <!-- Star highlight on Q2 -->
  <g transform="translate(375,46)">
    <path d="M0,-6 L1.5,-2 L6,-2 L2.5,1 L4,5 L0,2.5 L-4,5 L-2.5,1 L-6,-2 L-1.5,-2Z" fill="#F59E0B"/>
  </g>
</svg>

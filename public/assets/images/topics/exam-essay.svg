<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF1F2"/>
      <stop offset="100%" stop-color="#FFE4E6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>
  <!-- Essay paper -->
  <rect x="100" y="35" width="200" height="230" rx="6" fill="white" stroke="#FDA4AF" stroke-width="1.5"/>
  <!-- Red margin line -->
  <line x1="135" y1="35" x2="135" y2="265" stroke="#FCA5A5" stroke-width="1" opacity="0.5"/>
  <!-- Blue lines -->
  <g stroke="#E0E7FF" stroke-width="0.8" opacity="0.7">
    <line x1="105" y1="70" x2="295" y2="70"/>
    <line x1="105" y1="85" x2="295" y2="85"/>
    <line x1="105" y1="100" x2="295" y2="100"/>
    <line x1="105" y1="115" x2="295" y2="115"/>
    <line x1="105" y1="130" x2="295" y2="130"/>
    <line x1="105" y1="145" x2="295" y2="145"/>
    <line x1="105" y1="160" x2="295" y2="160"/>
    <line x1="105" y1="175" x2="295" y2="175"/>
    <line x1="105" y1="190" x2="295" y2="190"/>
    <line x1="105" y1="205" x2="295" y2="205"/>
    <line x1="105" y1="220" x2="295" y2="220"/>
    <line x1="105" y1="235" x2="295" y2="235"/>
    <line x1="105" y1="250" x2="295" y2="250"/>
  </g>
  <!-- Essay structure labels -->
  <!-- Introduction bracket -->
  <rect x="140" y="62" width="145" height="25" rx="3" fill="#E11D48" opacity="0.08"/>
  <text x="145" y="78" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#E11D48">Intro</text>
  <line x1="170" y1="75" x2="275" y2="75" stroke="#FDA4AF" stroke-width="1"/>
  <!-- Body bracket -->
  <rect x="140" y="92" width="145" height="85" rx="3" fill="#2563EB" opacity="0.06"/>
  <text x="145" y="108" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#2563EB">Body</text>
  <!-- Body content lines -->
  <g opacity="0.5">
    <rect x="145" y="112" width="60" height="6" rx="1" fill="#93C5FD"/>
    <rect x="145" y="125" width="80" height="6" rx="1" fill="#93C5FD"/>
    <rect x="145" y="138" width="50" height="6" rx="1" fill="#93C5FD"/>
    <rect x="145" y="151" width="70" height="6" rx="1" fill="#93C5FD"/>
    <rect x="145" y="164" width="55" height="6" rx="1" fill="#93C5FD"/>
  </g>
  <!-- Conclusion bracket -->
  <rect x="140" y="182" width="145" height="25" rx="3" fill="#059669" opacity="0.08"/>
  <text x="145" y="198" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#059669">Conclusion</text>
  <line x1="195" y1="195" x2="275" y2="195" stroke="#6EE7B7" stroke-width="1"/>
  <!-- Outline on side -->
  <g transform="translate(315,60)">
    <rect x="0" y="0" width="70" height="90" rx="4" fill="#FEF2F2" stroke="#FECDD3" stroke-width="1"/>
    <text x="8" y="15" font-family="system-ui,sans-serif" font-size="8" font-weight="600" fill="#9F1239">Outline</text>
    <text x="8" y="30" font-family="system-ui,sans-serif" font-size="7" fill="#E11D48">1. Topic sentence</text>
    <text x="8" y="42" font-family="system-ui,sans-serif" font-size="7" fill="#E11D48">2. Key evidence</text>
    <text x="8" y="54" font-family="system-ui,sans-serif" font-size="7" fill="#E11D48">3. Examples</text>
    <text x="8" y="66" font-family="system-ui,sans-serif" font-size="7" fill="#E11D48">4. Analysis</text>
    <text x="8" y="78" font-family="system-ui,sans-serif" font-size="7" fill="#E11D48">5. Conclusion</text>
  </g>
  <!-- Arrow from outline to paper -->
  <path d="M315 100 Q305 110 300 115" stroke="#E11D48" stroke-width="1.5" fill="none" stroke-dasharray="3,2" stroke-linecap="round"/>
  <polygon points="297,118 302,112 305,120" fill="#E11D48"/>
  <!-- Score badge -->
  <circle cx="90" cy="55" r="20" fill="#E11D48" opacity="0.12"/>
  <text x="90" y="52" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="800" fill="#E11D48">A+</text>
  <text x="90" y="64" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#F43F5E">Score</text>
  <!-- Labels -->
  <text x="200" y="285" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#9F1239">Structured Essay = High Score</text>
</svg>

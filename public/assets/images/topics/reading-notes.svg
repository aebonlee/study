<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#D1FAE5"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>
  <!-- Open book on left -->
  <g transform="translate(70,60)">
    <path d="M0 20 Q0 0 20 0 L70 0 L70 140 Q70 150 60 150 L20 150 Q0 150 0 130Z" fill="white" stroke="#6EE7B7" stroke-width="1.5"/>
    <path d="M70 0 L120 0 Q140 0 140 20 L140 130 Q140 150 120 150 L80 150 Q70 150 70 140Z" fill="white" stroke="#6EE7B7" stroke-width="1.5"/>
    <!-- Spine -->
    <line x1="70" y1="0" x2="70" y2="150" stroke="#10B981" stroke-width="2"/>
    <!-- Text lines on book pages -->
    <g opacity="0.4">
      <line x1="12" y1="25" x2="58" y2="25" stroke="#6EE7B7" stroke-width="1"/>
      <line x1="12" y1="40" x2="55" y2="40" stroke="#6EE7B7" stroke-width="1"/>
      <line x1="12" y1="55" x2="50" y2="55" stroke="#6EE7B7" stroke-width="1"/>
      <line x1="12" y1="70" x2="56" y2="70" stroke="#6EE7B7" stroke-width="1"/>
      <line x1="12" y1="85" x2="45" y2="85" stroke="#6EE7B7" stroke-width="1"/>
      <line x1="82" y1="25" x2="128" y2="25" stroke="#6EE7B7" stroke-width="1"/>
      <line x1="82" y1="40" x2="125" y2="40" stroke="#6EE7B7" stroke-width="1"/>
      <line x1="82" y1="55" x2="120" y2="55" stroke="#6EE7B7" stroke-width="1"/>
      <line x1="82" y1="70" x2="126" y2="70" stroke="#6EE7B7" stroke-width="1"/>
      <line x1="82" y1="85" x2="115" y2="85" stroke="#6EE7B7" stroke-width="1"/>
    </g>
    <!-- Highlight on book -->
    <rect x="12" y="51" width="40" height="10" rx="2" fill="#FEF08A" opacity="0.6"/>
    <rect x="82" y="66" width="35" height="10" rx="2" fill="#FEF08A" opacity="0.6"/>
  </g>
  <!-- Arrow from book to note -->
  <path d="M220 135 Q240 135 255 120" stroke="#10B981" stroke-width="2" fill="none" stroke-dasharray="4,3" stroke-linecap="round"/>
  <polygon points="258,117 252,123 260,124" fill="#10B981"/>
  <!-- Note card on right -->
  <rect x="250" y="50" width="120" height="160" rx="8" fill="white" stroke="#10B981" stroke-width="1.5"/>
  <!-- Note header -->
  <rect x="250" y="50" width="120" height="30" rx="8" fill="#10B981" opacity="0.15"/>
  <rect x="257" y="80" width="120" height="0" rx="0" fill="none"/>
  <text x="310" y="70" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#065F46">Reading Notes</text>
  <!-- Note sections -->
  <text x="260" y="100" font-family="system-ui,sans-serif" font-size="8" font-weight="600" fill="#059669">Key Points</text>
  <line x1="260" y1="110" x2="360" y2="110" stroke="#D1FAE5" stroke-width="1"/>
  <line x1="260" y1="120" x2="345" y2="120" stroke="#D1FAE5" stroke-width="1"/>
  <text x="260" y="140" font-family="system-ui,sans-serif" font-size="8" font-weight="600" fill="#059669">My Thoughts</text>
  <line x1="260" y1="150" x2="355" y2="150" stroke="#D1FAE5" stroke-width="1"/>
  <line x1="260" y1="160" x2="340" y2="160" stroke="#D1FAE5" stroke-width="1"/>
  <text x="260" y="180" font-family="system-ui,sans-serif" font-size="8" font-weight="600" fill="#059669">Connections</text>
  <line x1="260" y1="190" x2="350" y2="190" stroke="#D1FAE5" stroke-width="1"/>
  <!-- Pen icon -->
  <g transform="translate(335,175) rotate(-45)">
    <rect x="0" y="0" width="5" height="25" rx="1" fill="#10B981"/>
    <polygon points="0,25 5,25 2.5,32" fill="#065F46"/>
  </g>
  <!-- Labels -->
  <text x="200" y="265" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#065F46">Book to Notes Workflow</text>
  <text x="200" y="282" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#059669">Extract, Reflect, Connect</text>
</svg>

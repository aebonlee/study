<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="100%" stop-color="#FEF3C7"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>
  <!-- Brain icon center -->
  <circle cx="200" cy="120" r="50" fill="#D97706" opacity="0.15"/>
  <circle cx="200" cy="120" r="35" fill="#D97706" opacity="0.25"/>
  <!-- Brain shape -->
  <path d="M185 105c-8-12 5-25 15-20 10 5 15-5 15-5s5 10 15 5c10-5 23 8 15 20-5 7-3 15-3 20s-12 10-27 10-25-5-25-10 2-13-5-20z" fill="#D97706" opacity="0.6"/>
  <!-- Multiple arrows going out (multitasking) -->
  <line x1="155" y1="90" x2="120" y2="60" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="118,55 115,65 125,62" fill="#EF4444"/>
  <line x1="245" y1="90" x2="280" y2="60" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="282,55 275,62 285,65" fill="#EF4444"/>
  <line x1="155" y1="140" x2="115" y2="165" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="110,168 118,170 120,160" fill="#EF4444"/>
  <line x1="245" y1="140" x2="285" y2="165" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="290,168 280,160 282,170" fill="#EF4444"/>
  <!-- X marks on arrows -->
  <g stroke="#EF4444" stroke-width="2" stroke-linecap="round">
    <line x1="133" y1="70" x2="143" y2="80"/>
    <line x1="143" y1="70" x2="133" y2="80"/>
    <line x1="257" y1="70" x2="267" y2="80"/>
    <line x1="267" y1="70" x2="257" y2="80"/>
  </g>
  <!-- Single focused arrow (correct approach) -->
  <line x1="200" y1="155" x2="200" y2="200" stroke="#059669" stroke-width="3" stroke-linecap="round"/>
  <polygon points="200,208 193,198 207,198" fill="#059669"/>
  <!-- Check mark -->
  <circle cx="200" cy="222" r="12" fill="#059669" opacity="0.2"/>
  <polyline points="194,222 198,227 207,217" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Task boxes scattered -->
  <rect x="90" y="40" width="40" height="28" rx="4" fill="#F59E0B" opacity="0.3" stroke="#F59E0B" stroke-width="1"/>
  <rect x="270" y="40" width="40" height="28" rx="4" fill="#F59E0B" opacity="0.3" stroke="#F59E0B" stroke-width="1"/>
  <rect x="85" y="158" width="40" height="28" rx="4" fill="#F59E0B" opacity="0.3" stroke="#F59E0B" stroke-width="1"/>
  <rect x="275" y="158" width="40" height="28" rx="4" fill="#F59E0B" opacity="0.3" stroke="#F59E0B" stroke-width="1"/>
  <!-- Labels -->
  <text x="200" y="265" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#92400E">Single-Tasking &gt; Multi-Tasking</text>
  <text x="200" y="282" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#B45309">Focus on one task at a time</text>
</svg>

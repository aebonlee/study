<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="#F3F4F6"/>

  <!-- Title -->
  <text x="200" y="24" text-anchor="middle" fill="#D97706" font-size="12" font-weight="bold" font-family="Arial, sans-serif">FLOW CHANNEL DIAGRAM</text>
  <text x="200" y="37" text-anchor="middle" fill="#6B7280" font-size="7" font-family="Arial, sans-serif">Mihaly Csikszentmihalyi</text>

  <!-- Chart area -->
  <g transform="translate(70, 50)">
    <!-- Grid lines (subtle) -->
    <line x1="0" y1="0" x2="290" y2="0" stroke="#E5E7EB" stroke-width="0.5"/>
    <line x1="0" y1="50" x2="290" y2="50" stroke="#E5E7EB" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="290" y2="100" stroke="#E5E7EB" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="290" y2="150" stroke="#E5E7EB" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="290" y2="200" stroke="#E5E7EB" stroke-width="0.5"/>

    <line x1="0" y1="0" x2="0" y2="200" stroke="#E5E7EB" stroke-width="0.5"/>
    <line x1="72" y1="0" x2="72" y2="200" stroke="#E5E7EB" stroke-width="0.5"/>
    <line x1="145" y1="0" x2="145" y2="200" stroke="#E5E7EB" stroke-width="0.5"/>
    <line x1="218" y1="0" x2="218" y2="200" stroke="#E5E7EB" stroke-width="0.5"/>
    <line x1="290" y1="0" x2="290" y2="200" stroke="#E5E7EB" stroke-width="0.5"/>

    <!-- Y-axis (Challenge) -->
    <line x1="0" y1="0" x2="0" y2="200" stroke="#374151" stroke-width="1.5"/>
    <polygon points="0,0 -4,8 4,8" fill="#374151"/>

    <!-- X-axis (Skill) -->
    <line x1="0" y1="200" x2="290" y2="200" stroke="#374151" stroke-width="1.5"/>
    <polygon points="290,200 282,196 282,204" fill="#374151"/>

    <!-- Y-axis label -->
    <text x="-12" y="100" text-anchor="middle" fill="#374151" font-size="9" font-weight="bold" font-family="Arial, sans-serif" transform="rotate(-90, -12, 100)">CHALLENGE</text>
    <text x="8" y="10" fill="#6B7280" font-size="6" font-family="Arial, sans-serif">High</text>
    <text x="8" y="198" fill="#6B7280" font-size="6" font-family="Arial, sans-serif">Low</text>

    <!-- X-axis label -->
    <text x="145" y="220" text-anchor="middle" fill="#374151" font-size="9" font-weight="bold" font-family="Arial, sans-serif">SKILL</text>
    <text x="10" y="213" fill="#6B7280" font-size="6" font-family="Arial, sans-serif">Low</text>
    <text x="280" y="213" text-anchor="end" fill="#6B7280" font-size="6" font-family="Arial, sans-serif">High</text>

    <!-- ===== ANXIETY ZONE (top-left) ===== -->
    <path d="M0 0 L0 120 C40 100, 80 60, 120 0 Z" fill="#EF4444" opacity="0.08"/>
    <path d="M0 0 L0 90 C30 75, 60 40, 90 0 Z" fill="#EF4444" opacity="0.06"/>
    <text x="25" y="40" fill="#EF4444" font-size="11" font-weight="bold" font-family="Arial, sans-serif">Anxiety</text>
    <text x="25" y="52" fill="#EF4444" font-size="6" font-family="Arial, sans-serif" opacity="0.7">Too hard!</text>
    <!-- Worried face icon -->
    <g transform="translate(55, 30)" opacity="0.5">
      <circle cx="0" cy="0" r="8" fill="none" stroke="#EF4444" stroke-width="1"/>
      <circle cx="-3" cy="-2" r="1" fill="#EF4444"/>
      <circle cx="3" cy="-2" r="1" fill="#EF4444"/>
      <path d="M-4 4 Q0 1, 4 4" stroke="#EF4444" stroke-width="0.8" fill="none"/>
    </g>

    <!-- ===== BOREDOM ZONE (bottom-right) ===== -->
    <path d="M290 200 L170 200 C190 160, 230 120, 290 100 Z" fill="#9CA3AF" opacity="0.08"/>
    <path d="M290 200 L200 200 C215 170, 245 140, 290 125 Z" fill="#9CA3AF" opacity="0.06"/>
    <text x="245" y="180" fill="#9CA3AF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">Boredom</text>
    <text x="245" y="192" fill="#9CA3AF" font-size="6" font-family="Arial, sans-serif" opacity="0.7">Too easy!</text>
    <!-- Bored face icon -->
    <g transform="translate(230, 165)" opacity="0.5">
      <circle cx="0" cy="0" r="8" fill="none" stroke="#9CA3AF" stroke-width="1"/>
      <line x1="-3" y1="-2" x2="-1" y2="-2" stroke="#9CA3AF" stroke-width="1.2"/>
      <line x1="1" y1="-2" x2="3" y2="-2" stroke="#9CA3AF" stroke-width="1.2"/>
      <line x1="-3" y1="3" x2="3" y2="3" stroke="#9CA3AF" stroke-width="1"/>
    </g>

    <!-- ===== FLOW CHANNEL (diagonal center) ===== -->
    <!-- Flow channel band -->
    <path d="M0 200 C30 170, 60 140, 100 110 C140 80, 200 40, 290 0 L290 40 C210 75, 155 105, 115 135 C80 162, 50 185, 30 200 Z" fill="#D97706" opacity="0.12"/>
    <path d="M10 200 C40 175, 70 148, 108 120 C150 90, 205 55, 290 15 L290 30 C212 65, 160 95, 120 125 C85 152, 55 178, 25 200 Z" fill="#D97706" opacity="0.1"/>

    <!-- Flow label -->
    <text x="155" y="108" text-anchor="middle" fill="#D97706" font-size="14" font-weight="bold" font-family="Arial, sans-serif" transform="rotate(-33, 155, 108)">FLOW</text>

    <!-- Flow sublabel -->
    <text x="178" y="125" text-anchor="middle" fill="#92400E" font-size="6" font-family="Arial, sans-serif" transform="rotate(-33, 178, 125)">Optimal Experience</text>

    <!-- Person icon in Flow zone -->
    <g transform="translate(145, 125)">
      <circle cx="0" cy="0" r="12" fill="#D97706" opacity="0.2"/>
      <!-- Happy person -->
      <circle cx="0" cy="-2" r="6" fill="none" stroke="#D97706" stroke-width="1.2"/>
      <circle cx="-2" cy="-3" r="0.8" fill="#D97706"/>
      <circle cx="2" cy="-3" r="0.8" fill="#D97706"/>
      <path d="M-2.5 0 Q0 2.5, 2.5 0" stroke="#D97706" stroke-width="0.8" fill="none"/>
      <!-- Sparkles around -->
      <line x1="-10" y1="-8" x2="-12" y2="-10" stroke="#D97706" stroke-width="0.8" opacity="0.5"/>
      <line x1="10" y1="-8" x2="12" y2="-10" stroke="#D97706" stroke-width="0.8" opacity="0.5"/>
      <line x1="0" y1="-12" x2="0" y2="-14" stroke="#D97706" stroke-width="0.8" opacity="0.5"/>
    </g>

    <!-- The +4% sweet spot indicator -->
    <g transform="translate(200, 80)">
      <rect x="-22" y="-8" width="44" height="16" rx="4" fill="#FEF3C7" stroke="#D97706" stroke-width="0.8"/>
      <text x="0" y="2" text-anchor="middle" fill="#D97706" font-size="7" font-weight="bold" font-family="Arial, sans-serif">+4% rule</text>
    </g>
    <line x1="178" y1="80" x2="158" y2="112" stroke="#D97706" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.5"/>

    <!-- Diagonal guide line (center of flow) -->
    <line x1="5" y1="195" x2="285" y2="5" stroke="#D97706" stroke-width="1" stroke-dasharray="6,4" opacity="0.3"/>
  </g>

  <!-- Bottom note -->
  <text x="200" y="288" text-anchor="middle" fill="#6B7280" font-size="7" font-family="Arial, sans-serif">Challenge should be ~4% above current skill level for optimal flow</text>

  <!-- Decorative corner marks -->
  <path d="M8 8 L8 4 L12 4" stroke="#D97706" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M392 8 L392 4 L388 4" stroke="#D97706" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M8 292 L8 296 L12 296" stroke="#D97706" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M392 292 L392 296 L388 296" stroke="#D97706" stroke-width="1" fill="none" opacity="0.3"/>
</svg>
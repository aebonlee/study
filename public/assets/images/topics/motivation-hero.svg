<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" rx="16" fill="#F3F4F6"/>

  <!-- Mountain / staircase made of books -->
  <g transform="translate(150,350)">
    <!-- Step 1 (bottom) -->
    <rect x="0" y="-30" width="80" height="30" rx="3" fill="#FDE68A"/>
    <rect x="2" y="-28" width="3" height="26" fill="#F59E0B" opacity="0.3"/>
    <rect x="7" y="-24" width="50" height="2" rx="1" fill="#F59E0B" opacity="0.15"/>
    <rect x="7" y="-18" width="35" height="2" rx="1" fill="#F59E0B" opacity="0.15"/>

    <!-- Step 2 -->
    <rect x="80" y="-65" width="80" height="30" rx="3" fill="#FCD34D"/>
    <rect x="82" y="-63" width="3" height="26" fill="#F59E0B" opacity="0.3"/>
    <rect x="87" y="-59" width="50" height="2" rx="1" fill="#F59E0B" opacity="0.15"/>

    <!-- Step 3 -->
    <rect x="160" y="-100" width="80" height="30" rx="3" fill="#FBBF24"/>
    <rect x="162" y="-98" width="3" height="26" fill="#F59E0B" opacity="0.3"/>

    <!-- Step 4 -->
    <rect x="240" y="-140" width="80" height="30" rx="3" fill="#F59E0B"/>
    <rect x="242" y="-138" width="3" height="26" fill="#D97706" opacity="0.3"/>

    <!-- Step 5 -->
    <rect x="320" y="-180" width="80" height="30" rx="3" fill="#D97706"/>
    <rect x="322" y="-178" width="3" height="26" fill="#B45309" opacity="0.3"/>

    <!-- Step 6 (top) -->
    <rect x="400" y="-220" width="80" height="30" rx="3" fill="#B45309"/>

    <!-- Connecting risers -->
    <rect x="80" y="-65" width="4" height="35" fill="#FCD34D" opacity="0.5"/>
    <rect x="160" y="-100" width="4" height="35" fill="#FBBF24" opacity="0.5"/>
    <rect x="240" y="-140" width="4" height="40" fill="#F59E0B" opacity="0.5"/>
    <rect x="320" y="-180" width="4" height="40" fill="#D97706" opacity="0.5"/>
    <rect x="400" y="-220" width="4" height="40" fill="#B45309" opacity="0.5"/>
  </g>

  <!-- Person climbing -->
  <g transform="translate(440,175)">
    <!-- Body -->
    <circle cx="0" cy="-20" r="14" fill="#F59E0B"/>
    <!-- Eyes -->
    <circle cx="-4" cy="-23" r="2" fill="white"/>
    <circle cx="4" cy="-23" r="2" fill="white"/>
    <!-- Determined smile -->
    <path d="M-5,-15 Q0,-11 5,-15" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Body -->
    <rect x="-10" y="-6" width="20" height="28" rx="6" fill="#F59E0B"/>
    <!-- Legs climbing -->
    <line x1="-6" y1="22" x2="-15" y2="36" stroke="#F59E0B" stroke-width="5" stroke-linecap="round"/>
    <line x1="6" y1="22" x2="0" y2="38" stroke="#F59E0B" stroke-width="5" stroke-linecap="round"/>
    <!-- Arm reaching up -->
    <line x1="8" y1="0" x2="25" y2="-18" stroke="#F59E0B" stroke-width="5" stroke-linecap="round"/>
    <line x1="-8" y1="2" x2="-20" y2="-8" stroke="#F59E0B" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Flag at the top -->
  <g transform="translate(590,90)">
    <line x1="0" y1="0" x2="0" y2="50" stroke="#B45309" stroke-width="3" stroke-linecap="round"/>
    <path d="M2,0 L35,8 L2,18Z" fill="#F59E0B"/>
    <path d="M2,0 L35,8 L2,18Z" fill="#FBBF24" opacity="0.5"/>
    <!-- Star on flag -->
    <path d="M15,9 L16.5,6 L18,9 L21,9 L19,11 L19.5,14 L17,12.5 L14.5,14 L15,11 L13,9Z" fill="white" opacity="0.8"/>
  </g>

  <!-- Sun/star shining above -->
  <g transform="translate(620,50)">
    <circle cx="0" cy="0" r="20" fill="#F59E0B" opacity="0.3"/>
    <circle cx="0" cy="0" r="12" fill="#F59E0B" opacity="0.6"/>
    <circle cx="0" cy="0" r="6" fill="#FBBF24"/>
    <!-- Rays -->
    <line x1="0" y1="-28" x2="0" y2="-22" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="0" y1="22" x2="0" y2="28" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="-28" y1="0" x2="-22" y2="0" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="22" y1="0" x2="28" y2="0" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="-20" y1="-20" x2="-16" y2="-16" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="16" y1="-16" x2="20" y2="-20" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="-20" y1="20" x2="-16" y2="16" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="16" y1="16" x2="20" y2="20" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Milestone markers along the path -->
  <!-- Marker 1 -->
  <g transform="translate(195,330)">
    <circle cx="0" cy="0" r="10" fill="white" stroke="#F59E0B" stroke-width="2"/>
    <text x="0" y="4" text-anchor="middle" fill="#F59E0B" font-size="10" font-family="system-ui" font-weight="700">1</text>
  </g>

  <!-- Marker 2 -->
  <g transform="translate(275,295)">
    <circle cx="0" cy="0" r="10" fill="white" stroke="#F59E0B" stroke-width="2"/>
    <text x="0" y="4" text-anchor="middle" fill="#F59E0B" font-size="10" font-family="system-ui" font-weight="700">2</text>
  </g>

  <!-- Marker 3 -->
  <g transform="translate(355,260)">
    <circle cx="0" cy="0" r="10" fill="white" stroke="#F59E0B" stroke-width="2"/>
    <text x="0" y="4" text-anchor="middle" fill="#F59E0B" font-size="10" font-family="system-ui" font-weight="700">3</text>
  </g>

  <!-- Heart (passion) along path -->
  <g transform="translate(230,310)">
    <path d="M0,5 C0,5 -8,-2 -8,-6 C-8,-10 -4,-10 0,-6 C4,-10 8,-10 8,-6 C8,-2 0,5 0,5Z" fill="#EF4444" opacity="0.7"/>
  </g>

  <!-- Fire (motivation) along path -->
  <g transform="translate(315,272)">
    <path d="M0,-10 Q7,-4 4,2 Q2,7 0,9 Q-2,7 -4,2 Q-7,-4 0,-10Z" fill="#F59E0B"/>
    <path d="M0,-4 Q3,0 2,3 Q1,5 0,6 Q-1,5 -2,3 Q-3,0 0,-4Z" fill="#FBBF24"/>
  </g>

  <!-- Seedling growing into tree (growth mindset) -->
  <g transform="translate(100,310)">
    <!-- Small seedling -->
    <line x1="0" y1="10" x2="0" y2="0" stroke="#22C55E" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="-5" cy="-2" rx="5" ry="4" fill="#22C55E" opacity="0.6" transform="rotate(-30,-5,-2)"/>
    <ellipse cx="5" cy="-5" rx="5" ry="4" fill="#22C55E" opacity="0.7" transform="rotate(30,5,-5)"/>
    <ellipse cx="0" cy="-8" rx="4" ry="5" fill="#22C55E" opacity="0.8"/>
    <!-- Ground -->
    <ellipse cx="0" cy="12" rx="12" ry="3" fill="#D97706" opacity="0.3"/>
  </g>

  <!-- Arrow growing from seedling to tree -->
  <g transform="translate(70,270)">
    <!-- Larger tree -->
    <line x1="0" y1="30" x2="0" y2="5" stroke="#15803D" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="-2" r="16" fill="#22C55E" opacity="0.6"/>
    <circle cx="-8" cy="-8" r="10" fill="#22C55E" opacity="0.5"/>
    <circle cx="8" cy="-8" r="10" fill="#22C55E" opacity="0.5"/>
    <circle cx="0" cy="-14" r="8" fill="#22C55E" opacity="0.4"/>
  </g>

  <!-- Decorative sparkles -->
  <circle cx="680" cy="120" r="3" fill="#F59E0B" opacity="0.3"/>
  <circle cx="700" cy="100" r="2" fill="#F59E0B" opacity="0.2"/>
  <circle cx="660" cy="90" r="2.5" fill="#FBBF24" opacity="0.3"/>
  <circle cx="140" cy="240" r="3" fill="#F59E0B" opacity="0.2"/>
  <circle cx="120" cy="260" r="2" fill="#F59E0B" opacity="0.15"/>
</svg>

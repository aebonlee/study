  <!-- Description -->
  <text x='600' y='470' text-anchor='middle' font-family='Arial,sans-serif' font-size='20' fill='rgba(255,255,255,0.6)'>학습법 · 기억력 · 시간관리 · 시험전략 · 노트필기 · 독서법</text>
  
  <!-- Bottom bar -->
  <rect x='0' y='590' width='1200' height='40' fill='rgba(0,0,0,0.2)'/>
  <text x='600' y='617' text-anchor='middle' font-family='Arial,sans-serif' font-size='16' fill='rgba(255,255,255,0.7)'>study.dreamitbiz.com</text>

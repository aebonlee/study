<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='630'>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#059669'/>
      <stop offset='50%' stop-color='#047857'/>
      <stop offset='100%' stop-color='#065F46'/>
    </linearGradient>
    <linearGradient id='shine' x1='0' y1='0' x2='0' y2='1'>
      <stop offset='0%' stop-color='rgba(255,255,255,0.15)'/>
      <stop offset='100%' stop-color='rgba(255,255,255,0)'/>
    </linearGradient>
  </defs>
  <rect width='1200' height='630' fill='url(#bg)'/>
  <rect width='1200' height='315' fill='url(#shine)'/>
  
  <!-- Decorative circles -->
  <circle cx='100' cy='530' r='200' fill='rgba(255,255,255,0.05)'/>
  <circle cx='1100' cy='100' r='250' fill='rgba(255,255,255,0.05)'/>
  <circle cx='600' cy='600' r='300' fill='rgba(255,255,255,0.03)'/>
  
  <!-- Book icon -->
  <g transform='translate(540,140)'>
    <path d='M0 20c20-15 45-20 60-15v100c-15-5-40 0-60 15V20z' fill='rgba(255,255,255,0.9)'/>
    <path d='M120 20c-20-15-45-20-60-15v100c15-5 40 0 60 15V20z' fill='rgba(255,255,255,0.9)'/>
    <path d='M60 5v100' stroke='rgba(5,150,105,0.3)' stroke-width='1'/>
  </g>
  
  <!-- Title -->
  <text x='600' y='340' text-anchor='middle' font-family='Arial,sans-serif' font-size='64' font-weight='bold' fill='white'>DreamIT Study</text>
  
  <!-- Subtitle -->
